  <script>
    const SCORE_META = {
      2: { label: "Clear pushback", tone: "green" },
      1: { label: "Partial challenge", tone: "amber" },
      0: { label: "Accepted nonsense", tone: "red" },
      missing: { label: "Missing", tone: "slate" },
    };

    const THEME_OPTIONS = [
      { key: "system", label: "System" },
      { key: "light", label: "Light" },
      { key: "dark", label: "Dark" },
    ];

    const systemThemeMedia = window.matchMedia?.("(prefers-color-scheme: dark)") || null;
    const RUNTIME = (() => {
      const configured = window.REASONING_LAB_RUNTIME && typeof window.REASONING_LAB_RUNTIME === "object"
        ? window.REASONING_LAB_RUNTIME
        : {};
      const mode = configured.mode === "static" ? "static" : "local";
      const staticBootstrapUrl = String(configured.staticBootstrapUrl || "").trim();
      return {
        mode,
        staticBootstrapUrl,
        readOnly: configured.readOnly === true || mode === "static",
      };
    })();

    function initialThemePreference() {
      const stored = window.localStorage.getItem("reasoningLab.theme");
      return ["light", "dark"].includes(stored) ? stored : "system";
    }

    function initialCompareOpen() {
      const stored = window.localStorage.getItem("reasoningLab.compareOpen");
      if (stored === null) return true;
      return stored === "1";
    }

    function resolvedThemePreference(preference = initialThemePreference()) {
      if (preference === "light" || preference === "dark") return preference;
      return systemThemeMedia?.matches ? "dark" : "light";
    }

    function applyThemePreference(preference = initialThemePreference()) {
      const nextPreference = ["light", "dark"].includes(preference) ? preference : "system";
      const resolved = resolvedThemePreference(nextPreference);
      document.documentElement.dataset.themePreference = nextPreference;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      return resolved;
    }

    function initialAnnotationFilter() {
      const direct = window.localStorage.getItem("reasoningLab.annotationFilter");
      if (["validated", "needs_review", "in_progress", "unreviewed", "all"].includes(direct)) return direct;
      if (direct === "ai_labelled") return "needs_review";
      if (direct === "partially_reviewed") return "in_progress";
      if (direct === "one_labelled") return "in_progress";
      if (direct === "both_labelled") return "validated";
      if (direct === "any_labelled") return "in_progress";
      if (direct === "reviewed" || direct === "labelled") return "validated";
      if (direct === "started") return "in_progress";
      if (direct === "unlabelled") return "unreviewed";
      const legacyStatus = window.localStorage.getItem("reasoningLab.caseStatusFilter") || "";
      const legacyAnnotated = window.localStorage.getItem("reasoningLab.onlyAnnotated") === "1";
      if (legacyStatus === "unlabeled") return "unreviewed";
      if (legacyStatus === "in_progress") return "in_progress";
      if (legacyStatus === "needs_review") return "needs_review";
      if (legacyAnnotated || legacyStatus === "any_labels") return "in_progress";
      if (legacyStatus === "reviewed") return "validated";
      return "all";
    }

    function normalizeCaseSortValue(value) {
      const key = String(value || "").trim().toLowerCase();
      return {
        recommended: "recommended",
        recent: "recommended",
        most_labels: "recommended",
        least_labels: "recommended",
        grade: "primary_grade_asc",
        overall_label: "primary_overall_label_asc",
        trace_tokens: "recommended",
        question_id: "question_id_asc",
        question_asc: "question_asc",
        question_desc: "question_desc",
        question_id_asc: "question_id_asc",
        question_id_desc: "question_id_desc",
        domain_asc: "domain_asc",
        domain_desc: "domain_desc",
        grade_asc: "primary_grade_asc",
        grade_desc: "primary_grade_desc",
        status_asc: "primary_labelled_asc",
        status_desc: "primary_labelled_desc",
        overall_label_asc: "primary_overall_label_asc",
        overall_label_desc: "primary_overall_label_desc",
        primary_grade_asc: "primary_grade_asc",
        primary_grade_desc: "primary_grade_desc",
        primary_labelled_asc: "primary_labelled_asc",
        primary_labelled_desc: "primary_labelled_desc",
        primary_overall_label_asc: "primary_overall_label_asc",
        primary_overall_label_desc: "primary_overall_label_desc",
        compare_grade_asc: "compare_grade_asc",
        compare_grade_desc: "compare_grade_desc",
        compare_labelled_asc: "compare_labelled_asc",
        compare_labelled_desc: "compare_labelled_desc",
        compare_overall_label_asc: "compare_overall_label_asc",
        compare_overall_label_desc: "compare_overall_label_desc",
        highlights_asc: "highlights_asc",
        highlights_desc: "highlights_desc",
        updated_asc: "updated_asc",
        updated_desc: "updated_desc",
      }[key] || "recommended";
    }

    const STATE = {
      bootstrap: null,
      runtimeMode: RUNTIME.mode,
      readOnly: RUNTIME.readOnly,
      themePreference: initialThemePreference(),
      sourceKey: window.localStorage.getItem("reasoningLab.sourceKey") || "gpt54_high",
      datasetKey: window.localStorage.getItem("reasoningLab.datasetKey") || "v2",
      viewMode: window.localStorage.getItem("reasoningLab.viewMode") || "explorer",
      search: "",
      gradeFilter: window.localStorage.getItem("reasoningLab.gradeFilter") || "all",
      annotationFilter: normalizeAnnotationFilterForView(
        initialAnnotationFilter(),
        window.localStorage.getItem("reasoningLab.viewMode") || "explorer",
      ),
      caseSort: normalizeCaseSortValue(window.localStorage.getItem("reasoningLab.caseSort") || "recommended"),
      selectedDomainsByDataset: (() => {
        try {
          const raw = window.localStorage.getItem("reasoningLab.selectedDomainsByDataset");
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (_error) {
          return {};
        }
      })(),
      selectedCaseId: window.localStorage.getItem("reasoningLab.selectedCaseId") || "",
      selectedCasePinnedIndex: null,
      selection: null,
      activeAnnotationId: "",
      activeAnnotationOrigin: "",
      selectedCategoryId: "",
      answerCollapsed: window.localStorage.getItem("reasoningLab.answerCollapsed") === "1",
      sidebarOpen: window.localStorage.getItem("reasoningLab.sidebarOpen") === "1",
      author: "",
      draftComment: "",
      draftDocumentNote: null,
      documentNoteStatus: null,
      composerTargetSourceKey: window.localStorage.getItem("reasoningLab.composerTargetSourceKey") || "",
      lastSelectionAt: 0,
      selectionAnchor: null,
      flashNotice: null,
      justSavedAnnotationId: "",
      toast: null,
      compareOpen: initialCompareOpen(),
      aiLabelJobsByDocument: {},
      selectedExplorerQuestionIdsByDataset: {},
      lastExplorerSelectionQuestionIdByDataset: {},
      pendingExplorerSelectionGesture: null,
      activeAiRunId: "",
      activeAiRunQuestionIdsByDataset: {},
      activeAiRunQuestionOrderByDataset: {},
      labelReturnContext: null,
    };

    applyThemePreference(STATE.themePreference);

    const syncThemeOnSystemChange = () => {
      if (STATE.themePreference !== "system") return;
      applyThemePreference("system");
      if (el.themeSwitch) renderThemeSwitch();
    };

    if (systemThemeMedia?.addEventListener) {
      systemThemeMedia.addEventListener("change", syncThemeOnSystemChange);
    } else if (systemThemeMedia?.addListener) {
      systemThemeMedia.addListener(syncThemeOnSystemChange);
    }

    const el = {};
    let flashNoticeTimer = 0;
    let toastTimer = 0;
    let commentSaveTimer = 0;
    let commentSaveAnnotationId = "";
    let documentNoteSaveTimer = 0;
    let documentNoteSaveDocumentId = "";
    const documentNoteSaveQueues = new Map();
    let selectionCaptureFrame = 0;
    let stageStickySyncFrame = 0;
    let aiRunPollTimer = 0;
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function categoryTooltip(category) {
      if (!category) return "";
      const name = String(category.name || category.id || "").trim();
      const description = String(category.description || "").trim();
      const guidance = String(category.guidance || "").trim();
      return [name, description || guidance].filter(Boolean).join(": ");
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text || "");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
      return html;
    }

    function renderMarkdown(text) {
      const source = String(text || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return `<p>${escapeHtml("No response saved.")}</p>`;
      const lines = source.split("\n");
      const html = [];
      let paragraph = [];
      let listType = "";
      let codeFence = false;
      let codeLines = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
        paragraph = [];
      }

      function closeList() {
        if (!listType) return;
        html.push(`</${listType}>`);
        listType = "";
      }

      function flushCodeFence() {
        if (!codeFence) return;
        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        codeFence = false;
        codeLines = [];
      }

      for (const line of lines) {
        if (/^```/.test(line.trim())) {
          flushParagraph();
          closeList();
          if (codeFence) {
            flushCodeFence();
          } else {
            codeFence = true;
            codeLines = [];
          }
          continue;
        }

        if (codeFence) {
          codeLines.push(line);
          continue;
        }

        const trimmed = line.trim();
        if (!trimmed) {
          flushParagraph();
          closeList();
          continue;
        }

        const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          closeList();
          const level = Math.min(heading[1].length + 1, 4);
          html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        if (unordered) {
          flushParagraph();
          if (listType !== "ul") {
            closeList();
            listType = "ul";
            html.push("<ul>");
          }
          html.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
          continue;
        }

        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
        if (ordered) {
          flushParagraph();
          if (listType !== "ol") {
            closeList();
            listType = "ol";
            html.push("<ol>");
          }
          html.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
          continue;
        }

        const quote = trimmed.match(/^>\s?(.+)$/);
        if (quote) {
          flushParagraph();
          closeList();
          html.push(`<blockquote><p>${renderInlineMarkdown(quote[1])}</p></blockquote>`);
          continue;
        }

        paragraph.push(trimmed);
      }

      flushParagraph();
      closeList();
      flushCodeFence();
      return html.join("");
    }

    function formatNumber(value) {
      if (typeof value !== "number" || Number.isNaN(value)) return "-";
      return new Intl.NumberFormat("en-US").format(Math.round(value));
    }

    function formatScore(value) {
      return typeof value === "number" ? value.toFixed(1) : "-";
    }

    function formatDate(value) {
      if (!value) return "Unknown";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
      });
    }

    function formatRelativeTime(value) {
      if (!value) return "";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      const diffMs = Date.now() - parsed.getTime();
      const diffMinutes = Math.round(diffMs / 60000);
      if (Math.abs(diffMinutes) < 1) return "just now";
      if (Math.abs(diffMinutes) < 60) return `${diffMinutes}m ago`;
      const diffHours = Math.round(diffMinutes / 60);
      if (Math.abs(diffHours) < 24) return `${diffHours}h ago`;
      const diffDays = Math.round(diffHours / 24);
      return `${diffDays}d ago`;
    }

    function clampText(text, limit) {
      const source = String(text || "").trim();
      if (!source) return "";
      if (source.length <= limit) return source;
      return source.slice(0, limit).trimEnd() + "...";
    }

    function currentStore() {
      return STATE.bootstrap?.store || null;
    }

    function readDocumentNoteDrafts() {
      try {
        const raw = window.localStorage.getItem("reasoningLab.documentNoteDrafts");
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_error) {
        return {};
      }
    }

    function writeDocumentNoteDrafts(drafts) {
      window.localStorage.setItem("reasoningLab.documentNoteDrafts", JSON.stringify(drafts || {}));
    }

    function persistDocumentNoteDraft(documentId, draft) {
      if (!documentId) return;
      const drafts = readDocumentNoteDrafts();
      const summary = String(draft?.summary || "");
      const labelId = String(draft?.labelId || "");
      if (!summary.trim() && !labelId) {
        delete drafts[documentId];
      } else {
        drafts[documentId] = {
          documentId,
          summary,
          labelId,
        };
      }
      writeDocumentNoteDrafts(drafts);
    }

    function clearDocumentNoteDraft(documentId) {
      if (!documentId) return;
      const drafts = readDocumentNoteDrafts();
      if (!(documentId in drafts)) return;
      delete drafts[documentId];
      writeDocumentNoteDrafts(drafts);
    }

    function clearAllDocumentNoteDrafts() {
      writeDocumentNoteDrafts({});
      STATE.draftDocumentNote = null;
      STATE.documentNoteStatus = null;
    }

    function readAnnotationCommentDrafts() {
      try {
        const raw = window.localStorage.getItem("reasoningLab.annotationCommentDrafts");
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_error) {
        return {};
      }
    }

    function writeAnnotationCommentDrafts(drafts) {
      window.localStorage.setItem("reasoningLab.annotationCommentDrafts", JSON.stringify(drafts || {}));
    }

    function annotationDraftKeyForAnnotation(annotation) {
      const annotationId = String(annotation?.id || "").trim();
      return annotationId ? `annotation:${annotationId}` : "";
    }

    function annotationDraftKeyForSelection(selection) {
      const documentId = String(selection?.document_id || selection?.documentId || "").trim();
      const start = Number(selection?.start);
      const end = Number(selection?.end);
      if (!documentId || !Number.isFinite(start) || !Number.isFinite(end) || end <= start) return "";
      return `selection:${documentId}:${start}:${end}`;
    }

    function annotationCommentDraftForContext(annotation = null, selection = null) {
      const drafts = readAnnotationCommentDrafts();
      const annotationKey = annotationDraftKeyForAnnotation(annotation);
      if (annotationKey && annotationKey in drafts) {
        return String(drafts[annotationKey]?.comment || "");
      }
      const selectionKey = annotationDraftKeyForSelection(selection);
      if (selectionKey && selectionKey in drafts) {
        return String(drafts[selectionKey]?.comment || "");
      }
      return String(annotation?.comment || "");
    }

    function currentAnnotationDraftKey() {
      const activeAnnotation = annotations().find((item) => item.id === STATE.activeAnnotationId) || null;
      if (activeAnnotation) {
        return annotationDraftKeyForAnnotation(activeAnnotation);
      }
      const matchedAnnotation = annotationForSelection(STATE.selection);
      if (matchedAnnotation) {
        return annotationDraftKeyForAnnotation(matchedAnnotation);
      }
      return annotationDraftKeyForSelection(STATE.selection);
    }

    function persistAnnotationCommentDraft(key, comment) {
      if (!key) return;
      const drafts = readAnnotationCommentDrafts();
      const nextComment = String(comment || "");
      if (!nextComment.trim()) {
        delete drafts[key];
      } else {
        drafts[key] = { comment: nextComment };
      }
      writeAnnotationCommentDrafts(drafts);
    }

    function clearAnnotationCommentDraft(key) {
      if (!key) return;
      const drafts = readAnnotationCommentDrafts();
      if (!(key in drafts)) return;
      delete drafts[key];
      writeAnnotationCommentDrafts(drafts);
    }

    function clearAllAnnotationCommentDrafts() {
      writeAnnotationCommentDrafts({});
      STATE.draftComment = "";
    }

    function queueDocumentNoteSave(documentId, action) {
      const current = documentNoteSaveQueues.get(documentId) || Promise.resolve();
      const next = current.catch(() => {}).then(action);
      const tracked = next.finally(() => {
        if (documentNoteSaveQueues.get(documentId) === tracked) {
          documentNoteSaveQueues.delete(documentId);
        }
      });
      documentNoteSaveQueues.set(documentId, tracked);
      return tracked;
    }

    function clearScheduledDocumentNoteSave(documentId = "") {
      if (!documentNoteSaveTimer) return;
      if (documentId && documentNoteSaveDocumentId && documentNoteSaveDocumentId !== documentId) return;
      window.clearTimeout(documentNoteSaveTimer);
      documentNoteSaveTimer = 0;
      documentNoteSaveDocumentId = "";
    }

    function clearScheduledAnnotationCommentSave(annotationId = "") {
      if (!commentSaveTimer) return;
      if (annotationId && commentSaveAnnotationId && commentSaveAnnotationId !== annotationId) return;
      window.clearTimeout(commentSaveTimer);
      commentSaveTimer = 0;
      commentSaveAnnotationId = "";
    }

    async function flushPendingDocumentNoteSave(documentId) {
      if (!documentId) return;
      if (documentNoteSaveTimer && documentNoteSaveDocumentId === documentId) {
        clearScheduledDocumentNoteSave(documentId);
        const savedNote = documentNoteForDocument(documentId);
        const draft = draftDocumentNoteFor(documentId);
        const draftSummary = draft?.summary || "";
        const draftLabelId = draft?.labelId || "";
        if (
          draft
          && (
            (savedNote?.summary || "") !== draftSummary
            || (savedNote?.label_id || "") !== draftLabelId
          )
        ) {
          await saveDocumentNote({
            documentId,
            summary: draftSummary,
            labelId: draftLabelId,
            render: false,
          });
        }
      }
      const pendingSave = documentNoteSaveQueues.get(documentId);
      if (pendingSave) {
        await pendingSave;
      }
    }

    async function flushOpenAnnotationCommentSave(documentId = "") {
      const activeAnnotation = annotations().find((item) => item.id === STATE.activeAnnotationId) || null;
      if (!activeAnnotation) return;
      if (documentId && activeAnnotation.document_id !== documentId) return;
      if (commentSaveTimer && commentSaveAnnotationId === activeAnnotation.id) {
        clearScheduledAnnotationCommentSave(activeAnnotation.id);
      }
      const commentInput = document.getElementById("annotationCommentInput");
      const nextComment = commentInput ? commentInput.value : STATE.draftComment;
      if ((activeAnnotation.comment || "") === nextComment) return;
      await saveAnnotation({ comment: nextComment, keepActive: true });
    }

    async function flushAllLocalDrafts() {
      const documentIds = new Set([
        ...Object.keys(readDocumentNoteDrafts()),
        ...documentNoteSaveQueues.keys(),
      ]);
      if (documentNoteSaveDocumentId) {
        documentIds.add(documentNoteSaveDocumentId);
      }
      for (const documentId of documentIds) {
        await flushPendingDocumentNoteSave(documentId);
      }
      await flushOpenAnnotationCommentSave();
    }

      if (!label) return "Model";
      if (/^gpt-5\.4/i.test(label)) return "GPT-5.4 xHigh";
      if (/sonnet\s*4\.6/i.test(label)) return "Sonnet 4.6";
      return label;
    }

      const label = compactSourceLabel(source);
      if (/^gpt-5\.4/i.test(label)) return "GPT-5.4";

      return [...new Set(

          .filter(Boolean)
      )].sort((left, right) => left.localeCompare(right));

    function caseDomainLabel(caseRow) {
      const prefix = String(caseRow?.question_id || "").split("_")[0];
      const label = {
        sw: "Coding",

        fin: "Finance",
        leg: "Legal",
        phys: "Physics",
      }[prefix];
      return label || "";
    }

    function selectedDomainsForCurrentDataset() {
      const available = availableDomains();
      const stored = Array.isArray(STATE.selectedDomainsByDataset?.[STATE.datasetKey])
        ? STATE.selectedDomainsByDataset[STATE.datasetKey]
        : null;
      if (stored === null) return null;
      const valid = stored
        .map((item) => String(item || "").trim())
        .filter((item) => available.includes(item));
      if (!valid.length && stored.length) return null;
      if (valid.length === available.length) return null;
      return valid;
    }

    function setSelectedDomainsForCurrentDataset(domains) {
      const available = availableDomains();
      if (domains === null) {
        delete STATE.selectedDomainsByDataset[STATE.datasetKey];
        window.localStorage.setItem(
          "reasoningLab.selectedDomainsByDataset",
          JSON.stringify(STATE.selectedDomainsByDataset),
        );
        return;
      }
      const valid = [...new Set((domains || [])
        .map((item) => String(item || "").trim())
        .filter((item) => available.includes(item)))].sort((left, right) => left.localeCompare(right));
      if (valid.length === available.length) {
        delete STATE.selectedDomainsByDataset[STATE.datasetKey];
      } else {
        STATE.selectedDomainsByDataset[STATE.datasetKey] = valid;
      }
      window.localStorage.setItem(
        "reasoningLab.selectedDomainsByDataset",
        JSON.stringify(STATE.selectedDomainsByDataset),
      );
    }

    function domainSummaryText() {
      const available = availableDomains();
      const selected = selectedDomainsForCurrentDataset();
      if (!available.length) return "All domains";
      if (selected === null) return "All domains";
      if (!selected.length) return "No domains";
      if (selected.length === 1) return selected[0];
      if (selected.length === 2) return selected.join(", ");
      return `${selected.length} domains`;
    }

    function populateDomainMultiSelect(summaryElement, listElement) {
      if (!(summaryElement instanceof Element) || !(listElement instanceof Element)) return;
      const available = availableDomains();
      const selected = selectedDomainsForCurrentDataset();

        ? available.map((domain) => `
          <div class="multi-select-option">
            <label class="multi-select-choice">
              <input
                type="checkbox"
                data-domain-filter="${escapeAttribute(domain)}"
                ${selected === null || selectedSet.has(domain) ? "checked" : ""}
              >
              <span>${escapeHtml(domain)}</span>
            </label>
            <button class="multi-select-only" type="button" data-domain-only="${escapeAttribute(domain)}">Only</button>
          </div>
        `).join("")
        : `<div class="panel-subtitle">No domains available.</div>`;
      bindOnlyDomainButtons(listElement);

    function categories() {
      const items = currentStore()?.categories || [];
      return [...items].sort((left, right) => {
        const leftOrder = Number(left?.order ?? 999);
        const rightOrder = Number(right?.order ?? 999);
        if (leftOrder !== rightOrder) return leftOrder - rightOrder;
        return String(left?.name || "").localeCompare(String(right?.name || ""));
      });
    }

    function categoryMap() {
      const map = new Map();
      categories().forEach((category) => map.set(category.id, category));
      return map;
    }

    function baselineVariantKey(source = currentSource()) {

    }

    function primaryVariant(caseRow, source = currentSource()) {
      const key = primaryVariantKey(source);
      return key ? (caseRow?.variants?.[key] || null) : null;
    }

    function sourceForKey(sourceKey) {
      return currentLabData()?.sources?.[sourceKey] || null;
    }

    function datasetForKeys(sourceKey, datasetKey) {
      return sourceForKey(sourceKey)?.datasets?.[datasetKey] || null;
    }

    function caseForKeys(sourceKey, datasetKey, questionId) {
      if (!questionId) return null;
      return (datasetForKeys(sourceKey, datasetKey)?.cases || []).find(
        (caseRow) => caseRow.question_id === questionId,
      ) || null;
    }

    function alternateSourceKeyForDataset(datasetKey = STATE.datasetKey) {
      const labData = currentLabData();
      if (!labData) return "";
      const orderedKeys = Array.isArray(labData.source_order) && labData.source_order.length
        ? labData.source_order
        : Object.keys(labData.sources || {});
      return orderedKeys.find((key) => key !== STATE.sourceKey && datasetForKeys(key, datasetKey)) || "";
    }

    function alternateSourceKey(questionId = STATE.selectedCaseId, datasetKey = STATE.datasetKey) {
      const compareSourceKey = alternateSourceKeyForDataset(datasetKey);
      if (!compareSourceKey) return "";
      return caseForKeys(compareSourceKey, datasetKey, questionId) ? compareSourceKey : "";
    }

    function sourceKeysForDataset(datasetKey = STATE.datasetKey) {
      const labData = currentLabData();
      if (!labData) return [];
      const orderedKeys = Array.isArray(labData.source_order) && labData.source_order.length
        ? labData.source_order
        : Object.keys(labData.sources || {});
      return orderedKeys.filter((key) => datasetForKeys(key, datasetKey));
    }

    function reviewSessionsForDocument(documentId) {
      if (!documentId) return [];
      return (currentStore()?.review_sessions || []).filter(
        (item) => item.document_id === documentId,
      );
    }

    function reviewEventsForDocument(documentId, sessionIds = null) {
      if (!documentId) return [];
      const resolvedSessionIds = sessionIds instanceof Set
        ? sessionIds
        : new Set(
          reviewSessionsForDocument(documentId)
            .map((item) => String(item?.id || "").trim())
            .filter(Boolean),
        );
      if (!resolvedSessionIds.size) return [];
      return (currentStore()?.review_events || []).filter((item) => {
        const sessionId = String(item?.session_id || "").trim();
        return sessionId && resolvedSessionIds.has(sessionId);
      });
    }

    function caseCombinedProgressMeta(caseRow, datasetKey = STATE.datasetKey) {
      const questionId = String(caseRow?.question_id || "");
      if (!questionId) return { key: "unreviewed", label: "Not labelled", tone: "slate", rank: 0 };
      const sourceKeys = sourceKeysForDataset(datasetKey);
      const progressItems = sourceKeys.map((sourceKey) => {
        const source = sourceForKey(sourceKey);
        const sourceCase = sourceKey === STATE.sourceKey
          ? caseRow
          : caseForKeys(sourceKey, datasetKey, questionId);
        if (!source || !sourceCase) return null;
        return caseProgressMeta(sourceCase, source);
      }).filter(Boolean);
      if (!progressItems.length) return { key: "unreviewed", label: "Not labelled", tone: "slate", rank: 0 };
      const sourceCount = progressItems.length;
      const reviewedCount = progressItems.filter((item) => item.key === "reviewed").length;
      const aiLabelledCount = progressItems.filter((item) => item.key === "ai_labelled").length;
      const startedCount = progressItems.filter((item) => item.key === "in_progress").length;
      if (reviewedCount === sourceCount) {
        return {
          key: sourceCount > 1 ? "both_labelled" : "one_labelled",
          label: sourceCount > 1 ? "Both labelled" : "Labelled",
          tone: "green",
          rank: 3,
        };
      }
      if (reviewedCount > 0) {
        return {
          key: "one_labelled",
          label: sourceCount > 1 ? "One labelled" : "Labelled",
          tone: "amber",
          rank: 2,
        };
      }
      if (aiLabelledCount > 0) {
        return {
          key: "ai_labelled",
          label: "AI labelled",
          tone: "blue",
          rank: 1,
        };
      }
      if (startedCount > 0) {
        return {
          key: "in_progress",
          label: "Started",
          tone: "blue",
          rank: 1,
        };
      }
      return {
        key: "unreviewed",
        label: "Not labelled",
        tone: "slate",
        rank: 0,
      };
    }

    function caseAiReviewMeta(caseRow, datasetKey = STATE.datasetKey) {
      const questionId = String(caseRow?.question_id || "");
      if (!questionId) {
        return {
          key: "none",
          label: "No AI labels",
          hasAnyAi: false,
          hasPendingAiReview: false,
          hasReviewedAi: false,
          aiCount: 0,
          pendingCount: 0,
          reviewedCount: 0,
          humanAddedCount: 0,
        };
      }
      const reviewStates = orderedSourcesForDataset(datasetKey)
        .slice(0, 2)
        .map((source) => {
          const sourceKey = String(source?.key || "");
          const sourceCase = sourceKey === STATE.sourceKey
            ? caseRow
            : caseForKeys(sourceKey, datasetKey, questionId);
          if (!source || !sourceCase) return null;
          const documentId = caseDocumentId(sourceCase, source);
          if (!documentId) return null;
          const reviewState = documentReviewState(documentId);
          if (!overallLabelCountsAsReviewed(reviewState.note)) return reviewState;
          return {
            ...reviewState,
            pendingAiItems: [],
            hasPendingAiReview: false,
          };
        }).filter(Boolean);
      const hasAnyAi = reviewStates.some((state) => state.hasAnyAi);
      const hasPendingAiReview = reviewStates.some((state) => state.hasPendingAiReview);
      const hasReviewedAi = reviewStates.some((state) => state.hasReviewedAi || state.humanAddedItems?.length);
      const aiCount = reviewStates.reduce((sum, state) => sum + Number(state.aiItems?.length || 0), 0);
      const pendingCount = reviewStates.reduce((sum, state) => sum + Number(state.pendingAiItems?.length || 0), 0);
      const reviewedCount = reviewStates.reduce((sum, state) => sum + Number(state.reviewedAiItems?.length || 0), 0);
      const humanAddedCount = reviewStates.reduce((sum, state) => sum + Number(state.humanAddedItems?.length || 0), 0);
      if (!hasAnyAi) {
        return {
          key: "none",
          label: "No AI labels",
          hasAnyAi,
          hasPendingAiReview,
          hasReviewedAi,
          aiCount,
          pendingCount,
          reviewedCount,
          humanAddedCount,
        };
      }
      if (hasPendingAiReview && (reviewedCount || humanAddedCount)) {
        return {
          key: "partially_reviewed",
          label: "Partially reviewed",
          hasAnyAi,
          hasPendingAiReview,
          hasReviewedAi,
          aiCount,
          pendingCount,
          reviewedCount,
          humanAddedCount,
        };
      }
      if (hasPendingAiReview) {
        return {
          key: "needs_review",
          label: "Needs review",
          hasAnyAi,
          hasPendingAiReview,
          hasReviewedAi,
          aiCount,
          pendingCount,
          reviewedCount,
          humanAddedCount,
        };
      }
      return {
        key: "reviewed_ai",
        label: hasReviewedAi ? "Reviewed AI" : "AI labelled",
        hasAnyAi,
        hasPendingAiReview,
        hasReviewedAi,
        aiCount,
        pendingCount,
        reviewedCount,
        humanAddedCount,
      };
    }

    function caseWorkflowFilterMeta(caseRow, datasetKey = STATE.datasetKey) {
      const progress = caseCombinedProgressMeta(caseRow, datasetKey);
      const aiReview = caseAiReviewMeta(caseRow, datasetKey);
      const isValidated = !aiReview.hasPendingAiReview && !["unreviewed", "in_progress"].includes(progress.key);

      if (progress.key === "unreviewed") {
        return {
          key: "unreviewed",
          label: "Not labelled",
          tone: "slate",
          rank: 0,
        };
      }

      if (isValidated) {
        return {
          key: "validated",
          label: "Validated",
          tone: "green",
          rank: 3,
        };
      }

      if (aiReview.key === "partially_reviewed" || ["one_labelled", "in_progress"].includes(progress.key)) {
        return {
          key: "in_progress",
          label: "In progress",
          tone: "amber",
          rank: 2,
        };
      }

      if (aiReview.hasPendingAiReview) {
        return {
          key: "needs_review",
          label: "Needs review",
          tone: "blue",
          rank: 1,
        };
      }

      return {
        key: "in_progress",
        label: "In progress",
        tone: "amber",
        rank: 2,
      };
    }

    function workflowFilterOptionLabel(key) {
      return {
        all: "All",
        unreviewed: "Not labelled",
        in_progress: "In progress",
        needs_review: "Needs review",
        validated: "Validated",
      }[key] || "All";
    }

    function workflowFilterOptionKeysForView(viewMode = STATE.viewMode) {
      return viewMode === "review"
        ? ["all", "needs_review", "in_progress", "validated"]
        : ["all", "unreviewed", "needs_review", "in_progress", "validated"];
    }

    function normalizeAnnotationFilterForView(value, viewMode = STATE.viewMode) {
      const normalized = String(value || "all").trim() || "all";
      return workflowFilterOptionKeysForView(viewMode).includes(normalized) ? normalized : "all";
    }

    function renderAnnotationFilterOptions(viewMode = STATE.viewMode) {
      return workflowFilterOptionKeysForView(viewMode).map((key) => (
        `<option value="${escapeAttribute(key)}">${escapeHtml(workflowFilterOptionLabel(key))}</option>`
      )).join("");
    }

    function syncAnnotationFilterSelect(select, viewMode = STATE.viewMode) {
      if (!select) return;
      const normalized = normalizeAnnotationFilterForView(STATE.annotationFilter, viewMode);
      select.innerHTML = renderAnnotationFilterOptions(viewMode);
      select.value = normalized;
    }

    function datasetWorkflowStats(dataset = currentDataset()) {
      const rows = dataset?.cases || [];
      const total = Number(dataset?.case_count) || rows.length || 0;
      const counts = {
        unreviewed: 0,
        needs_review: 0,
        in_progress: 0,
        validated: 0,
      };
      rows.forEach((caseRow) => {
        const workflow = caseWorkflowFilterMeta(caseRow, dataset?.key || STATE.datasetKey);
        counts[workflow.key] = (counts[workflow.key] || 0) + 1;
      });
      const percentFor = (key) => (
        total ? Math.round(((counts[key] || 0) / total) * 100) : 0
      );
      return {
        total,
        counts,
        percentFor,
      };
    }

    function scoreMeta(score) {
      if (typeof score === "number") {
        if (score >= 1.5) return SCORE_META[2];
        if (score >= 0.5) return SCORE_META[1];
        if (score >= 0) return SCORE_META[0];
      }
      return SCORE_META.missing;
    }

    function verdictKey(score) {
      if (typeof score === "number") {
        if (score >= 1.5) return "clear";
        if (score >= 0.5) return "partial";
        if (score >= 0) return "accepted";
      }
      return "missing";
    }

    function gradeRank(score) {
      return {
        accepted: 0,
        partial: 1,
        clear: 2,
        missing: 3,
      }[verdictKey(score)] ?? 3;
    }

    function filteredCases() {
      const dataset = currentDataset();
      if (!dataset) return [];
      const useSearchFilter = STATE.viewMode === "explorer" || STATE.viewMode === "review" || STATE.viewMode === "label" || STATE.viewMode === "report";
      const useLabellingFilters = STATE.viewMode === "explorer" || STATE.viewMode === "label" || STATE.viewMode === "review" || STATE.viewMode === "report";
      const query = useSearchFilter ? STATE.search.trim().toLowerCase() : "";
      const selectedDomainList = selectedDomainsForCurrentView();
      const selectedDomains = new Set(selectedDomainList || []);
      const trackedAiRunQuestionIds = STATE.viewMode === "explorer" && hasActiveAiRunForDataset(dataset.key || STATE.datasetKey)
        ? activeAiRunQuestionIdSetForDataset(dataset.key || STATE.datasetKey)
        : new Set();
      return dataset.cases.filter((caseRow) => {
        const primary = primaryVariant(caseRow);
        const progress = caseCombinedProgressMeta(caseRow, dataset.key || STATE.datasetKey);
        const aiReview = caseAiReviewMeta(caseRow, dataset.key || STATE.datasetKey);
        const workflow = caseWorkflowFilterMeta(caseRow, dataset.key || STATE.datasetKey);
        const reviewEntries = STATE.viewMode === "review"
          ? reviewEntriesForCase(caseRow, dataset.key || STATE.datasetKey)
          : [];
        if (STATE.viewMode === "review" && progress.key === "unreviewed") {
          return false;
        }
        if ((STATE.viewMode === "explorer" || STATE.viewMode === "review" || STATE.viewMode === "label" || STATE.viewMode === "report") && STATE.gradeFilter !== "all") {
          const caseVerdict = verdictKey(primary?.consensus_score);
          if (caseVerdict !== STATE.gradeFilter) return false;
        }
        const preserveActiveRunRow = trackedAiRunQuestionIds.has(String(caseRow?.question_id || ""));
        if (useLabellingFilters && STATE.annotationFilter !== "all" && !preserveActiveRunRow) {
          if (workflow.key !== STATE.annotationFilter) {
            return false;
          }
        }
        if (selectedDomainList !== null && !selectedDomains.has(caseDomainLabel(caseRow))) return false;
        if (!query) return true;
        const queryParts = STATE.viewMode === "review"
          ? reviewEntries.flatMap((item) => [
            item.source?.label,
            item.variant?.response_text,
            item.variant?.reasoning_summary,
            item.note?.summary,
            item.note?.label_id,
            item.note?.label_snapshot?.name,
            item.labelSource?.label,
            ...(item.annotations || []).map((annotation) => `${annotation.quote} ${annotation.comment} ${annotation.author} ${annotation.label_id}`),
          ])
          : [
            primary?.response_text,
            primary?.reasoning_summary,
            caseDocumentNote(caseRow)?.summary,
            caseDocumentNote(caseRow)?.label_id,
            caseDocumentNote(caseRow)?.label_snapshot?.name,
            caseDocumentNote(caseRow)?.author,
            ...(annotationsForCase(caseRow).map((item) => `${item.quote} ${item.comment} ${item.author} ${item.label_id}`)),
          ];
        const haystack = [
          caseRow.question_id,
          caseDomainLabel(caseRow),
          caseRow.domain,
          caseRow.technique,
          caseRow.question,
          caseRow.nonsensical_element,
          progress.label,
          aiReview.label,
          ...queryParts,
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function sortReviewCases(rows) {
      return [...rows].sort((left, right) => {
        const leftWorkflow = caseWorkflowFilterMeta(left);
        const rightWorkflow = caseWorkflowFilterMeta(right);
        const leftAiReview = caseAiReviewMeta(left);
        const rightAiReview = caseAiReviewMeta(right);
        const leftEntries = reviewEntriesForCase(left);
        const rightEntries = reviewEntriesForCase(right);
        const leftLabelledCount = leftEntries.filter((item) => item.progress?.key !== "unreviewed").length;
        const rightLabelledCount = rightEntries.filter((item) => item.progress?.key !== "unreviewed").length;
        const leftOverall = leftEntries.map((item) => item.note?.label_id || "").filter(Boolean);
        const rightOverall = rightEntries.map((item) => item.note?.label_id || "").filter(Boolean);
        const leftDisagreement = Number(leftOverall.length > 1 && new Set(leftOverall).size > 1);
        const rightDisagreement = Number(rightOverall.length > 1 && new Set(rightOverall).size > 1);
        const leftGradeGap = leftEntries.length >= 2
          ? Math.abs(gradeRank(leftEntries[0].variant?.consensus_score) - gradeRank(leftEntries[1].variant?.consensus_score))
          : -1;
        const rightGradeGap = rightEntries.length >= 2
          ? Math.abs(gradeRank(rightEntries[0].variant?.consensus_score) - gradeRank(rightEntries[1].variant?.consensus_score))
          : -1;
        const workflowDiff = rightWorkflow.rank - leftWorkflow.rank;
        if (workflowDiff) return workflowDiff;
        const pendingDiff = (rightAiReview.pendingCount || 0) - (leftAiReview.pendingCount || 0);
        if (pendingDiff) return pendingDiff;
        const labelledDiff = rightLabelledCount - leftLabelledCount;
        if (labelledDiff) return labelledDiff;
        const disagreementDiff = rightDisagreement - leftDisagreement;
        if (disagreementDiff) return disagreementDiff;
        const gradeGapDiff = rightGradeGap - leftGradeGap;
        if (gradeGapDiff) return gradeGapDiff;
        return String(left.question_id || "").localeCompare(String(right.question_id || ""));
      });
    }

    function sortCases(rows) {
      if (STATE.viewMode === "review") {
        return sortReviewCases(rows);
      }
      const items = [...rows];
      const sortKey = normalizeCaseSortValue(STATE.caseSort);
      const trackedOrder = sortKey === "recommended" && STATE.viewMode === "explorer" && hasActiveAiRunForDataset(STATE.datasetKey)
        ? activeAiRunQuestionOrderForDataset(STATE.datasetKey)
        : null;
      if (trackedOrder && Object.keys(trackedOrder).length) {
        items.sort((left, right) => {
          const leftQuestionId = String(left?.question_id || "");
          const rightQuestionId = String(right?.question_id || "");
          const leftIndex = trackedOrder[leftQuestionId];
          const rightIndex = trackedOrder[rightQuestionId];
          const leftTracked = Number.isFinite(leftIndex);
          const rightTracked = Number.isFinite(rightIndex);
          if (leftTracked && rightTracked) return leftIndex - rightIndex;
          if (leftTracked) return -1;
          if (rightTracked) return 1;
          return leftQuestionId.localeCompare(rightQuestionId);
        });
        return items;
      }
      const primarySource = currentSource();
      const compareSourceKey = alternateSourceKeyForDataset(STATE.datasetKey);
      const compareSource = compareSourceKey ? sourceForKey(compareSourceKey) : null;
      const compareCaseMap = new Map(
        ((compareSource && datasetForKeys(compareSourceKey, STATE.datasetKey)?.cases) || [])
          .map((caseRow) => [caseRow.question_id, caseRow]),
      );
      items.sort((left, right) => {
        const leftProgress = caseProgressMeta(left);
        const rightProgress = caseProgressMeta(right);
        const leftCount = caseAnnotationCount(left);
        const rightCount = caseAnnotationCount(right);
        const leftRecent = Date.parse(caseLastTouched(left) || "") || 0;
        const rightRecent = Date.parse(caseLastTouched(right) || "") || 0;
        const leftPrimary = primaryVariant(left, primarySource);
        const rightPrimary = primaryVariant(right, primarySource);
        const leftPrimaryGrade = gradeRank(leftPrimary?.consensus_score);
        const rightPrimaryGrade = gradeRank(rightPrimary?.consensus_score);
        const leftTrace = Number(leftPrimary?.response_reasoning_tokens ?? -Infinity);
        const rightTrace = Number(rightPrimary?.response_reasoning_tokens ?? -Infinity);
        const leftPrimaryBrowseState = Number(caseHasStartedReview(left, primarySource));
        const rightPrimaryBrowseState = Number(caseHasStartedReview(right, primarySource));
        const leftPrimaryOverallLabel = documentNoteLabelName(caseDocumentNote(left, primarySource));
        const rightPrimaryOverallLabel = documentNoteLabelName(caseDocumentNote(right, primarySource));
        const leftPrimaryMissingOverall = Number(!leftPrimaryOverallLabel);
        const rightPrimaryMissingOverall = Number(!rightPrimaryOverallLabel);
        const leftCompareCase = compareCaseMap.get(left.question_id) || null;
        const rightCompareCase = compareCaseMap.get(right.question_id) || null;
        const leftCompareVariant = leftCompareCase ? primaryVariant(leftCompareCase, compareSource) : null;
        const rightCompareVariant = rightCompareCase ? primaryVariant(rightCompareCase, compareSource) : null;
        const leftCompareGrade = gradeRank(leftCompareVariant?.consensus_score);
        const rightCompareGrade = gradeRank(rightCompareVariant?.consensus_score);
        const leftCompareBrowseState = Number(
          leftCompareCase && compareSource ? caseHasStartedReview(leftCompareCase, compareSource) : false,
        );
        const rightCompareBrowseState = Number(
          rightCompareCase && compareSource ? caseHasStartedReview(rightCompareCase, compareSource) : false,
        );
        const leftCompareOverallLabel = leftCompareCase && compareSource
          ? documentNoteLabelName(caseDocumentNote(leftCompareCase, compareSource))
          : "";
        const rightCompareOverallLabel = rightCompareCase && compareSource
          ? documentNoteLabelName(caseDocumentNote(rightCompareCase, compareSource))
          : "";
        const leftCompareMissingOverall = Number(!leftCompareOverallLabel);
        const rightCompareMissingOverall = Number(!rightCompareOverallLabel);
        const leftQuestion = String(left.question || "");
        const rightQuestion = String(right.question || "");
        const leftQuestionId = String(left.question_id || "");
        const rightQuestionId = String(right.question_id || "");
        const leftDomain = caseDomainLabel(left) || "";
        const rightDomain = caseDomainLabel(right) || "";

        if (sortKey === "question_asc") {
          const diff = leftQuestion.localeCompare(rightQuestion);
          if (diff) return diff;
        } else if (sortKey === "question_desc") {
          const diff = rightQuestion.localeCompare(leftQuestion);
          if (diff) return diff;
        } else if (sortKey === "question_id_asc") {
          const diff = leftQuestionId.localeCompare(rightQuestionId);
          if (diff) return diff;
        } else if (sortKey === "question_id_desc") {
          const diff = rightQuestionId.localeCompare(leftQuestionId);
          if (diff) return diff;
        } else if (sortKey === "domain_asc") {
          const diff = leftDomain.localeCompare(rightDomain);
          if (diff) return diff;
        } else if (sortKey === "domain_desc") {
          const diff = rightDomain.localeCompare(leftDomain);
          if (diff) return diff;
        } else if (sortKey === "updated_desc") {
          const diff = rightRecent - leftRecent;
          if (diff) return diff;
        } else if (sortKey === "updated_asc") {
          const diff = leftRecent - rightRecent;
          if (diff) return diff;
        } else if (sortKey === "highlights_desc") {
          const diff = rightCount - leftCount;
          if (diff) return diff;
        } else if (sortKey === "highlights_asc") {
          const diff = leftCount - rightCount;
          if (diff) return diff;
        } else if (sortKey === "primary_grade_asc") {
          const diff = leftPrimaryGrade - rightPrimaryGrade;
          if (diff) return diff;
        } else if (sortKey === "primary_grade_desc") {
          const diff = rightPrimaryGrade - leftPrimaryGrade;
          if (diff) return diff;
        } else if (sortKey === "primary_labelled_desc") {
          const diff = rightPrimaryBrowseState - leftPrimaryBrowseState;
          if (diff) return diff;
        } else if (sortKey === "primary_labelled_asc") {
          const diff = leftPrimaryBrowseState - rightPrimaryBrowseState;
          if (diff) return diff;
        } else if (sortKey === "primary_overall_label_asc") {
          const missingDiff = leftPrimaryMissingOverall - rightPrimaryMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = leftPrimaryOverallLabel.localeCompare(rightPrimaryOverallLabel);
          if (diff) return diff;
        } else if (sortKey === "primary_overall_label_desc") {
          const missingDiff = leftPrimaryMissingOverall - rightPrimaryMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = rightPrimaryOverallLabel.localeCompare(leftPrimaryOverallLabel);
          if (diff) return diff;
        } else if (sortKey === "compare_grade_asc") {
          const diff = leftCompareGrade - rightCompareGrade;
          if (diff) return diff;
        } else if (sortKey === "compare_grade_desc") {
          const diff = rightCompareGrade - leftCompareGrade;
          if (diff) return diff;
        } else if (sortKey === "compare_labelled_desc") {
          const diff = rightCompareBrowseState - leftCompareBrowseState;
          if (diff) return diff;
        } else if (sortKey === "compare_labelled_asc") {
          const diff = leftCompareBrowseState - rightCompareBrowseState;
          if (diff) return diff;
        } else if (sortKey === "compare_overall_label_asc") {
          const missingDiff = leftCompareMissingOverall - rightCompareMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = leftCompareOverallLabel.localeCompare(rightCompareOverallLabel);
          if (diff) return diff;
        } else if (sortKey === "compare_overall_label_desc") {
          const missingDiff = leftCompareMissingOverall - rightCompareMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = rightCompareOverallLabel.localeCompare(leftCompareOverallLabel);
          if (diff) return diff;
        } else {
          const progressDiff = leftProgress.rank - rightProgress.rank;
          if (progressDiff) return progressDiff;
          const gradeDiff = leftPrimaryGrade - rightPrimaryGrade;
          if (gradeDiff) return gradeDiff;
          const traceDiff = rightTrace - leftTrace;
          if (traceDiff) return traceDiff;
          const countDiff = rightCount - leftCount;
          if (countDiff) return countDiff;
        }

        return leftQuestionId.localeCompare(rightQuestionId);
      });
      return items;
    }

    function ensureSelection(rows) {
      const selectedRow = currentSelectedCaseInDataset();
      if (!rows.length) {
        if (!selectedRow) {
          setSelectedCaseId("");
        }
        return;
      }
      if (!selectedRow) {
        setSelectedCaseId(rows[0].question_id);
      }
    }

    function selectedCase(rows) {
      return rows.find((row) => row.question_id === STATE.selectedCaseId) || currentSelectedCaseInDataset() || null;
    }

    function currentSelectedCaseInDataset() {
      const dataset = currentDataset();
      if (!dataset || !STATE.selectedCaseId) return null;
      return (dataset.cases || []).find((row) => row.question_id === STATE.selectedCaseId) || null;
    }

    function caseRailRows(rows) {
      return rows;
    }

    function syncCaseRailPinnedIndex(rows) {
      const index = rows.findIndex((row) => row.question_id === STATE.selectedCaseId);
      STATE.selectedCasePinnedIndex = index >= 0 ? index : null;
    }

    function annotations() {
      return currentStore()?.annotations || [];
    }

    function documentNotes() {
      return currentStore()?.document_notes || [];
    }

    function documentNoteForDocument(documentId) {
      return documentNotes().find((item) => item.document_id === documentId) || null;
    }

    function caseDocumentId(caseRow, source = currentSource()) {
      return reasonDocument(caseRow, source)?.document_id || "";
    }

    function caseDocumentNote(caseRow, source = currentSource()) {
      const documentId = caseDocumentId(caseRow, source);
      return documentId ? documentNoteForDocument(documentId) : null;
    }

    function documentNoteLabelName(note) {
      if (!note) return "";
      if (note?.label_snapshot?.name) return String(note.label_snapshot.name);
      if (note?.label_id) return String(categoryMap().get(note.label_id)?.name || note.label_id);
      return "";
    }

    function documentNoteLabelMeta(note) {
      if (!note) return null;
      const category = note?.label_id ? categoryMap().get(note.label_id) : null;
      const name = documentNoteLabelName(note);
      if (!name) return null;
      return {
        name,
        color: String(note?.label_snapshot?.color || category?.color || "#8aa19b"),
      };
    }

    function renderOverallLabelTag(labelMeta) {
      if (!labelMeta) return `<span class="explorer-overall-empty">—</span>`;
      return `
        <span class="explorer-overall-tag" style="--label-color:${escapeAttribute(labelMeta.color)}" title="${escapeAttribute(labelMeta.name)}">
          <span class="swatch" style="background:${escapeAttribute(labelMeta.color)}"></span>
          <span class="label-text">${escapeHtml(labelMeta.name)}</span>
        </span>
      `;
    }

    function labelSourceMetaForItems(items) {
      const records = (items || []).filter(Boolean);
      const hasAiAuthored = records.some((item) => recordIsAiLabelled(item));
      const hasHumanAuthored = records.some((item) => !recordIsAiLabelled(item));
      if (hasAiAuthored && hasHumanAuthored) {
        return { label: "Human + AI", tone: "mixed" };
      }
      if (hasHumanAuthored) {
        return { label: "Human", tone: "human" };
      }
      if (hasAiAuthored) {
        return { label: "AI", tone: "ai" };
      }
      return null;
    }

    function documentLabelSourceMeta(documentId) {
      if (!documentId) return null;
      const note = documentNoteForDocument(documentId);
      const spanItems = annotationsForDocument(documentId);
      return labelSourceMetaForItems([
        ...(note ? [note] : []),
        ...spanItems,
      ]);
    }

    function reviewEntriesForCase(caseRow, datasetKey = STATE.datasetKey) {
      return orderedSourcesForDataset(datasetKey)
        .slice(0, 2)
        .map((source) => {
          const sourceCase = source?.key === STATE.sourceKey
            ? caseRow
            : caseForKeys(source?.key, datasetKey, caseRow?.question_id);
          const variant = sourceCase ? primaryVariant(sourceCase, source) : null;
          const document = sourceCase ? reasonDocument(sourceCase, source) : null;
          const documentId = document?.document_id || "";
          return {
            source,
            caseRow: sourceCase,
            variant,
            document,
            documentId,
            note: documentId ? documentNoteForDocument(documentId) : null,
            annotations: documentId ? annotationsForDocument(documentId) : [],
            progress: sourceCase ? caseProgressMeta(sourceCase, source) : { key: "unreviewed", rank: 0 },
            labelSource: documentId ? documentLabelSourceMeta(documentId) : null,
          };
        })
        .filter((item) => item.source);
    }

    function reportSourceEntries(dataset = currentDataset(), scopedRows = null) {
      const datasetKey = dataset?.key || STATE.datasetKey;
      const scopedQuestionIds = Array.isArray(scopedRows)
        ? new Set(scopedRows.map((caseRow) => String(caseRow?.question_id || "")).filter(Boolean))
        : null;
      return orderedSourcesForDataset(datasetKey)
        .slice(0, 2)
        .flatMap((source) => {
          const sourceDataset = datasetForKeys(source?.key, datasetKey);
          return (sourceDataset?.cases || [])
            .filter((caseRow) => !scopedQuestionIds || scopedQuestionIds.has(String(caseRow?.question_id || "")))
            .map((caseRow) => {
            const variant = primaryVariant(caseRow, source);
            const document = reasonDocument(caseRow, source);
            const documentId = document?.document_id || "";
            const note = documentId ? documentNoteForDocument(documentId) : null;
            return {
              source,
              caseRow,
              variant,
              document,
              documentId,
              note,
              summary: String(note?.summary || "").trim(),
              labelMeta: documentNoteLabelMeta(note),
              verdict: scoreMeta(variant?.consensus_score),
              domain: caseDomainLabel(caseRow) || caseRow?.domain || "",
              labelSource: documentId ? documentLabelSourceMeta(documentId) : null,
              annotations: documentId ? annotationsForDocument(documentId) : [],
            };
          });
        })
        .filter((item) => item?.source && item?.caseRow);
    }

    function reportOverallNoteEntries(dataset = currentDataset(), scopedRows = null) {
      return reportSourceEntries(dataset, scopedRows)
        .filter((entry) => entry.summary || entry.labelMeta)
        .sort((left, right) => {
          const leftReviewed = overallLabelCountsAsReviewed(left.note) ? 1 : 0;
          const rightReviewed = overallLabelCountsAsReviewed(right.note) ? 1 : 0;
          if (rightReviewed !== leftReviewed) return rightReviewed - leftReviewed;
          const leftHuman = recordIsHumanReviewed(left.note) ? 1 : 0;
          const rightHuman = recordIsHumanReviewed(right.note) ? 1 : 0;
          if (rightHuman !== leftHuman) return rightHuman - leftHuman;
          const summaryDiff = right.summary.length - left.summary.length;
          if (summaryDiff) return summaryDiff;
          const leftTime = Date.parse(String(left.note?.updated_at_utc || "")) || 0;
          const rightTime = Date.parse(String(right.note?.updated_at_utc || "")) || 0;
          if (rightTime !== leftTime) return rightTime - leftTime;
          return String(left.caseRow?.question_id || "").localeCompare(String(right.caseRow?.question_id || ""));
        });
    }

    function scoreMetaForVerdictKey(key) {
      return {
        clear: SCORE_META[2],
        partial: SCORE_META[1],
        accepted: SCORE_META[0],
        missing: SCORE_META.missing,
      }[key] || SCORE_META.missing;
    }

    function reportGradeStatsForSource(sourceKey, entries = reportSourceEntries()) {
      const source = sourceForKey(sourceKey);
      const sourceEntries = entries.filter((entry) => entry.source?.key === sourceKey);
      const total = sourceEntries.length;
      const counts = {
        clear: 0,
        partial: 0,
        accepted: 0,
        missing: 0,
      };
      sourceEntries.forEach((entry) => {
        counts[verdictKey(entry.variant?.consensus_score)] += 1;
      });
      const rows = ["clear", "partial", "accepted", "missing"].map((key) => ({
        key,
        count: counts[key] || 0,
        percent: total ? Math.round(((counts[key] || 0) / total) * 100) : 0,
        meta: scoreMetaForVerdictKey(key),
      }));
      return {
        source,
        total,
        rows,
      };
    }

    function reportNotesForSource(sourceKey, entries = reportOverallNoteEntries()) {
      return entries.filter((entry) => entry.source?.key === sourceKey && entry.summary);
    }

    function reviewRowHasContent(caseRow, datasetKey = STATE.datasetKey) {
      return reviewEntriesForCase(caseRow, datasetKey).some((item) => item.progress?.key !== "unreviewed");
    }

    function aiLabellingMeta() {
      return STATE.bootstrap?.app?.ai_labeling || {
        enabled: false,
        default_config_id: "",
        configs: [],
      };
    }

    function selectedExplorerQuestionIdsForCurrentDataset() {
      const stored = STATE.selectedExplorerQuestionIdsByDataset?.[STATE.datasetKey];
      return Array.isArray(stored) ? stored : [];
    }

    function setSelectedExplorerQuestionIdsForCurrentDataset(questionIds) {
      const normalized = [...new Set(
        (questionIds || [])
          .map((questionId) => String(questionId || "").trim())
          .filter(Boolean),
      )];
      STATE.selectedExplorerQuestionIdsByDataset = {
        ...(STATE.selectedExplorerQuestionIdsByDataset || {}),
        [STATE.datasetKey]: normalized,
      };
    }

    function selectedExplorerQuestionSetForCurrentDataset() {
      return new Set(selectedExplorerQuestionIdsForCurrentDataset());
    }

    function clearSelectedExplorerQuestionsForCurrentDataset() {
      setSelectedExplorerQuestionIdsForCurrentDataset([]);
    }

    function lastExplorerSelectionQuestionIdForCurrentDataset() {
      return String(STATE.lastExplorerSelectionQuestionIdByDataset?.[STATE.datasetKey] || "").trim();
    }

    function setLastExplorerSelectionQuestionIdForCurrentDataset(questionId) {
      const normalizedQuestionId = String(questionId || "").trim();
      STATE.lastExplorerSelectionQuestionIdByDataset = {
        ...(STATE.lastExplorerSelectionQuestionIdByDataset || {}),
        [STATE.datasetKey]: normalizedQuestionId,
      };
    }

    function setExplorerQuestionSelected(questionId, selected) {
      const next = selectedExplorerQuestionSetForCurrentDataset();
      const normalizedQuestionId = String(questionId || "").trim();
      if (!normalizedQuestionId) return;
      if (selected) {
        next.add(normalizedQuestionId);
      } else {
        next.delete(normalizedQuestionId);
      }
      setSelectedExplorerQuestionIdsForCurrentDataset([...next]);
    }

    function setExplorerQuestionRangeSelected(startQuestionId, endQuestionId, selected, rows = sortCases(filteredCases())) {
      const normalizedStart = String(startQuestionId || "").trim();
      const normalizedEnd = String(endQuestionId || "").trim();
      if (!normalizedStart || !normalizedEnd) return;
      const visibleQuestionIds = (rows || [])
        .map((caseRow) => String(caseRow?.question_id || "").trim())
        .filter(Boolean);
      const startIndex = visibleQuestionIds.indexOf(normalizedStart);
      const endIndex = visibleQuestionIds.indexOf(normalizedEnd);
      if (startIndex === -1 || endIndex === -1) {
        setExplorerQuestionSelected(normalizedEnd, selected);
        return;
      }
      const [rangeStart, rangeEnd] = startIndex <= endIndex
        ? [startIndex, endIndex]
        : [endIndex, startIndex];
      const next = selectedExplorerQuestionSetForCurrentDataset();
      visibleQuestionIds.slice(rangeStart, rangeEnd + 1).forEach((questionId) => {
        if (selected) {
          next.add(questionId);
        } else {
          next.delete(questionId);
        }
      });
      setSelectedExplorerQuestionIdsForCurrentDataset([...next]);
    }

    function runTargetDocumentsForCase(caseRow, datasetKey = STATE.datasetKey) {
      if (!caseRow?.question_id) return [];
      return orderedSourcesForDataset(datasetKey)
        .slice(0, 2)
        .map((source) => {
          const sourceCase = source?.key === STATE.sourceKey
            ? caseRow
            : caseForKeys(source?.key, datasetKey, caseRow.question_id);
          const document = sourceCase ? reasonDocument(sourceCase, source) : null;
          return document?.document_id ? {
            documentId: String(document.document_id),
            questionId: String(caseRow.question_id || ""),
            sourceKey: String(source?.key || ""),
          } : null;
        })
        .filter(Boolean);
    }

    function selectedRunTargets(rows = currentDataset()?.cases || []) {
      const selectedQuestionIds = selectedExplorerQuestionSetForCurrentDataset();
      if (!selectedQuestionIds.size) return [];
      const targets = [];
      rows.forEach((caseRow) => {
        if (!selectedQuestionIds.has(String(caseRow?.question_id || ""))) return;
        targets.push(...runTargetDocumentsForCase(caseRow, STATE.datasetKey));
      });
      const seenDocumentIds = new Set();
      return targets.filter((target) => {
        const documentId = String(target?.documentId || "");
        if (!documentId || seenDocumentIds.has(documentId)) return false;
        seenDocumentIds.add(documentId);
        return true;
      });
    }

    function selectedRunDocumentIds(rows = currentDataset()?.cases || []) {
      return selectedRunTargets(rows).map((target) => target.documentId);
    }

    function recordIsHumanAdded(record) {
      if (!record) return false;
      return (
        !recordIsAiLabelled(record)
        && recordIsHumanReviewed(record)
        && String(record.review_origin || "").trim() === "human_addition"
        && Boolean(String(record.review_session_id || "").trim())
      );
    }

    function renderStatusPill(label, tone) {
      return `<span class="status-pill ${escapeHtml(tone || "")}">${escapeHtml(label || "")}</span>`;

    function renderExplorerRunStatusPill(meta) {

          <span class="run-status-dot" aria-hidden="true"></span>
