    async function requestJson(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      const hasBody = options.body !== undefined && options.body !== null;
      if (hasBody && !Object.keys(headers).some((key) => key.toLowerCase() === "content-type")) {
        headers["Content-Type"] = "application/json";
      }
      const response = await fetch(url, {
        ...options,
        headers,
      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

    async function loadBootstrapPayload() {
      if (isStaticMode()) {
        if (!RUNTIME.staticBootstrapUrl) {
          throw new Error("Static mode is enabled but no bootstrap snapshot URL was configured.");
        }
        return requestJson(RUNTIME.staticBootstrapUrl);
      }
      return requestJson("/api/bootstrap");
    }

    async function apiRequest(url, options = {}) {
      if (isReadOnlyMode()) {
        throw new Error(readOnlyMessage());
      }
      return requestJson(url, options);
    }

    async function bootstrap() {
      const payload = await loadBootstrapPayload();
      STATE.bootstrap = payload;
      STATE.runtimeMode = payload?.app?.mode === "static" ? "static" : RUNTIME.mode;
      STATE.readOnly = Boolean(payload?.app?.read_only ?? RUNTIME.readOnly);
      const labData = payload.lab || {};
      const preferredSourceKey = labData?.sources?.[STATE.sourceKey]
        ? STATE.sourceKey
        : (labData.default_source_key || labData.source_order?.[0] || Object.keys(labData.sources || {})[0] || "gpt54_high");
      setSourceKey(preferredSourceKey);
      const source = labData?.sources?.[preferredSourceKey] || {};
      const preferredDatasetKey = source?.datasets?.[STATE.datasetKey]
        ? STATE.datasetKey
        : (source?.datasets?.v2 ? "v2" : Object.keys(source?.datasets || {})[0] || "v1");
      setDatasetKey(preferredDatasetKey);
      if (!STATE.selectedCategoryId) {
        const firstCategory = (payload.store?.categories || [])[0];
        STATE.selectedCategoryId = firstCategory?.id || "";
      }
      if (!isReadOnlyMode() && activeAiRunIds().length) {
        ensureAiRunPolling();
      } else {
        syncActiveAiRunExplorerState();
      }
      render();
    }

    async function refreshStoreOnly() {
      const payload = await loadBootstrapPayload();
      if (STATE.bootstrap) {
        STATE.bootstrap.app = payload.app;
        STATE.bootstrap.lab = payload.lab;
        STATE.bootstrap.store = payload.store;
      } else {
        STATE.bootstrap = payload;
      }
    }

    async function refreshStoreOnlyBestEffort() {
      try {
        await refreshStoreOnly();
      } catch (error) {
        console.warn("Store refresh failed after a successful mutation.", error);
      }
    }

    function upsertDocumentNoteInStore(note, documentId) {
      if (!STATE.bootstrap?.store || !documentId) return;
      const items = Array.isArray(STATE.bootstrap.store.document_notes)
        ? STATE.bootstrap.store.document_notes
        : [];
      const nextItems = items.filter((item) => item.document_id !== documentId);
      if (note) {
        nextItems.push(note);
        nextItems.sort((left, right) => {
          const datasetDiff = String(left.dataset_key || "").localeCompare(String(right.dataset_key || ""));
          if (datasetDiff) return datasetDiff;
          const questionDiff = String(left.question_id || "").localeCompare(String(right.question_id || ""));
          if (questionDiff) return questionDiff;
          return String(left.document_id || "").localeCompare(String(right.document_id || ""));
        });
      }
      STATE.bootstrap.store.document_notes = nextItems;
    }

    function replaceDocumentAnnotationsInStore(documentId, nextAnnotations) {
      if (!STATE.bootstrap?.store || !documentId) return;
      const items = Array.isArray(STATE.bootstrap.store.annotations)
        ? STATE.bootstrap.store.annotations
        : [];
      const replacement = Array.isArray(nextAnnotations) ? nextAnnotations : [];
      const keptItems = items.filter((item) => item.document_id !== documentId);
      STATE.bootstrap.store.annotations = [...keptItems, ...replacement].sort((left, right) => {
        const datasetDiff = String(left.dataset_key || "").localeCompare(String(right.dataset_key || ""));
        if (datasetDiff) return datasetDiff;
        const questionDiff = String(left.question_id || "").localeCompare(String(right.question_id || ""));
        if (questionDiff) return questionDiff;
        const documentDiff = String(left.document_id || "").localeCompare(String(right.document_id || ""));
        if (documentDiff) return documentDiff;
        const startDiff = Number(left.start || 0) - Number(right.start || 0);
        if (startDiff) return startDiff;
        return Number(left.end || 0) - Number(right.end || 0);
      });
    }

    function upsertAnnotationInStore(annotation) {
      if (!STATE.bootstrap?.store || !annotation?.id) return;
      const items = Array.isArray(STATE.bootstrap.store.annotations)
        ? STATE.bootstrap.store.annotations
        : [];
      const nextItems = items.filter((item) => item.id !== annotation.id);
      nextItems.push(annotation);
      STATE.bootstrap.store.annotations = nextItems.sort((left, right) => {
        const datasetDiff = String(left.dataset_key || "").localeCompare(String(right.dataset_key || ""));
        if (datasetDiff) return datasetDiff;
        const questionDiff = String(left.question_id || "").localeCompare(String(right.question_id || ""));
        if (questionDiff) return questionDiff;
        const documentDiff = String(left.document_id || "").localeCompare(String(right.document_id || ""));
        if (documentDiff) return documentDiff;
        const startDiff = Number(left.start || 0) - Number(right.start || 0);
        if (startDiff) return startDiff;
        return Number(left.end || 0) - Number(right.end || 0);
      });
    }

    function applyAiLabelResultInStore(documentId, result, mode) {
      if (!documentId || !STATE.bootstrap?.store) return;
      const nextAiAnnotations = Array.isArray(result?.annotations) ? result.annotations : [];
      const currentAnnotations = annotationsForDocument(documentId);
      const currentNote = documentNoteForDocument(documentId);
      if (mode === "replace") {
        replaceDocumentAnnotationsInStore(documentId, nextAiAnnotations);
        upsertDocumentNoteInStore(result?.document_note || null, documentId);
        return;
      }
      const preservedAnnotations = currentAnnotations.filter(
        (item) => !(recordIsAiLabelled(item) && !recordIsHumanReviewed(item)),
      );
      replaceDocumentAnnotationsInStore(documentId, [...preservedAnnotations, ...nextAiAnnotations]);
      if (currentNote && recordIsAiLabelled(currentNote) && !recordIsHumanReviewed(currentNote)) {
        upsertDocumentNoteInStore(null, documentId);
      }
      if (result?.document_note) {
        upsertDocumentNoteInStore(result.document_note, documentId);
      }
    }

    function clearPendingAiLabelsFromStore(documentId) {
      if (!documentId || !STATE.bootstrap?.store) return;
      const keptAnnotations = annotationsForDocument(documentId).filter(
        (item) => !(recordIsAiLabelled(item) && !recordIsHumanReviewed(item)),
      );
      replaceDocumentAnnotationsInStore(documentId, keptAnnotations);
      const note = documentNoteForDocument(documentId);
      if (note && recordIsAiLabelled(note) && !recordIsHumanReviewed(note)) {
        upsertDocumentNoteInStore(null, documentId);
      }
    }

    function ensureAiRunPolling() {
      if (aiRunPollTimer || !activeAiRunIds().length) return;
      aiRunPollTimer = window.setInterval(async () => {
        if (!activeAiRunIds().length) {
          window.clearInterval(aiRunPollTimer);
          aiRunPollTimer = 0;
          return;
        }
        try {
          await refreshStoreOnly();
          render();
          if (!activeAiRunIds().length && aiRunPollTimer) {
            window.clearInterval(aiRunPollTimer);
            aiRunPollTimer = 0;
          }
        } catch (error) {
          console.warn("AI run poll failed.", error);
        }
      }, 2500);
    }

    async function startSelectedAiRun() {
      const aiMeta = aiLabellingMeta();
      const currentRows = sortCases(filteredCases());
      const selectedTargets = selectedRunTargets(currentDataset()?.cases || []);
      const documentIds = selectedTargets.map((target) => target.documentId);
      if (!aiMeta.enabled || !aiMeta.default_config_id) {
        throw new Error("AI labelling is not available on this server.");
      }
      if (!documentIds.length) {
        throw new Error("Select at least one question before starting AI labelling.");
      }
      const payload = await apiRequest("/api/ai-label-runs", {
        method: "POST",
        body: JSON.stringify({
          document_ids: documentIds,
          config_id: aiMeta.default_config_id,
        }),
      });
      await refreshStoreOnlyBestEffort();
      const skippedCount = Array.isArray(payload?.skipped_document_ids) ? payload.skipped_document_ids.length : 0;
      const queuedCount = Number(payload?.run?.total_count || 0);
      if (queuedCount) {
        STATE.activeAiRunId = String(payload?.run?.id || "");
        const queuedDocumentIds = new Set(
          (Array.isArray(payload?.run?.document_ids) ? payload.run.document_ids : [])
            .map((value) => String(value || "").trim())
            .filter(Boolean),
        );
        const trackedQuestionIds = [...new Set(
          selectedTargets
            .filter((target) => queuedDocumentIds.has(String(target?.documentId || "")))
            .map((target) => String(target?.questionId || "").trim())
            .filter(Boolean),
        )];
        setActiveAiRunExplorerSnapshot(STATE.datasetKey, trackedQuestionIds, currentRows);
        clearSelectedExplorerQuestionsForCurrentDataset();
        ensureAiRunPolling();
      }
      setToast(
        !queuedCount && skippedCount
          ? `All selected traces are already queued or running.`
          : skippedCount
            ? `Started AI labelling for ${queuedCount} traces. ${skippedCount} already-active trace${skippedCount === 1 ? " was" : "s were"} skipped.`
          : `Started AI labelling for ${queuedCount} traces.`,
        "neutral",
        2800,
      );
      render();
    }

    async function labelDocumentWithAi(documentId) {
      const aiMeta = aiLabellingMeta();
      const configId = aiMeta.default_config_id || "";
      if (!documentId) return;
      if (!aiMeta.enabled || !configId) {
        throw new Error("AI labelling is not available on this server.");
      }
      await flushPendingDocumentNoteSave(documentId);
      await flushOpenAnnotationCommentSave(documentId);
      setAiLabelJob(documentId, { pending: true, configId, action: "label" });
      STATE.selection = null;
      STATE.selectionAnchor = null;
      STATE.activeAnnotationId = "";
      STATE.draftComment = "";
      clearNativeSelection();
      render();
      try {
        const payload = await apiRequest("/api/ai-label", {
          method: "POST",
          body: JSON.stringify({
            document_id: documentId,
            config_id: configId,
          }),
        });
        STATE.activeAiRunId = String(payload?.ai_label_run?.id || "");
        const resolvedMode = String(payload?.ai_label_job?.label_mode || "replace");
        applyAiLabelResultInStore(documentId, payload, resolvedMode);
        await refreshStoreOnlyBestEffort();
        const configLabel = payload?.ai_label_job?.config?.display_name || "the default config";
        setToast(
          resolvedMode === "complete_existing"
            ? `AI completion labels saved with ${configLabel}.`
            : `AI labels saved with ${configLabel}.`,
          "neutral",
          2200,
        );
      } finally {
        setAiLabelJob(documentId, null);
        render();
      }
    }

    async function clearAiLabels(documentId) {
      if (!documentId) return;
      const confirmed = window.confirm(
        "Clear AI labels for this reasoning trace?\n\nThis removes AI-generated labels only. Any human-created or human-added labels on this trace will stay."
      );
      if (!confirmed) return;
      const feedback = window.prompt(
        "Optional: why are you clearing these AI labels?\n\nLeave blank to continue, or press Cancel to stop.",
        ""
      );
      if (feedback === null) return;
      await flushPendingDocumentNoteSave(documentId);
      await flushOpenAnnotationCommentSave(documentId);
      setAiLabelJob(documentId, { pending: true, action: "clear" });
      STATE.selection = null;
      STATE.selectionAnchor = null;
      STATE.activeAnnotationId = "";
      STATE.draftComment = "";
      clearNativeSelection();
      render();
      try {
        const payload = await apiRequest(`/api/ai-label?document_id=${encodeURIComponent(documentId)}`, {
          method: "DELETE",
          body: JSON.stringify({
            feedback: feedback.trim(),
          }),

        clearPendingAiLabelsFromStore(documentId);

        const removedCount = Number(payload?.result?.removed_annotation_count || 0)
          + Number(payload?.result?.removed_note_count || 0);

          + Number(payload?.result?.removed_inferred_note_count || 0);
        const remainingHuman = Number(payload?.result?.remaining_human_annotation_count || 0)
          + (payload?.result?.remaining_note_is_human_reviewed ? 1 : 0);
        setToast(
          removedCount
            ? (
                remainingHuman
                  ? `Cleared ${removedCount} ${removedInferred ? "AI/provisional " : "AI "}label${removedCount === 1 ? "" : "s"}. ${remainingHuman} human label${remainingHuman === 1 ? "" : "s"} remain.`
                  : `Cleared ${removedCount} ${removedInferred ? "AI/provisional " : "AI "}label${removedCount === 1 ? "" : "s"}.`
              )
            : "No AI labels to clear.",
          "neutral",
          2600,
        );
      } finally {
        setAiLabelJob(documentId, null);
        render();
      }
    }

        });
        replaceDocumentAnnotationsInStore(body.document_id, payload?.result?.document_annotations || []);
        draftKeysToClear.forEach((key) => clearAnnotationCommentDraft(key));
        clearAnnotationCommentDraft(annotationDraftKeyForAnnotation(payload?.result?.annotation));
        STATE.selection = null;
        STATE.selectionAnchor = null;
        STATE.activeAnnotationId = keepActive ? (payload?.result?.annotation?.id || "") : "";
        STATE.draftComment = payload?.result?.annotation?.comment || "";
        clearNativeSelection();
        if (overrides.flash && payload?.result?.annotation?.id) {
          setFlashNotice(body.label_id, payload.result.annotation.id, flashAnchor, overrides.flashMessage);
        }
        render();
        return;
      }
      if (activeAnnotation || matchedAnnotation) {
        const annotationId = (activeAnnotation || matchedAnnotation).id;
        payload = await apiRequest(`/api/annotations/${encodeURIComponent(annotationId)}`, {
          method: "PATCH",
          body: JSON.stringify(body),
        });
      } else {
        payload = await apiRequest("/api/annotations", {
          method: "POST",
          body: JSON.stringify(body),
        });
      }
      upsertAnnotationInStore(payload.annotation);
      draftKeysToClear.forEach((key) => clearAnnotationCommentDraft(key));
      clearAnnotationCommentDraft(annotationDraftKeyForAnnotation(payload.annotation));
      STATE.selection = null;
      STATE.selectionAnchor = null;
      STATE.activeAnnotationId = keepActive ? payload.annotation.id : "";
      STATE.draftComment = payload.annotation.comment || "";
      clearNativeSelection();
      if (overrides.flash) {
        setFlashNotice(body.label_id, payload.annotation.id, flashAnchor, overrides.flashMessage);
      }
      render();
    }

    function annotationPayloadForRange(annotation, start, end) {
      const documentId = annotation.document_id || annotation.documentId;
      const document = labDocument(documentId);
      const quote = String(document?.text || "").slice(start, end);
      return {
        document_id: documentId,
        start,
        end,
        quote,
        label_id: annotation.label_id,
        comment: annotation.comment || "",
        author: annotation.author || STATE.author,
        status: annotation.status || "confirmed",
        selection_mode: annotation?.provenance?.selection_mode || annotation.selection_mode || "freeform",
        interface: annotation?.provenance?.interface || "reasoning-annotation-studio",
        labeler_type: annotation?.provenance?.labeler_type || "human",
        provenance: annotation?.provenance || undefined,
        ai_labelled: recordIsAiLabelled(annotation),
        human_reviewed: recordIsHumanReviewed(annotation),
        reviewed_by: annotation.reviewed_by || "",
        reviewed_at_utc: annotation.reviewed_at_utc || "",
        source_text_hash: annotation.source_text_hash || document?.text_hash || "",
      };
    }

    async function clearSelectionFromAnnotations(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (!selection || !overlaps.length) {
        clearTransientSelection();
        STATE.activeAnnotationId = "";
        STATE.draftComment = "";
        refreshSelectionUi();
        return;
      }
      clearTransientSelection();
      STATE.activeAnnotationId = "";
      STATE.activeAnnotationOrigin = "";
      STATE.draftComment = "";
      const document = labDocument(selection.document_id || selection.documentId);
      const payload = await apiRequest("/api/annotations/clear-selection", {
        method: "POST",
        body: JSON.stringify({
          document_id: selection.document_id || selection.documentId,
          start: selection.start,
          end: selection.end,
          quote: selection.quote || "",
          source_text_hash: document?.text_hash || "",
        }),
      });
      replaceDocumentAnnotationsInStore(
        selection.document_id || selection.documentId,
        payload?.result?.document_annotations || [],
      );
      render();
    }

    async function deleteAnnotations(annotationIds) {
      const ids = [...new Set((annotationIds || []).filter(Boolean))];
      if (!ids.length) return;
      clearTransientSelection();
      STATE.activeAnnotationId = "";
      STATE.activeAnnotationOrigin = "";
      STATE.draftComment = "";
      const payload = await apiRequest("/api/annotations/batch-delete", {
        method: "POST",
        body: JSON.stringify({ annotation_ids: ids }),
      });
      ids.forEach((annotationId) => clearAnnotationCommentDraft(`annotation:${annotationId}`));
      const documentAnnotations = payload?.result?.document_annotations || {};
      Object.entries(documentAnnotations).forEach(([documentId, nextAnnotations]) => {
        replaceDocumentAnnotationsInStore(documentId, nextAnnotations);
      });
      if (STATE.bootstrap?.store?.annotations && Object.keys(documentAnnotations).length === 0) {
        STATE.bootstrap.store.annotations = STATE.bootstrap.store.annotations.filter((item) => !ids.includes(item.id));
      }
      render();
    }

            });
            return;
          }
          const categoryButton = event.target.closest("[data-category-select]");
          if (categoryButton) {
            const labelId = categoryButton.getAttribute("data-category-select") || STATE.selectedCategoryId;
            STATE.selectedCategoryId = labelId;
            if (STATE.selection || STATE.activeAnnotationId) {
              await saveAnnotation({
                labelId,
                keepActive: Boolean(STATE.activeAnnotationId),
                flash: Boolean(STATE.selection),
                flashAnchor: STATE.selectionAnchor,
              });
            } else {
              render();
            }
            return;
          }
          if (event.target.id === "clearSelectionBtn") {
            const wasEditing = Boolean(STATE.activeAnnotationId);
            clearTransientSelection();
            STATE.activeAnnotationId = "";
            STATE.draftComment = "";
            if (wasEditing) {
              render();
            } else {
              refreshSelectionUi();
            }
            return;
          }
          if (event.target.id === "newCategoryBtn") {
            openCategoryDialog("create");
            return;
          }
          if (event.target.id === "editCategoryBtn") {
            openCategoryDialog("edit");
            return;
          }
          if (event.target.id === "deleteAnnotationBtn") {
            await deleteActiveAnnotation();
            return;
          }
          if (event.target.id === "deleteSelectionOverlapBtn") {
            await deleteAnnotations(overlappingAnnotationsForSelection().map((annotation) => annotation.id));
          }
        }, "Could not update the label panel.");
      });
      el.composerPanel.addEventListener("input", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id === "traceSummaryInput") {
          const caseRow = currentCaseForUi();
          const traceDocument = composerTargetContext(caseRow).selected?.document || null;
          if (!traceDocument) return;
          const documentId = traceDocument.document_id;
          const savedNote = documentNoteForDocument(documentId);
          const draft = draftDocumentNoteFor(documentId);
          STATE.draftDocumentNote = {
            documentId,
            summary: event.target.value,
            labelId: draft ? draft.labelId : (savedNote?.label_id || ""),
          };
          persistDocumentNoteDraft(documentId, STATE.draftDocumentNote);
          setDocumentNoteStatus(documentId, "Saved locally");
          clearScheduledDocumentNoteSave();
          const scheduledSummary = event.target.value;
          const scheduledLabelId = STATE.draftDocumentNote.labelId || "";
          documentNoteSaveDocumentId = documentId;
          documentNoteSaveTimer = window.setTimeout(() => {
            documentNoteSaveTimer = 0;
            documentNoteSaveDocumentId = "";
            const currentSavedNote = documentNoteForDocument(documentId);
            if (
              (currentSavedNote?.summary || "") === scheduledSummary
              && (currentSavedNote?.label_id || "") === scheduledLabelId
            ) {
              return;
            }
            void runUiAction(
              async () => {
                await saveDocumentNote({
                  documentId,
                  summary: scheduledSummary,
                  labelId: scheduledLabelId,
                  render: false,
                });
              },
              "Could not save the trace note.",
            ).catch(() => {
              setDocumentNoteStatus(documentId, "Saved locally");
            });
          }, 500);
          return;
        }
      });
      el.composerPanel.addEventListener("change", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id !== "documentNoteReviewedToggle") return;
        const caseRow = currentCaseForUi();
        const traceDocument = composerTargetContext(caseRow).selected?.document || null;
        if (!traceDocument) return;
        clearScheduledDocumentNoteSave();
        const checked = Boolean(event.target.checked);
        void runUiAction(
          async () => {
            await saveDocumentNote({
              documentId: traceDocument.document_id,
              humanReviewed: checked,
              reviewedBy: checked ? STATE.author : "",
              reviewedAtUtc: checked ? new Date().toISOString() : "",
            });
          },
          "Could not update the review state.",
        );
      });
      el.composerPanel.addEventListener("focusout", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id === "traceSummaryInput") {
          const caseRow = currentCaseForUi();
          const traceDocument = composerTargetContext(caseRow).selected?.document || null;
          if (!traceDocument) return;
          const documentId = traceDocument.document_id;
          clearScheduledDocumentNoteSave();
          const draft = draftDocumentNoteFor(documentId);
          const savedNote = documentNoteForDocument(documentId);
          const nextSummary = event.target.value;
          const nextLabelId = draft ? draft.labelId : (savedNote?.label_id || "");
          STATE.draftDocumentNote = {
            documentId,
            summary: nextSummary,
            labelId: nextLabelId,
          };
          persistDocumentNoteDraft(documentId, STATE.draftDocumentNote);
          if (
            (savedNote?.summary || "") === nextSummary
            && (savedNote?.label_id || "") === nextLabelId
          ) {
            return;
          }
          void runUiAction(
            async () => {
              await saveDocumentNote({
                documentId,
                summary: nextSummary,
                labelId: nextLabelId,
              });
            },
            "Could not save the trace note.",
          ).catch(() => {
            setDocumentNoteStatus(documentId, "Saved locally");
          });
          return;
        }
      });
      el.annotationPanel.addEventListener("click", (event) => {
        void runUiAction(async () => {
          const targetButton = event.target.closest("[data-composer-target-source]");
          if (targetButton) {
            syncComposerTarget(targetButton.getAttribute("data-composer-target-source") || "", { renderComposer: true });
            return;
          }
          const openButton = event.target.closest("[data-annotation-open]");
          if (openButton) {
            openAnnotation(openButton.getAttribute("data-annotation-open") || "", { origin: "panel" });
            return;
          }
          if (isReadOnlyMode()) return;
          const deleteButton = event.target.closest("[data-delete-annotation]");
          if (deleteButton) {
            await deleteAnnotation(deleteButton.getAttribute("data-delete-annotation") || "");
            return;
          }
          const categoryButton = event.target.closest("[data-category-select]");
          if (categoryButton) {
            const labelId = categoryButton.getAttribute("data-category-select") || STATE.selectedCategoryId;
            STATE.selectedCategoryId = labelId;
            await saveAnnotation({
              labelId,
              keepActive: true,
              flash: false,
            });
            return;
          }
          if (event.target.id === "deleteAnnotationBtn") {
            await deleteActiveAnnotation();
            return;
          }
        }, "Could not update the saved highlight.");
      });
      el.annotationPanel.addEventListener("input", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id !== "annotationCommentInput") return;
        STATE.draftComment = event.target.value;
        persistAnnotationCommentDraft(currentAnnotationDraftKey(), STATE.draftComment);
        const editingAnnotation = annotations().find((item) => item.id === STATE.activeAnnotationId);
        clearScheduledAnnotationCommentSave();
        if (!editingAnnotation) return;
        const scheduledAnnotationId = editingAnnotation.id;
        const scheduledComment = event.target.value;
        commentSaveAnnotationId = scheduledAnnotationId;
        commentSaveTimer = window.setTimeout(() => {
          commentSaveTimer = 0;
          commentSaveAnnotationId = "";
          const currentEditingAnnotation = annotations().find((item) => item.id === STATE.activeAnnotationId);
          if (currentEditingAnnotation?.id !== scheduledAnnotationId) return;
          const nextComment = scheduledComment;
          if ((currentEditingAnnotation?.comment || "") === nextComment) return;
          void runUiAction(async () => {
            await saveAnnotation({ comment: nextComment, keepActive: true });
          }, "Could not save why this label.");
        }, 500);
      });
      el.annotationPanel.addEventListener("change", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id !== "annotationReviewedToggle") return;
        const checked = Boolean(event.target.checked);
        void runUiAction(async () => {
          await saveAnnotation({
            humanReviewed: checked,
            reviewedBy: checked ? STATE.author : "",
            reviewedAtUtc: checked ? new Date().toISOString() : "",
            keepActive: true,
          });
        }, "Could not update the review state.");
      });
      el.annotationPanel.addEventListener("focusout", (event) => {
        if (isReadOnlyMode()) return;
        if (event.target.id !== "annotationCommentInput") return;
        const activeAnnotation = annotations().find((item) => item.id === STATE.activeAnnotationId);
        clearScheduledAnnotationCommentSave();
        if (!activeAnnotation) return;
        const nextComment = event.target.value;
        if ((activeAnnotation?.comment || "") === nextComment) return;
        STATE.draftComment = nextComment;
        void runUiAction(async () => {
          await saveAnnotation({ comment: nextComment, keepActive: true });
        }, "Could not save why this label.");
      });
      el.selectionToolbar.addEventListener("click", (event) => {
        if (isReadOnlyMode()) return;
        void runUiAction(async () => {
          const categoryButton = event.target.closest("[data-toolbar-category]");
          if (categoryButton) {
            const labelId = categoryButton.getAttribute("data-toolbar-category") || STATE.selectedCategoryId;
            STATE.selectedCategoryId = labelId;
            await saveAnnotation({
              labelId,
              keepActive: false,
              flash: true,
              flashAnchor: STATE.selectionAnchor,
            });
            return;
          }
          if (event.target.id === "toolbarClearBtn") {
            if (overlappingAnnotationsForSelection().length) {
              await clearSelectionFromAnnotations();
            } else {
              clearTransientSelection();
              STATE.activeAnnotationId = "";
              STATE.draftComment = "";
              refreshSelectionUi();
            }
          }
        }, "Could not save that label.");
      });
      document.addEventListener("pointerdown", (event) => {
        if (!STATE.selection && !STATE.flashNotice) return;
        const target = event.target;
        if (!(target instanceof Element)) return;
        if (target.closest("#selectionToolbar, #composerPanel, dialog")) return;
        clearTransientSelection();
        refreshSelectionUi();
      });
      document.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof Element)) return;
        const filterDetails = [el.domainFilterDetails, el.railDomainFilterDetails, el.reviewDomainFilterDetails].filter(Boolean);
        const isInsideOpenFilter = target.closest("#domainFilterDetails, #railDomainFilterDetails, #reviewDomainFilterDetails");
        if (isInsideOpenFilter) return;
        filterDetails.forEach((details) => {
          if (details.open) details.open = false;
        });
      });
      document.addEventListener("keydown", (event) => {
        const target = event.target;
        if (event.key !== "Escape") return;
        if (target instanceof HTMLElement && target.closest("input, textarea, select, dialog")) return;
        if (STATE.compareOpen) {
          clearTransientSelection();
          STATE.activeAnnotationId = "";
          STATE.draftComment = "";
          setCompareOpen(false);
          render();
          return;
        }
        if (!STATE.selection && !STATE.activeAnnotationId && !STATE.flashNotice) return;
        clearTransientSelection();
        STATE.activeAnnotationId = "";
        STATE.draftComment = "";
        refreshSelectionUi();
      });
      el.exportBtn.addEventListener("click", () => {
        void runUiAction(async () => {
          await flushAllLocalDrafts();
          window.location.href = "/api/export";
        }, "Could not prepare the export.");
      });
      el.importBtn.addEventListener("click", () => {
        el.importInput.click();
      });
      el.importInput.addEventListener("change", (event) => {
        const file = event.target.files?.[0];
        if (!file) return;
        void runUiAction(async () => {
          await flushAllLocalDrafts();
          await importStore(file);
          setToast("Labels imported.", "neutral", 1800);
        }, "Could not import that file.");
        event.target.value = "";
      });
      el.categoryForm.addEventListener("submit", (event) => {
        void runUiAction(async () => {
          await saveCategory(event);
          setToast("Label definition saved.", "neutral", 1800);
        }, "Could not save that label definition.");
      });
      el.closeCategoryDialogBtn.addEventListener("click", () => {
        el.categoryDialog.close();
      });
      window.addEventListener("scroll", requestStageStickyStateSync, { passive: true });
      window.addEventListener("resize", requestStageStickyStateSync, { passive: true });
    }

    async function init() {
      window.localStorage.removeItem("reasoningLab.aiFilter");
      Object.assign(el, {
        filterPanel: document.getElementById("filterPanel"),
        viewSwitch: document.getElementById("viewSwitch"),
        themeSwitch: document.getElementById("themeSwitch"),
        explorerView: document.getElementById("explorerView"),
        explorerPanel: document.getElementById("explorerPanel"),
        reportView: document.getElementById("reportView"),
        workspace: document.getElementById("workspace"),
        sourceSwitch: document.getElementById("sourceSwitch"),
        datasetSwitch: document.getElementById("datasetSwitch"),
        appbarCoverage: document.getElementById("appbarCoverage"),
        toggleSidebarBtn: document.getElementById("toggleSidebarBtn"),
        statusLine: document.getElementById("statusLine"),
        searchInput: document.getElementById("searchInput"),
        railSearchInput: document.getElementById("railSearchInput"),
        reviewSearchInput: document.getElementById("reviewSearchInput"),
        railGradeFilterSelect: document.getElementById("railGradeFilterSelect"),
        reviewGradeFilterSelect: document.getElementById("reviewGradeFilterSelect"),
        reviewAnnotationFilterSelect: document.getElementById("reviewAnnotationFilterSelect"),
        gradeFilterSelect: document.getElementById("gradeFilterSelect"),
        annotationFilterSelect: document.getElementById("annotationFilterSelect"),
        railAnnotationFilterSelect: document.getElementById("railAnnotationFilterSelect"),
        railStatusFilterRow: document.getElementById("railStatusFilterRow"),
        domainFilterField: document.getElementById("domainFilterField"),
        domainFilterDetails: document.getElementById("domainFilterDetails"),
        domainFilterSummary: document.getElementById("domainFilterSummary"),
        domainFilterList: document.getElementById("domainFilterList"),
        railDomainFilterField: document.getElementById("railDomainFilterField"),
        railDomainFilterDetails: document.getElementById("railDomainFilterDetails"),
        railDomainFilterSummary: document.getElementById("railDomainFilterSummary"),
        railDomainFilterList: document.getElementById("railDomainFilterList"),
        reviewDomainFilterField: document.getElementById("reviewDomainFilterField"),
        reviewDomainFilterDetails: document.getElementById("reviewDomainFilterDetails"),
        reviewDomainFilterSummary: document.getElementById("reviewDomainFilterSummary"),
        reviewDomainFilterList: document.getElementById("reviewDomainFilterList"),
        selectAllDomainsBtn: document.getElementById("selectAllDomainsBtn"),
        closeDomainFilterBtn: document.getElementById("closeDomainFilterBtn"),
        railSelectAllDomainsBtn: document.getElementById("railSelectAllDomainsBtn"),
        railCloseDomainFilterBtn: document.getElementById("railCloseDomainFilterBtn"),
        reviewSelectAllDomainsBtn: document.getElementById("reviewSelectAllDomainsBtn"),
        reviewCloseDomainFilterBtn: document.getElementById("reviewCloseDomainFilterBtn"),
        labelSelectedAiBtn: document.getElementById("labelSelectedAiBtn"),
        aiInlineStatus: document.getElementById("aiInlineStatus"),
        filterMeta: document.getElementById("filterMeta"),
        caseMeta: document.getElementById("caseMeta"),
        questionExplorerHead: document.getElementById("questionExplorerHead"),
        questionExplorerList: document.getElementById("questionExplorerList"),
        reviewStage: document.getElementById("reviewStage"),
        reviewCaseMeta: document.getElementById("reviewCaseMeta"),
        reviewCaseList: document.getElementById("reviewCaseList"),
        reviewPromptPanel: document.getElementById("reviewPromptPanel"),
        reviewDetailGrid: document.getElementById("reviewDetailGrid"),
        reviewPrimaryPanel: document.getElementById("reviewPrimaryPanel"),
        reviewComparePanel: document.getElementById("reviewComparePanel"),
        openExplorerBtn: document.getElementById("openExplorerBtn"),
        caseList: document.getElementById("caseList"),
        stageStickyStack: document.getElementById("stageStickyStack"),
        stageModelStrip: document.getElementById("stageModelStrip"),
        questionPanel: document.getElementById("questionPanel"),
        responsePanel: document.getElementById("responsePanel"),
        reasoningPanel: document.getElementById("reasoningPanel"),
        composerPanel: document.getElementById("composerPanel"),
        annotationPanel: document.getElementById("annotationPanel"),
        selectionToolbar: document.getElementById("selectionToolbar"),
        appToast: document.getElementById("appToast"),
        exportBtn: document.getElementById("exportBtn"),
        importBtn: document.getElementById("importBtn"),
        importInput: document.getElementById("importInput"),
        categoryDialog: document.getElementById("categoryDialog"),
        categoryForm: document.getElementById("categoryForm"),
        categoryDialogTitle: document.getElementById("categoryDialogTitle"),
        categoryFormMode: document.getElementById("categoryFormMode"),
        categoryFormId: document.getElementById("categoryFormId"),
        categoryNameInput: document.getElementById("categoryNameInput"),
        categoryDescriptionInput: document.getElementById("categoryDescriptionInput"),
        categoryGuidanceInput: document.getElementById("categoryGuidanceInput"),
        categoryColorInput: document.getElementById("categoryColorInput"),
        categoryTextColorInput: document.getElementById("categoryTextColorInput"),
        closeCategoryDialogBtn: document.getElementById("closeCategoryDialogBtn"),
        stageBody: document.getElementById("stageBody"),
        comparisonPanel: document.getElementById("comparisonPanel"),
      });
      wireStaticControls();
      try {
        await bootstrap();
      } catch (error) {
        el.statusLine.textContent = error.message || "Failed to load the annotation studio.";
        setToast(error.message || "Failed to load the annotation studio.", "error", 0);
        const openedFromDisk = window.location.protocol === "file:";
        const openedStatic = isStaticMode();
        el.questionPanel.innerHTML = `
          <div class="empty-state">
            <strong>${openedStatic
              ? "Could not load the read-only snapshot."
              : (openedFromDisk ? "This page was opened from disk, so the data API is unavailable." : "Could not connect to the local annotation server.")}</strong><br>
            ${openedStatic
              ? 'Rebuild the Pages snapshot and make sure <code>bootstrap.json</code> is published beside this viewer.'
              : (openedFromDisk
                ? 'Open <code>http://127.0.0.1:8878/viewer/reasoning-annotation-studio.html</code> instead.'
                : 'Start <code>reasoning-lab/scripts/reasoning_annotation_server.py</code> and reload this page.')}
          </div>
        `;
      }
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
