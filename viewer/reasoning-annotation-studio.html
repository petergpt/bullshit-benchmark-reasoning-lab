<!doctype html>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BullshitBench Reasoning Lab</title>
  <link rel="icon" href="../assets/bsbench.png">
  <script>
    (() => {
      try {
        const stored = window.localStorage.getItem("reasoningLab.theme");
        const preference = ["light", "dark"].includes(stored) ? stored : "system";
        const resolved = preference === "system"
          ? (window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;
      } catch (_error) {
        document.documentElement.dataset.themePreference = "system";
        const fallback = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = fallback;
        document.documentElement.style.colorScheme = fallback;
      }
    })();
  </script>

    .status-trigger-label {

      transform: translateY(-1px) rotate(45deg);
      flex: 0 0 auto;

    .status-popover-panel {

      top: calc(100% + 10px);
      left: 0;
      z-index: 72;
      width: min(292px, calc(100vw - 32px));
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      display: grid;
      gap: 10px;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(4px);
      transition: opacity var(--transition), transform var(--transition), visibility var(--transition);
    }

    .status-popover:hover .status-popover-panel,
    .status-popover:focus-within .status-popover-panel {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);

    .status-popover:focus-within .status-trigger-label {

    .status-summary-list {

    .status-summary-row {

      gap: 10px;
      padding: 7px 9px;
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      background: var(--surface-soft);

      opacity: 0.62;

    .status-summary-top {

      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-width: 0;

      font-weight: 700;

      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;

    .status-summary-metric {
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    .status-summary-row.validated .status-summary-swatch {
      background: linear-gradient(90deg, var(--workflow-validated-fill-start) 0%, var(--workflow-validated-fill-end) 100%);
    }

    .status-summary-row.validated .status-summary-metric {
      color: var(--workflow-validated-text);
    }

    .status-summary-row.in_progress .status-summary-swatch {
      background: linear-gradient(90deg, var(--workflow-active-fill-start) 0%, var(--workflow-active-fill-end) 100%);
    }

    .status-summary-row.in_progress .status-summary-metric {
      color: var(--workflow-active-text);
    }

    .status-summary-row.needs_review .status-summary-swatch {
      background: linear-gradient(90deg, var(--workflow-review-fill-start) 0%, var(--workflow-review-fill-end) 100%);
    }

    .status-summary-row.needs_review .status-summary-metric {
      color: var(--workflow-review-text);
    }

    .status-summary-row.unreviewed .status-summary-swatch {
      background: linear-gradient(90deg, var(--workflow-unreviewed-fill-start) 0%, var(--workflow-unreviewed-fill-end) 100%);
    }

    .status-summary-row.unreviewed .status-summary-metric {
      color: var(--workflow-unreviewed-text);
    }

    .coverage-meter-track {
      position: relative;
      width: clamp(78px, 6vw, 104px);
      height: 5px;
      border-radius: 999px;
      background: var(--coverage-track);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--line) 46%, transparent);
      overflow: hidden;
      flex: 0 0 auto;
    }

    .coverage-meter-fill {
      position: absolute;
      top: 0;
      bottom: 0;
      border-radius: 0;
    }

    .coverage-meter-track .coverage-meter-fill:first-child {
      border-top-left-radius: inherit;
      border-bottom-left-radius: inherit;
    }

    .coverage-meter-track .coverage-meter-fill:last-child {
      border-top-right-radius: inherit;
      border-bottom-right-radius: inherit;
    }

    .coverage-meter-fill.is-validated {
      background: linear-gradient(90deg, var(--workflow-validated-fill-start) 0%, var(--workflow-validated-fill-end) 100%);
    }

    .coverage-meter-fill.is-in_progress {
      background: linear-gradient(90deg, var(--workflow-active-fill-start) 0%, var(--workflow-active-fill-end) 100%);
    }

    .coverage-meter-fill.is-needs_review {
      background: linear-gradient(90deg, var(--workflow-review-fill-start) 0%, var(--workflow-review-fill-end) 100%);
    }

    .coverage-meter-fill.is-unreviewed {
      background: linear-gradient(90deg, var(--workflow-unreviewed-fill-start) 0%, var(--workflow-unreviewed-fill-end) 100%);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: nowrap;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .toolbar button,
    .toolbar a,
    .btn,
    .toolbar-btn {
      border: 1px solid var(--line);
      background: var(--button-secondary-bg);
      color: var(--text-subtle);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      line-height: 1.15;
      text-decoration: none;
      box-shadow: var(--button-secondary-shadow);
      transition:
        border-color var(--transition),
        background var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
    }

    .toolbar button:hover,
    .toolbar a:hover,
    .toolbar button:focus-visible,
    .toolbar a:focus-visible,
    .btn:hover,
    .btn:focus-visible,
    .toolbar-btn:hover,
    .toolbar-btn:focus-visible {
      outline: none;
      background: var(--button-secondary-bg-hover);
      border-color: var(--button-secondary-border-hover);
      box-shadow: var(--button-secondary-shadow-hover);
    }

    .toolbar button:active,
    .toolbar a:active,
    .btn:active,
    .toolbar-btn:active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.5) inset,
        0 1px 2px rgba(20, 25, 23, 0.12);
    }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--theme-toggle-bg);
      backdrop-filter: blur(10px);
    }

    .theme-option {
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 5px 8px;
      font-size: 0.74rem;
      font-weight: 600;
      line-height: 1;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);

    .theme-option:hover,
    .theme-option:focus-visible {
      outline: none;
      background: var(--theme-toggle-hover);
      color: var(--text-subtle);
    }

    .theme-option.active {
      background: var(--theme-toggle-active-bg);
      color: var(--theme-toggle-active-ink);
      box-shadow: inset 0 0 0 1px var(--theme-toggle-active-line);

      align-items: center;

      background: var(--surface-input);
      color: var(--ink);

      font-size: 0.8rem;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);

      position: relative;
      z-index: 0;

    details.multi-select[open] {
      z-index: 48;

    details.multi-select summary {
      list-style: none;
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      min-height: 34px;
      padding: 5px 34px 5px 8px;
      background: var(--surface-input);
      color: var(--ink);
      display: flex;
      align-items: center;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

      display: none;
    }

    details.multi-select summary::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 1.5px solid var(--text-faint);
      border-bottom: 1.5px solid var(--text-faint);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;

      border-color: var(--border-selected);
      background: var(--surface-input-focus);
      box-shadow: var(--focus-ring);

      color: var(--workflow-active-text);
    }
    .pill.red { background: #faeded; border-color: #e6c3c7; color: #8d404a; }
    .pill.blue,
    .pill.violet {
      background: var(--workflow-review-surface);
      border-color: var(--workflow-review-line);
      color: var(--workflow-review-text);
    }
    .pill.slate {
      background: var(--workflow-unreviewed-surface);
      border-color: var(--workflow-unreviewed-line);
      color: var(--workflow-unreviewed-text);
    }

    .case-judge-list {
      display: grid;
      grid-template-columns: max-content auto;
      gap: 5px 8px;
      align-items: center;
      min-width: 0;
    }

    .case-judge-model {
      color: var(--text-subtle);
      font-size: 0.74rem;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }

    .case-judge-verdict {
      min-width: 0;
      justify-self: start;
    }

    .case-question {
      margin: 0;
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.35;
      letter-spacing: normal;
      color: var(--text-strong);
      overflow-wrap: anywhere;
    }

    .case-meta {
      margin: 0;
      color: var(--text-faint);
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .case-helper {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.77rem;
      line-height: 1.45;
    }

    .explorer-table-wrap {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: auto;
      min-height: 0;
      height: 100%;
      max-height: calc(100vh - 238px);
      background: var(--surface-elevated);
    }

    .explorer-table-wrap::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .explorer-table-wrap::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 8px;
    }

    .explorer-table {
      width: 100%;
      min-width: 1280px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .explorer-table th:nth-child(1),
    .explorer-table td:nth-child(1) {
      width: 48px;
    }

    .explorer-table th:nth-child(2),
    .explorer-table td:nth-child(2) {
      width: 24%;
    }

    .explorer-table th:nth-child(3),
    .explorer-table td:nth-child(3) {
      width: 6%;
    }

    .explorer-table th:nth-child(4),
    .explorer-table td:nth-child(4) {
      width: 8.5%;
    }

    .explorer-table th:nth-child(5),
    .explorer-table td:nth-child(5) {
      width: 8%;
    }

    .explorer-table th:nth-child(6),
    .explorer-table td:nth-child(6) {
      width: 12%;
    }

    .explorer-table th:nth-child(7),
    .explorer-table td:nth-child(7) {
      width: 8.5%;
    }

    .explorer-table th:nth-child(8),
    .explorer-table td:nth-child(8) {
      width: 8%;
    }

    .explorer-table th:nth-child(9),
    .explorer-table td:nth-child(9) {
      width: 12%;
    }

    .explorer-table th:nth-child(10),
    .explorer-table td:nth-child(10) {
      width: 74px;
    }

    .explorer-table th,
    .explorer-table td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border-soft);
      text-align: left;
      vertical-align: top;
    }

    .explorer-table thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: var(--surface-subtle-strong);
      color: var(--text-muted);
      font-size: 0.73rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .explorer-table thead th[aria-sort="ascending"],
    .explorer-table thead th[aria-sort="descending"] {
      color: var(--text-subtle);
    }

    .explorer-sort-button {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      width: 100%;
      min-width: 0;
      padding: 0;
      border: none;
      background: transparent;
      color: inherit;
      font: inherit;
      font-weight: inherit;
      line-height: 1.2;
      text-align: left;
      justify-content: space-between;
      transition: color var(--transition);
    }

    .explorer-header-label {
      display: grid;
      gap: 3px;
      min-width: 0;
      align-content: start;
    }

    .explorer-header-model {
      display: block;
      max-width: 100%;
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      line-height: 1.18;
      color: var(--text-faint);
      text-transform: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .explorer-header-model.gpt {
      color: var(--model-gpt-ink);
    }

    .explorer-header-model.sonnet {
      color: var(--model-sonnet-ink);
    }

    .explorer-header-metric {
      color: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .explorer-sort-button:hover,
    .explorer-sort-button:focus-visible {
      color: var(--text-subtle);
      outline: none;
    }

    .explorer-sort-button.active {
      color: var(--text-subtle);
    }

    .sort-indicator {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 8px;
      min-width: 8px;
      color: var(--text-faint);
      font-size: 0.64rem;
      line-height: 1;
    }

    .explorer-sort-button.active .sort-indicator {
      color: var(--text-subtle);
    }

    .explorer-table tbody tr {
      transition: background var(--transition);
    }

    .explorer-table tbody tr:hover {
      background: var(--surface-soft);
    }

    .explorer-table tbody tr.is-current {
      background: var(--surface-subtle-strong);
    }

    .explorer-table tbody tr.is-ai-run:not(.is-current) {
      background: color-mix(in srgb, #6b7cc9 4%, transparent);
    }

    .explorer-table tbody tr.is-ai-run:hover:not(.is-current) {
      background: color-mix(in srgb, #6b7cc9 7%, var(--surface-soft));
    }

    .explorer-table tbody tr:last-child td {
      border-bottom: none;
    }

    .explorer-question-cell {
      min-width: 0;
    }

    .explorer-question-button {
      border: none;
      background: transparent;
      padding: 0;
      margin: 0;
      width: 100%;
      text-align: left;
      color: inherit;
      display: grid;
      gap: 4px;
    }

    .explorer-question-button:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--border-selected) 28%, transparent);
      outline-offset: 2px;
    }

    .explorer-question-line {
      margin: 0;
      color: var(--text-strong);
      font-size: 0.9rem;
      line-height: 1.4;
      font-weight: 500;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .explorer-question-subline {
      margin: 0;
      color: var(--text-faint);
      font-size: 0.78rem;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 1;
      overflow: hidden;
    }

    .explorer-question-status {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .explorer-status-cell {
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.35;
      white-space: nowrap;
    }

    .explorer-grade-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 3px 8px;
      background: var(--surface-muted);
      color: var(--text-subtle);
      font-size: 0.71rem;
      font-weight: 700;
      line-height: 1.05;
      white-space: nowrap;
    }

    .explorer-grade-pill.green {
      background: color-mix(in srgb, var(--green) 9%, var(--mix-base));
      border-color: color-mix(in srgb, var(--green) 16%, var(--line));
      color: color-mix(in srgb, var(--green) 82%, var(--text-subtle));
    }

    .explorer-grade-pill.amber {
      background: color-mix(in srgb, var(--amber) 9%, var(--mix-base));
      border-color: color-mix(in srgb, var(--amber) 16%, var(--line));
      color: color-mix(in srgb, var(--amber) 85%, var(--text-subtle));
    }

    .explorer-grade-pill.red {
      background: color-mix(in srgb, #bb5664 8%, var(--mix-base));
      border-color: color-mix(in srgb, #bb5664 16%, var(--line));
      color: color-mix(in srgb, #9c3d4c 82%, var(--text-subtle));
    }

    .explorer-grade-pill.slate {
      background: var(--surface-muted);
      border-color: var(--line);
      color: var(--text-muted);
    }

    .explorer-yesno {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      padding: 0;
      background: transparent;
      border: none;
      color: var(--text-subtle);
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.01em;
    }

    .explorer-yesno::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      flex: 0 0 auto;
    }

    .explorer-yesno.is-yes {
      color: var(--text-subtle);
    }

    .explorer-yesno.is-yes::before {
      background: color-mix(in srgb, var(--blue) 75%, white);
      border-color: color-mix(in srgb, var(--blue) 34%, var(--line));
    }

    .explorer-yesno.is-no {
      color: var(--text-muted);
    }

    .explorer-yesno.is-no::before {
      background: var(--surface-subtle);
      border-color: var(--line);
    }

    .explorer-id-cell {
      color: var(--text-muted);
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .explorer-updated-cell,
    .explorer-count-cell,
    .explorer-domain-cell {
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.4;
      white-space: nowrap;
    }

    .explorer-overall-cell {
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.35;
      white-space: normal;
    }

    .explorer-overall-tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      min-width: 0;
      border: 1px solid color-mix(in srgb, var(--label-color, #8aa19b) 16%, var(--line));
      border-radius: 999px;
      background: color-mix(in srgb, var(--label-color, #8aa19b) 8%, var(--mix-base));
      color: var(--text-subtle);
      padding: 3px 8px 3px 7px;
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
    }

    .explorer-overall-tag .swatch {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 auto;
    }

    .explorer-overall-tag .label-text {
      display: block;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .explorer-overall-empty {
      color: var(--text-faint);
    }

    .explorer-action-cell {
      width: 74px;
    }

    .stage-sticky-stack {
      position: sticky;
      top: 8px;
      z-index: 18;
      display: grid;
      gap: 8px;
    }

    .stage-sticky-stack.is-stuck {
      gap: 4px;
    }

    .question-panel {
      padding: 9px 11px;
      background: var(--surface-elevated);
    }

    .stage-sticky-stack.is-stuck .question-panel {
      padding: 5px 8px 3px;
    }

    .stage-model-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      min-width: 0;
    }

    .stage-model-strip[hidden] {
      display: none !important;
    }

    .stage-sticky-stack.is-stuck .stage-model-strip {
      gap: 6px;
    }

    .stage-model-strip.compare-active {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .stage-model-card {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      min-height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-elevated);
      min-width: 0;
    }

    .stage-sticky-stack.is-stuck .stage-model-card {
      min-height: 34px;
      padding: 5px 8px;
      border-radius: 8px;
    }

    .stage-model-card .mini-stat {
      white-space: normal;
      line-height: 1.18;
      text-wrap: pretty;
    }

    .stage-model-card .model-chip {
      flex: 0 0 auto;
      min-width: 0;
      white-space: nowrap;
    }

    .stage-sticky-stack.is-stuck .stage-model-card .mini-stat {
      padding: 2px 6px;
      font-size: 0.68rem;
    }

    .stage-model-card .explorer-grade-pill {
      margin-left: auto;
      flex: 0 0 auto;
    }

    .stage-sticky-stack.is-stuck .stage-model-card .explorer-grade-pill {
      padding: 2px 7px;
      font-size: 0.67rem;
    }

    .stage-body {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      min-width: 0;
      align-items: start;
    }

    .stage-body.compare-active {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-areas:
        "main-answer compare-answer"
        "main-reason compare-reason";
      align-items: stretch;
    }

    .stage-body.compare-active .primary-stack,
    .stage-body.compare-active .comparison-stack {
      display: contents;
    }

    .stage-body.compare-active #responsePanel {
      grid-area: main-answer;
      height: 100%;
    }

    .stage-body.compare-active #reasoningPanel {
      grid-area: main-reason;
      height: 100%;
    }

    .stage-body.compare-active [data-compare-panel="answer"] {
      grid-area: compare-answer;
      height: 100%;
    }

    .stage-body.compare-active [data-compare-panel="reasoning"] {
      grid-area: compare-reason;
      height: 100%;
    }

    .primary-stack {
      display: grid;
      gap: 12px;
      min-width: 0;
      align-content: start;
    }

    .comparison-stack {
      display: grid;
      gap: 12px;
      min-width: 0;
      align-content: start;
    }

    .question-body {
      display: grid;
      gap: 8px;
    }

    .stage-sticky-stack.is-stuck .question-body {
      gap: 0;
    }

    .stage-sticky-stack.is-stuck .question-head {
      gap: 8px;
    }

    .stage-sticky-stack.is-stuck .question-heading {
      gap: 6px;
    }

    .stage-sticky-stack.is-stuck .section-head {
      margin-bottom: 6px;
    }

    .stage-sticky-stack.is-stuck .question-panel h2 {
      font-size: 0.86rem;
    }

    .stage-sticky-stack.is-stuck .question-id-chip {
      padding: 3px 7px;
      font-size: 0.66rem;
    }

    .stage-sticky-stack.is-stuck .question-actions {
      gap: 6px;
    }

    .question-text {
      margin: 0;
      font-family: inherit;
      font-size: clamp(0.94rem, 1.22vw, 1.08rem);
      line-height: 1.32;
      letter-spacing: -0.01em;
      overflow-wrap: anywhere;
    }

    .stage-sticky-stack.is-stuck .question-text {
      font-size: 0.86rem;
      line-height: 1.22;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .context-card {
      border: 1px solid var(--border-soft);
      border-radius: 9px;
      background: var(--surface-overlay);
      padding: 7px 9px;
      display: grid;
      gap: 6px;
      max-height: 144px;
      overflow: hidden;
      transition:
        opacity 160ms ease,
        max-height 180ms ease,
        padding 180ms ease,
        border-color 180ms ease;
    }

    .stage-sticky-stack.is-stuck .context-card {
      opacity: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-color: transparent;
      pointer-events: none;
    }

    .context-card summary {
      cursor: pointer;
      list-style: none;
    }

    .context-card summary::-webkit-details-marker {
      display: none;
    }

    .context-label {
      color: var(--teal);
      font-size: 0.78rem;
      font-weight: 500;
    }

    .context-text {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.48;
      overflow-wrap: anywhere;
    }

    .compare-empty {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .review-detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
      align-items: start;
    }

    .review-model-panel {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .review-model-panel .section-head {
      flex-wrap: wrap;
    }

    .review-model-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }

    .review-overview-card {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 10px;
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .review-note-text {
      margin: 0;
      color: var(--text-subtle);
      font-size: 0.88rem;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .review-note-text.is-empty {
      color: var(--text-muted);
    }

    .report-view {
      display: grid;
      gap: 12px;
      min-width: 0;
      align-items: start;
    }

    .report-panel {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .report-source-grid,
    .report-grade-list {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .report-source-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .report-bar-track {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .report-bar-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: var(--report-bar-color, var(--border-selected));
    }

    .report-bar-metric {
      color: var(--text-subtle);
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .report-grade-row {
      display: grid;
      grid-template-columns: 164px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      min-width: 0;
    }

    .report-grade-row .pill {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      justify-self: start;
    }

    .report-grade-stat {
      color: var(--text-subtle);
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
      text-align: right;
    }

    .report-note-columns {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      min-width: 0;
      align-items: start;
    }

    .report-note-column,
    .report-note-list,
    .report-note-card {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .report-note-column {
      align-content: start;
      align-items: start;
    }

    .report-note-column > .section-head {
      position: sticky;
      top: 8px;
      z-index: 4;
      margin: -2px -2px 2px;
      padding: 2px 2px 10px;
      background: var(--surface-elevated);
      box-shadow: 0 1px 0 var(--border-soft);
      display: block;
    }

    .report-note-column-copy {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .report-note-column-summary {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      color: var(--text-subtle);
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      flex: 1 1 auto;
    }

    .report-note-column-summary-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
      min-height: 22px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-muted);
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }

    .report-note-column-summary-item::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: currentColor;
      flex: 0 0 auto;
    }

    .report-note-column-summary-item.green {
      background: var(--workflow-validated-surface);
      border-color: var(--workflow-validated-line);
      color: var(--workflow-validated-text);
    }

    .report-note-column-summary-item.amber {
      background: var(--workflow-active-surface);
      border-color: var(--workflow-active-line);
      color: var(--workflow-active-text);
    }

    .report-note-column-summary-item.red {
      background: var(--verdict-red-surface);
      border-color: var(--verdict-red-line);
      color: var(--verdict-red-text);
    }

    .report-note-column-summary-sep {
      color: var(--text-faint);

    .report-note-column-meter {

      border-bottom-left-radius: inherit;

    .report-note-column-meter .report-note-column-meter-fill:last-child {

      border-bottom-right-radius: inherit;

    .report-note-card-top {

      align-items: start;
      min-width: 0;

    .report-note-card-head,

      gap: 8px;
      align-items: center;
      min-width: 0;

    }

    .review-annotation-list {

    .review-source-cell {

      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1rem;
      font-weight: 800;
      color: var(--text-strong);
    }

    .card-title small {
      color: var(--muted);
      font-size: 0.76rem;
    }

    .plain-text {
      white-space: pre-wrap;
      color: var(--text-subtle);
      font-size: 0.94rem;
      line-height: 1.62;
    }

    .response-panel {
      padding: 11px;
      background: var(--surface-elevated);
      border-color: var(--line);
    }

    .panel.model-panel.gpt,
    .panel.model-panel.sonnet {
      border-color: var(--line);
      box-shadow: none;
    }

    .panel-kicker {
      display: none;
    }

    .markdown-body {
      color: var(--text-subtle);
      font-size: 0.94rem;
      line-height: 1.65;
    }

    .markdown-body > :first-child {
      margin-top: 0;
    }

    .markdown-body > :last-child {
      margin-bottom: 0;
    }

    .markdown-body p,
    .markdown-body ul,
    .markdown-body ol,
    .markdown-body blockquote,
    .markdown-body pre,
    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4 {
      margin: 0 0 0.95em;
    }

    .markdown-body ul,
    .markdown-body ol {
      padding-left: 1.4em;
    }

    .markdown-body li + li {
      margin-top: 0.28em;
    }

    .markdown-body code {
      border-radius: 6px;
      background: var(--surface-code);
      padding: 0.14em 0.4em;
      font-family: "SFMono-Regular", "Menlo", monospace;
      font-size: 0.92em;
    }

    .markdown-body pre {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 12px;
    }

    .markdown-body pre code {
      background: transparent;
      padding: 0;
    }

    .markdown-body blockquote {
      border-left: 3px solid var(--border-strong);
      padding-left: 12px;
      color: var(--text-muted);
    }

    .markdown-body a {
      color: var(--teal);
      text-decoration-thickness: 1.5px;
      text-underline-offset: 0.16em;
    }

    .judge-list {
      display: grid;
      gap: 8px;
    }

    .judge-item {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 11px;
      display: grid;
      gap: 8px;
    }

    .judge-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .judge-name {
      color: var(--text-subtle);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .judge-justification {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.87rem;
      line-height: 1.52;
    }

    .reasoning-panel {
      padding: 12px;
      background: var(--surface-elevated);
      border-color: var(--line);
    }

    .reasoning-topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    .reasoning-heading {
      display: grid;
      gap: 4px;
      min-width: 0;
      width: 100%;
    }

    .reasoning-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .reasoning-title-row h2 {
      margin-right: 4px;
    }

    .reasoning-title-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .reasoning-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      min-width: 0;
    }

    .reasoning-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: 2px;
      padding-left: 8px;
      border-left: 1px solid var(--border-soft);
    }

    .reasoning-note {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.52;
      max-width: 76ch;
    }

    .reasoning-sections {
      display: grid;
      gap: 8px;
    }

    .panel-control-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .panel-control-row.answer-controls {
      gap: 6px;
      flex-wrap: nowrap;
    }

    .answer-toggle {
      flex: 0 0 auto;
    }

    .answer-toggle svg {
      width: 13px;
      height: 13px;
    }

    .compare-toggle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 30px;
      padding: 0 11px 0 9px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--button-secondary-bg);
      color: var(--text-subtle);
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.01em;
      box-shadow: var(--button-secondary-shadow);
      transition:
        border-color var(--transition),
        background var(--transition),
        color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .stage-sticky-stack.is-stuck .compare-toggle {
      gap: 6px;
      min-height: 28px;
      padding: 0 9px 0 8px;
      font-size: 0.72rem;
    }

    .compare-toggle svg {
      width: 17px;
      height: 17px;
      display: block;
      flex: 0 0 auto;
    }

    .stage-sticky-stack.is-stuck .compare-toggle svg {
      width: 14px;
      height: 14px;
    }

    .compare-toggle-label {
      display: block;
      white-space: nowrap;
    }

    .compare-toggle .compare-left {
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      opacity: 0.88;
    }

    .compare-toggle .compare-right {
      fill: var(--surface-muted);
      stroke: var(--border-strong);
      stroke-width: 1.5;
    }

    .compare-toggle .compare-badge {
      fill: var(--surface-elevated);
      stroke: var(--border-strong);
      stroke-width: 1.35;
    }

    .compare-toggle .compare-symbol {
      fill: none;
      stroke: var(--text-muted);
      stroke-width: 1.55;
      stroke-linecap: round;
    }

    .compare-toggle:hover,
    .compare-toggle:focus-visible {
      outline: none;
      background: var(--button-secondary-bg-hover);
      border-color: var(--button-secondary-border-hover);
      transform: translateY(-1px);
      box-shadow: var(--focus-ring), var(--button-secondary-shadow-hover);
    }

    .compare-toggle.active {
      background: color-mix(in srgb, var(--surface-accent) 72%, var(--mix-base));
      border-color: color-mix(in srgb, var(--border-selected) 34%, var(--line));
      color: var(--text-subtle);
      box-shadow: var(--button-secondary-shadow);
    }

    .compare-toggle.active .compare-right {
      fill: var(--surface-accent);
      stroke: currentColor;
    }

    .compare-toggle.active .compare-badge {
      fill: currentColor;
      stroke: currentColor;
    }

    .compare-toggle.active .compare-symbol {
      stroke: var(--mix-base);
    }

    .answer-preview {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .reasoning-section {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 12px 12px;
      display: grid;
      gap: 6px;
    }

    .reasoning-section h3 {
      margin: 0;
      padding: 0;
      font-size: 0.84rem;
      color: var(--text-subtle);
    }

    .trace-editor-body {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      box-shadow: none;
      padding: 14px 16px;
      min-height: 220px;
      cursor: text;
    }

    .trace-editor-body.selected {
      border-color: var(--border-emphasis);
      background: var(--surface-elevated);
    }

    .trace-document {
      display: block;
    }

    .trace-paragraph {
      display: block;
      margin: 0 0 0.64em;
    }

    .trace-paragraph:last-child {
      margin-bottom: 0;
    }

    .trace-sentence {
      display: inline;
      border-radius: 2px;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      transition: background var(--transition), box-shadow var(--transition);
      cursor: text;
    }

    .trace-sentence:hover {
      background: transparent;
    }

    .trace-sentence.selected {
      background: var(--selection-fill);
    }

    .annotation-text {
      position: relative;
      white-space: normal;
      color: var(--text-subtle);
      font-size: 0.93rem;
      line-height: 1.64;
      user-select: text;
    }

    .annotation-mark {
      background: color-mix(in srgb, var(--mark-bg) 26%, var(--mix-base));
      color: var(--text-strong);
      border: 1px solid color-mix(in srgb, var(--mark-bg) 18%, var(--mix-base));
      border-bottom: 1px solid color-mix(in srgb, var(--mark-bg) 60%, var(--mix-base));
      border-radius: 2px;
      padding: 0.01em 0.08em;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      transition: box-shadow var(--transition), background var(--transition);
      cursor: pointer;
    }

    .annotation-mark:hover,
    .annotation-mark.active,
    .annotation-mark.fresh {
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--mark-bg) 18%, transparent);
      background: color-mix(in srgb, var(--mark-bg) 28%, var(--mix-base));
    }

    .annotation-mark.fresh {
      animation: mark-flash 1.35s ease-out;
    }

    @keyframes mark-flash {
      0% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--mark-bg) 40%, transparent);
        background: color-mix(in srgb, var(--mark-bg) 54%, var(--mix-base));
      }
      100% {
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--mark-bg) 28%, transparent);
        background: color-mix(in srgb, var(--mark-bg) 38%, var(--mix-base));
      }
    }

    .selection-preview {
      border: 1px solid var(--line);
      background: var(--surface-elevated);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .selection-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .selection-quote {
      margin: 0;
      font-size: 0.92rem;
      color: var(--text-subtle);
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .inspector-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .inspector-tools {
      gap: 6px;
    }

    .field.compact {
      gap: 0;
    }

    .field.compact > span {
      display: none;
    }

    .field.compact textarea {
      min-height: 76px;
      font-size: 0.88rem;
      line-height: 1.48;
    }

    .category-grid {
      display: grid;
      gap: 10px;
    }

    .category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .composer-head {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 10px 16px;
    }

    .composer-head > h2,
    .composer-head > h3 {
      margin: 0;
      min-width: 0;
    }

    .composer-head > .composer-target-switch {
      grid-column: 1 / -1;
    }

    .composer-heading-main {
      display: grid;
      gap: 10px;
      align-items: start;
      min-width: 0;
    }

    .overall-trace-card {
      display: grid;
      gap: 12px;
    }

    .composer-target-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 4px;
      align-items: stretch;
      width: 100%;
      max-width: 100%;
      padding: 3px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-muted);
    }

    .composer-target-button {
      display: inline-flex;
      width: 100%;
      min-width: 0;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      min-height: 28px;
      padding: 4px 8px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1;
      transition: border-color var(--transition), background var(--transition), color var(--transition), box-shadow var(--transition);
    }

    .composer-target-button:hover,
    .composer-target-button:focus-visible {
      outline: none;
      border-color: var(--border-emphasis);
      background: color-mix(in srgb, var(--surface-elevated) 84%, var(--surface-muted));
    }

    .composer-target-button:focus-visible {
      box-shadow: var(--focus-ring);
    }

    .composer-target-button.active {
      background: var(--surface-elevated);
      border-color: var(--line);
      color: var(--text-subtle);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }

    .composer-target-button.gpt.active {
      border-color: var(--model-gpt-line);
      background: color-mix(in srgb, var(--model-gpt-soft) 78%, var(--surface-elevated));
      color: var(--model-gpt-ink);
    }

    .composer-target-button.sonnet.active {
      border-color: var(--model-sonnet-line);
      background: color-mix(in srgb, var(--model-sonnet-soft) 74%, var(--surface-elevated));
      color: var(--model-sonnet-ink);
    }

    .composer-target-indicator {
      position: relative;
      width: 11px;
      height: 11px;
      border-radius: 999px;
      border: 1.5px solid color-mix(in srgb, var(--line) 90%, transparent);
      background: transparent;
      flex: 0 0 auto;
      transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    }

    .composer-target-indicator::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 4px;
      height: 4px;
      border-radius: 999px;
      background: transparent;
      transform: translate(-50%, -50%);
      transition: background var(--transition);
    }

    .composer-target-button.active .composer-target-indicator {
      border-color: currentColor;
      background: color-mix(in srgb, currentColor 10%, var(--surface-elevated));
    }

    .composer-target-button.active .composer-target-indicator::after {
      background: currentColor;
    }

    .composer-target-button-label {
      display: inline-flex;
      align-items: center;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .save-state-pill {
      min-width: auto;
      min-height: auto;
      padding: 3px 6px;
      border-radius: 6px;
      justify-content: center;
      text-align: center;
      font-size: 0.72rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .tooltip-anchor {
      position: relative;
    }

    .tooltip-anchor::after,
    .tooltip-anchor::before {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      transition: opacity 120ms ease, transform 120ms ease;
      z-index: 40;
    }

    .tooltip-anchor::after {
      content: attr(data-tip);
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%) translateY(2px);
      max-width: 220px;
      min-width: max-content;
      padding: 6px 8px;
      border-radius: 8px;
      background: rgba(27, 31, 36, 0.94);
      color: #f6f8fa;
      font-size: 0.74rem;
      line-height: 1.35;
      white-space: normal;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    .tooltip-anchor::before {
      content: "";
      left: 50%;
      bottom: calc(100% + 3px);
      transform: translateX(-50%) translateY(2px);
      border: 5px solid transparent;
      border-top-color: rgba(27, 31, 36, 0.94);
    }

    .tooltip-anchor:hover::after,
    .tooltip-anchor:hover::before,
    .tooltip-anchor:focus-visible::after,
    .tooltip-anchor:focus-visible::before {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .tooltip-anchor.no-tip::after,
    .tooltip-anchor.no-tip::before {
      display: none;
    }

    .metric-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      height: 22px;
      padding: 0 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1;
      cursor: help;
      white-space: nowrap;
    }

    .metric-chip svg {
      width: 11px;
      height: 11px;
      flex: 0 0 auto;
      transform-box: fill-box;
      transform-origin: center;
      transform: translateY(0.2px);
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .status-icon-badge {
      display: inline-flex;
      align-items: center;
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      padding: 0;
      justify-content: center;
      line-height: 0;
      vertical-align: middle;
      border-radius: 999px;
      cursor: help;
      border-width: 1px;
      border-style: solid;
      box-shadow: none;
    }

    .status-icon-badge svg,
    .ai-action-btn svg,
    .icon-action-btn svg {
      width: 12px;
      height: 12px;
      display: block;
      margin: 0;
      flex: 0 0 auto;
      transform-box: fill-box;
      transform-origin: center;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .ui-icon-undo {
      transform: translate(0.25px, 0.15px);
    }

    .ui-icon-tag {
      transform: translateY(0.25px);
    }

    .status-icon-badge.ai {
      background: color-mix(in srgb, #8a97a6 10%, var(--mix-base));
      border-color: color-mix(in srgb, #8a97a6 24%, var(--line));
      color: #677482;
    }

    .status-icon-badge.pending {
      background: color-mix(in srgb, #d8a24d 13%, var(--mix-base));
      border-color: color-mix(in srgb, #c58a2d 28%, var(--line));
      color: #94641a;
    }

    .status-icon-badge.reviewed {
      background: color-mix(in srgb, #6d89aa 12%, var(--mix-base));
      border-color: color-mix(in srgb, #5d7ea7 28%, var(--line));
      color: #486789;
    }

    .ai-action-btn {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      width: 24px;
      height: 24px;
      padding: 0;
      border-width: 1px;
      border-style: solid;
      border-radius: 6px;
      transition:
        background var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
    }

    .ai-action-btn svg {
      position: relative;
      z-index: 1;
    }

    .ai-action-btn:not([disabled]) {
      background: linear-gradient(
        180deg,
        color-mix(in srgb, #ffffff 80%, #aeb8c2 20%) 0%,
        color-mix(in srgb, var(--mix-base) 72%, #d2d8de 28%) 100%
      );
      border-color: color-mix(in srgb, #8896a3 28%, var(--line));
      color: color-mix(in srgb, #314150 72%, var(--text-subtle));
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.72) inset,
        0 1px 2px rgba(20, 25, 23, 0.1);
    }

    .ai-action-btn:not([disabled]):hover,
    .ai-action-btn:not([disabled]):focus-visible {
      background: linear-gradient(
        180deg,
        color-mix(in srgb, #ffffff 76%, #9da9b5 24%) 0%,
        color-mix(in srgb, var(--mix-base) 66%, #c8d0d8 34%) 100%
      );
      border-color: color-mix(in srgb, #7f8d9a 36%, var(--line));
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.78) inset,
        0 2px 6px rgba(20, 25, 23, 0.14);
      outline: none;
    }

    .ai-action-btn:not([disabled]):active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.5) inset,
        0 1px 2px rgba(20, 25, 23, 0.12);
    }

    .ai-action-btn[disabled] {
      opacity: 0.62;
      cursor: default;
      background: var(--surface-muted);
      border-color: var(--line);
      color: var(--text-muted);
      box-shadow: none;
    }

    @keyframes ai-action-btn-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes ai-action-btn-pulse {
      0%,
      100% {
        border-color: color-mix(in srgb, #8d9ba9 30%, var(--line));
        box-shadow: var(--button-secondary-shadow);
      }
      50% {
        border-color: color-mix(in srgb, #5e7286 44%, var(--line));
        box-shadow:
          var(--button-secondary-shadow-hover),
          0 0 0 1px rgba(103, 116, 130, 0.08);
      }
    }

    .ai-action-btn.is-loading,
    .ai-action-btn.is-loading[disabled] {
      opacity: 1;
      cursor: wait;
      background: var(--button-secondary-bg);
      border-color: color-mix(in srgb, #6b7e90 38%, var(--line));
      color: color-mix(in srgb, #3e5367 68%, var(--text-subtle));
      animation: ai-action-btn-pulse 1.35s ease-in-out infinite;
    }

    .ai-action-btn.is-loading svg {
      animation: ai-action-btn-spin 1s linear infinite;
    }

    @media (prefers-reduced-motion: reduce) {
      .ai-action-btn.is-loading,
      .ai-action-btn.is-loading[disabled] {
        animation: none;
      }

      .ai-action-btn.is-loading svg {
        animation: none;
      }
    }

    .icon-action-btn {
      appearance: none;
      -webkit-appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--button-secondary-bg);
      color: #66717b;
      box-shadow: var(--button-secondary-shadow);
      transition:
        background var(--transition),
        border-color var(--transition),
        color var(--transition),
        box-shadow var(--transition),
        transform var(--transition);
    }

    .icon-action-btn:hover,
    .icon-action-btn:focus-visible {
      background: var(--button-secondary-bg-hover);
      border-color: var(--button-secondary-border-hover);
      color: #43515e;
      box-shadow: var(--button-secondary-shadow-hover);
      outline: none;
    }

    .icon-action-btn:active {
      transform: translateY(1px);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.5) inset,
        0 1px 2px rgba(20, 25, 23, 0.12);
    }

    .icon-action-btn[disabled] {
      opacity: 0.6;
      cursor: default;
      box-shadow: none;
    }

    .overall-label-list {
      display: grid;
      gap: 8px;
    }

    .overall-label-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-elevated);
      padding: 8px 10px;
      text-align: left;
      color: var(--text-strong);
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.25;
    }

    .overall-label-item.selected {
      border-color: var(--border-selected);
      background: var(--surface-accent-strong);
    }

    .overall-note-field {
      display: grid;
      gap: 8px;
    }

    .overall-note-field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    #traceSummaryInput {
      min-height: 112px;
      line-height: 1.45;
      resize: vertical;
    }

    .category-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 5px 8px;
      max-width: 100%;
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .category-item.selected {
      border-color: var(--border-selected);
      box-shadow: none;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .category-name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-strong);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .category-description {
      display: none;
      margin: 0;
      color: var(--text-muted);
      font-size: 0.86rem;
      line-height: 1.48;
    }

    .annotation-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 208px);
      overflow-y: auto;
      overflow-x: hidden;
      padding-right: 4px;
    }

    .annotation-detail-card {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 10px;
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .annotation-detail-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-strong);
    }

    .annotation-detail-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .annotation-detail-actions .toolbar-btn {
      padding: 6px 8px;
    }

    .review-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .review-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.78rem;
      line-height: 1.3;
    }

    .review-toggle input {
      margin: 0;
    }

    .selection-toolbar {
      position: fixed;
      z-index: 100;
      display: none;
      width: min(420px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      box-shadow: var(--shadow-lg);
      padding: 7px 9px 9px;
    }

    .selection-toolbar.visible {
      display: grid;
      gap: 8px;
    }

    .selection-toolbar.flash-mode {
      width: auto;
      min-width: 220px;
      max-width: min(360px, calc(100vw - 24px));
      gap: 6px;
      padding: 9px 11px;
      pointer-events: none;
    }

    .selection-flash-title {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-faint);
    }

    .selection-flash-body {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-subtle);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .selection-toolbar-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar-category-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      font-size: 0.77rem;
      font-weight: 500;
      border-radius: 8px;
      border-color: var(--line);
    }

    .toolbar-category-chip.selected {
      border-color: var(--border-selected);
      background: var(--surface-accent);
    }

    .toolbar-btn {
      padding: 6px 10px;
      font-size: 0.77rem;
    }

    .toolbar-btn.primary {
      background: rgba(28, 142, 120, 0.14);
      border-color: rgba(28, 142, 120, 0.14);
      color: #165b51;
    }

    .toolbar-meta {
      color: var(--text-faint);
      font-size: 0.78rem;
    }

    details.inline-details {
      border-top: 1px solid var(--border-soft);
      padding-top: 12px;
    }

    details.inline-details summary {
      cursor: pointer;
      color: var(--text-subtle);
      font-size: 0.84rem;
      font-weight: 800;
      list-style: none;
    }

    details.inline-details summary::-webkit-details-marker {
      display: none;
    }

    .model-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .annotation-card {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 9px 10px;
      display: grid;
      gap: 5px;
      text-align: left;
      transition: border-color var(--transition), background var(--transition);
    }

    .annotation-card:hover,
    .annotation-card.active {
      border-color: var(--border-emphasis);
      background: var(--surface-subtle-strong);
    }

    .annotation-card-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .annotation-card-delete {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-muted);
      color: var(--text-muted);
      padding: 3px 8px;
      font-size: 0.68rem;
      font-weight: 700;
      line-height: 1.1;
      white-space: nowrap;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }

    .annotation-card-delete:hover,
    .annotation-card-delete:focus-visible {
      border-color: rgba(209, 73, 91, 0.28);
      background: rgba(209, 73, 91, 0.08);
      color: #8e3a47;
      outline: none;
    }

    .annotation-quote {
      margin: 0;
      color: var(--text-subtle);
      font-size: 0.84rem;
      line-height: 1.48;
      text-align: left;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      overflow: hidden;
    }

    .annotation-comment {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.42;
      text-align: left;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .annotation-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.4;
    }

    .annotation-meta-main {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .annotation-meta-date {
      white-space: nowrap;
    }

    .inline-note-field {
      display: grid;
      gap: 6px;
    }

    .inline-note-field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .inline-note-field textarea {
      min-height: 82px;
      resize: vertical;
    }

    .empty-state {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.52;
    }

    .empty-state strong {
      color: var(--text-strong);
    }

    dialog {
      border: none;
      padding: 0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(20, 25, 23, 0.12);
      width: min(560px, calc(100vw - 32px));
      background: transparent;
    }

    dialog::backdrop {
      background: var(--overlay-backdrop);
    }

    .dialog-card {
      background: var(--panel-strong);
      border-radius: 10px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .app-toast {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 120;
      display: none;
      max-width: min(360px, calc(100vw - 24px));
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      color: var(--text-subtle);
      padding: 9px 11px;
      font-size: 0.82rem;
      line-height: 1.42;
    }

    .app-toast.visible {
      display: block;
    }

    .app-toast.error {
      border-color: rgba(209, 73, 91, 0.18);
      color: #7e3440;
    }

    .inspector-tools .btn {
      padding: 6px 8px;
      border-color: var(--line);
      background: var(--surface-muted);
      color: var(--text-muted);
      box-shadow: none;
      text-decoration: none;
    }

    .inspector-tools .btn:hover,
    .inspector-tools .btn:focus-visible {
      transform: none;
      border-color: var(--border-emphasis);
      background: var(--surface-subtle);
      box-shadow: none;
      color: var(--text-subtle);
    }

    .dialog-grid {
      display: grid;
      gap: 10px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :root[data-theme="dark"] .btn.primary {
      background: linear-gradient(180deg, #74b3a6 0%, #5e9f91 100%);
      border-color: #74b3a6;
      color: #08110e;
    }

    :root[data-theme="dark"] .btn.primary:hover,
    :root[data-theme="dark"] .btn.primary:focus-visible {
      background: #81c0b3;
      border-color: #81c0b3;
    }

    :root[data-theme="dark"] .btn.warn {
      background: #43252c;
      border-color: #6d3a44;
      color: #f1b1bb;
    }

    :root[data-theme="dark"] .toolbar-btn.primary {
      background: rgba(121, 184, 170, 0.18);
      border-color: rgba(121, 184, 170, 0.22);
      color: #c7ebe2;
    }

    :root[data-theme="dark"] .pill.green {
      background: #183126;
      border-color: #2c5943;
      color: #9dd8bb;
    }

    :root[data-theme="dark"] .pill.amber {
      background: #362815;
      border-color: #6c5330;
      color: #efca8d;
    }

    :root[data-theme="dark"] .pill.red {
      background: #3a2026;
      border-color: #74414a;
      color: #efb0ba;
    }

    :root[data-theme="dark"] .pill.blue,
    :root[data-theme="dark"] .pill.violet {
      background: var(--workflow-review-surface);
      border-color: var(--workflow-review-line);
      color: var(--workflow-review-text);
    }

    :root[data-theme="dark"] .pill.slate {
      background: #1f2925;
      border-color: #3a4742;
      color: #c2d0cb;
    }

    :root[data-theme="dark"] .swatch {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    :root[data-theme="dark"] .app-toast.error {
      border-color: rgba(225, 111, 126, 0.24);
      color: #f2b2bc;
    }

    @media (max-width: 1440px) {
      .filter-grid {
        grid-template-columns: minmax(240px, 2fr) repeat(2, minmax(150px, 1fr)) minmax(170px, 1fr);
      }

      .filter-actions {
        grid-column: 1 / -1;
        justify-content: flex-end;
      }
    }

    @media (max-width: 1180px) {
      .stage-body,
      .right-rail,
      .review-detail-grid,
      .review-layout,
      .report-source-grid,
      .report-note-columns {
        grid-template-columns: 1fr;
      }

      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .explorer-view {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .appbar {
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 10px;
      }

      .appbar-left {
        flex-wrap: wrap;
      }

      .appbar-actions {
        min-width: 100%;
        flex-wrap: wrap;
      }

      .appbar-right-group {
        justify-content: flex-start;
        width: 100%;
        overflow: visible;
        flex-wrap: wrap;
        gap: 12px;
      }

      .switch-cluster.model-cluster,
      .switch-cluster.benchmark-cluster,
      .appbar-coverage {
        flex: 1 1 100%;
      }

      .toolbar {
        justify-content: flex-start;
        flex-wrap: wrap;
        margin-left: 0;
        width: 100%;
      }

      .view-switch {
        order: 3;
      }

      .switch-cluster.model-cluster,
      .switch-cluster.benchmark-cluster {
        min-width: 0;
        width: auto;
      }

      .switch-cluster.benchmark-cluster,
      .appbar-coverage {
        padding-left: 0;
        border-left: none;
      }

      .rail {
        position: static;
      }

      .left-rail > .panel {
        min-height: 0;
      }

      .left-rail .control-grid {
        grid-template-rows: none;
      }

      .case-list,
      .annotation-list {
        max-height: none;
      }

    }

    @media (max-width: 720px) {
      .app {
        width: min(100%, 100vw);
        margin: 10px auto 16px;
      }

      .appbar {
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 10px;
      }

      .appbar-left {
        flex-wrap: wrap;
      }

      .panel,
      .question-panel,
      .reasoning-panel {
        padding: 14px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .report-note-columns {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
        margin-left: 0;
        width: 100%;
      }

      .appbar-actions {
        min-width: 100%;
        flex-wrap: wrap;
      }

      .appbar-right-group {
        justify-content: flex-start;
        width: 100%;
        overflow: visible;
        flex-wrap: wrap;
      }

      .switch-cluster.model-cluster,
      .switch-cluster.benchmark-cluster,
      .appbar-coverage {
        flex: 1 1 100%;
      }

      .view-switch {
        order: 3;
      }

      .switch-cluster.model-cluster,
      .switch-cluster.benchmark-cluster {
        min-width: 0;
        width: auto;
      }

      .switch-cluster.benchmark-cluster {
        padding-left: 0;
        border-left: none;
      }

      .composer-head {
        grid-template-columns: 1fr;
      }

      .composer-target-switch {
        flex-wrap: wrap;
        width: auto;
      }

      .save-state-pill {
        justify-self: start;
      }

    }
  </style>
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-left">
        <div class="appbar-brand">
          <img class="appbar-logo" src="../assets/bsbench.png" alt="BullshitBench logo">
          <p class="appbar-brand-name">BullshitBench</p>
        </div>
        <div class="view-switch" id="viewSwitch" aria-label="Workspace view"></div>
      </div>
      <div class="appbar-actions">
        <div class="appbar-right-group">
          <div class="switch-cluster model-cluster">
            <div class="source-switch" id="sourceSwitch" aria-label="Model switch"></div>
          </div>
          <div class="switch-cluster benchmark-cluster">
            <div class="dataset-switch" id="datasetSwitch" aria-label="Dataset switch"></div>
          </div>
          <div class="appbar-coverage" id="appbarCoverage" aria-label="Benchmark coverage"></div>
        </div>
        <div class="toolbar">
          <div id="themeSwitch" class="theme-switch" aria-label="Colour theme"></div>
          <button id="exportBtn" type="button">Export</button>
          <button id="importBtn" type="button">Import</button>
          <button id="toggleSidebarBtn" type="button">Show tools</button>
        </div>
        <div class="status-line" id="statusLine">Connecting to local annotation store...</div>
      </div>
    </header>

    <section class="panel filter-panel view-pane" id="filterPanel">
      <div class="filter-grid">
        <label class="field">
          <span>Search</span>
          <input id="searchInput" type="text" placeholder="Question id, wording, note text, label...">
        </label>
        <label class="field">
          <span>Grade</span>
          <select id="gradeFilterSelect">
            <option value="all">All grades</option>
            <option value="accepted">Accepted nonsense</option>
            <option value="partial">Partial challenge</option>
            <option value="clear">Clear pushback</option>
            <option value="missing">Missing</option>
          </select>
        </label>
        <label class="field">
          <span>Labels</span>
          <select id="annotationFilterSelect">
            <option value="all">All</option>
            <option value="unreviewed">Not labelled</option>
            <option value="in_progress">In progress</option>
            <option value="needs_review">Needs review</option>
            <option value="validated">Validated</option>
          </select>
        </label>
        <label id="domainFilterField" class="field">
          <span>Domains</span>
          <details id="domainFilterDetails" class="multi-select">
            <summary>
              <span id="domainFilterSummary" class="multi-select-summary">All domains</span>
            </summary>
            <div class="multi-select-panel">
              <div class="multi-select-actions">
                <button id="selectAllDomainsBtn" type="button">All domains</button>
                <button id="closeDomainFilterBtn" type="button">Done</button>
              </div>
              <div id="domainFilterList" class="multi-select-list"></div>
            </div>
          </details>
        </label>
        <div class="filter-actions">
          <div id="aiInlineStatus" class="ai-inline-status" aria-live="polite"></div>
          <button id="labelSelectedAiBtn" class="btn small" type="button">AI Label</button>
        </div>
      </div>
      <p class="filter-meta" id="filterMeta"></p>
    </section>

    <section class="explorer-view view-pane" id="explorerView">
      <section class="panel explorer-panel" id="explorerPanel">
        <div class="explorer-table-wrap">
          <table class="explorer-table">
            <thead id="questionExplorerHead">
            </thead>
            <tbody id="questionExplorerList"></tbody>
          </table>
        </div>
