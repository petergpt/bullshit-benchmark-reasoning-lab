<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BullshitBench Reasoning Lab</title>
  <link rel="icon" href="../assets/bsbench.png">
  <script>
    (() => {
      try {
        const stored = window.localStorage.getItem("reasoningLab.theme");
        const preference = ["light", "dark"].includes(stored) ? stored : "system";
        const resolved = preference === "system"
          ? (window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light")
          : preference;
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.style.colorScheme = resolved;
      } catch (_error) {
        document.documentElement.dataset.themePreference = "system";
        const fallback = window.matchMedia?.("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.dataset.theme = fallback;
        document.documentElement.style.colorScheme = fallback;
      }
    })();
  </script>
  <style>
    :root {
      --bg: #f7f4ee;
      --panel: #ffffff;
      --panel-strong: #ffffff;
      --ink: #17211d;
      --muted: #5d6965;
      --line: #d8ddd9;
      --teal: #185f55;
      --teal-soft: #edf6f2;
      --teal-deep: #123f3a;
      --amber: #d28a13;
      --rose: #f7dfdd;
      --green: #1f8f5c;
      --red: #d1495b;
      --blue: #2878c7;
      --violet: #7b5cc7;
      --model-gpt: #2878c7;
      --model-gpt-soft: #eef4fb;
      --model-gpt-line: #cfdced;
      --model-gpt-ink: #28547d;
      --model-sonnet: #c57a1f;
      --model-sonnet-soft: #fbf1e4;
      --model-sonnet-line: #ead1ad;
      --model-sonnet-ink: #85501a;
      --shadow-lg: 0 4px 12px rgba(28, 38, 35, 0.04);
      --shadow-md: 0 1px 3px rgba(28, 38, 35, 0.03);
      --radius-xl: 10px;
      --radius-lg: 10px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --transition: 160ms ease;
      --surface-elevated: #ffffff;
      --surface-elevated-strong: #ffffff;
      --surface-subtle: #f6f7f6;
      --surface-subtle-strong: #fbfcfb;
      --surface-muted: #f7f8f7;
      --surface-soft: #fafbfa;
      --surface-accent: #eef3f1;
      --surface-accent-strong: #f3f8f6;
      --surface-tag: #f4f6f5;
      --surface-code: #f3f5f4;
      --surface-input: rgba(255, 255, 255, 0.88);
      --surface-input-focus: #ffffff;
      --surface-overlay: rgba(255, 255, 255, 0.76);
      --border-strong: #c7d0cc;
      --border-soft: #edf1ef;
      --border-emphasis: #c3cbc6;
      --border-selected: #1d564c;
      --text-strong: #1c2a25;
      --text-subtle: #24312c;
      --text-muted: #5d6965;
      --text-faint: #667770;
      --focus-ring: 0 0 0 2px rgba(31, 101, 89, 0.1);
      --scrollbar-thumb: rgba(36, 70, 62, 0.16);
      --overlay-backdrop: rgba(20, 25, 23, 0.18);
      --selection-fill: rgba(29, 86, 76, 0.06);
      --mix-base: #ffffff;
      --theme-toggle-bg: rgba(255, 255, 255, 0.82);
      --theme-toggle-hover: #f6f7f6;
      --theme-toggle-active-bg: #eef3f1;
      --theme-toggle-active-line: #cdd7d2;
      --theme-toggle-active-ink: #123f3a;
    }

    :root[data-theme="dark"] {
      --bg: #0b0c0f;
      --panel: #15181c;
      --panel-strong: #191c21;
      --ink: #eef1f4;
      --muted: #98a0ab;
      --line: #2a2e35;
      --teal: #bbc2cc;
      --teal-soft: #20242b;
      --teal-deep: #f3f5f7;
      --amber: #deb062;
      --rose: #44272d;
      --green: #56bf8f;
      --red: #e16f7e;
      --blue: #78aee9;
      --violet: #a78cde;
      --model-gpt: #78aee9;
      --model-gpt-soft: #152637;
      --model-gpt-line: #304861;
      --model-gpt-ink: #b8d9ff;
      --model-sonnet: #d8a35a;
      --model-sonnet-soft: #352516;
      --model-sonnet-line: #654a2b;
      --model-sonnet-ink: #f1c88a;
      --shadow-lg: 0 18px 40px rgba(2, 7, 5, 0.42);
      --shadow-md: 0 10px 22px rgba(2, 7, 5, 0.28);
      --surface-elevated: #171a1f;
      --surface-elevated-strong: #1c2026;
      --surface-subtle: #20252c;
      --surface-subtle-strong: #232831;
      --surface-muted: #1d2229;
      --surface-soft: #121519;
      --surface-accent: #232830;
      --surface-accent-strong: #272d36;
      --surface-tag: #1d2228;
      --surface-code: #101318;
      --surface-input: rgba(16, 18, 23, 0.94);
      --surface-input-focus: #14181d;
      --surface-overlay: rgba(18, 21, 26, 0.9);
      --border-strong: #353b45;
      --border-soft: #252a31;
      --border-emphasis: #484f5b;
      --border-selected: #737b88;
      --text-strong: #f3f5f7;
      --text-subtle: #dce1e7;
      --text-muted: #b0b7c1;
      --text-faint: #8a929e;
      --focus-ring: 0 0 0 2px rgba(167, 174, 185, 0.16);
      --scrollbar-thumb: rgba(126, 133, 145, 0.28);
      --overlay-backdrop: rgba(4, 5, 7, 0.68);
      --selection-fill: rgba(189, 196, 208, 0.08);
      --mix-base: #0d0f13;
      --theme-toggle-bg: rgba(16, 18, 23, 0.92);
      --theme-toggle-hover: #252a31;
      --theme-toggle-active-bg: #2a3038;
      --theme-toggle-active-line: #414852;
      --theme-toggle-active-ink: #f3f5f7;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    }

    body::before {
      display: none;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
    }

    .app {
      width: min(1520px, calc(100vw - 24px));
      margin: 12px auto;
      display: grid;
      gap: 12px;
    }

    .appbar {
      display: flex;
      align-items: center;
      gap: 20px;
      min-height: 44px;
      padding: 0 0 2px;
      border-bottom: 1px solid var(--border-soft);
    }

    .appbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
      flex: 0 1 auto;
    }

    .appbar-brand {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .appbar-logo {
      width: 22px;
      height: 22px;
      display: block;
      flex: 0 0 auto;
    }

    .appbar-brand-name {
      margin: 0;
      font-size: 0.82rem;
      line-height: 1.2;
      font-weight: 600;
      color: var(--text-subtle);
      white-space: nowrap;
    }

    .appbar-actions {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      flex: 1 1 auto;
    }

    .appbar-right-group {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
      flex: 1 1 auto;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .appbar-right-group::-webkit-scrollbar {
      display: none;
    }

    .switch-cluster {
      display: inline-flex;
      align-items: center;
      gap: 0;
      min-width: 0;
      flex: 0 0 auto;
    }

    .switch-cluster.model-cluster {
      flex: 0 1 auto;
      min-width: 0;
    }

    .switch-cluster.benchmark-cluster {
      padding-left: 14px;
      border-left: 1px solid var(--border-soft);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: nowrap;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .toolbar button,
    .toolbar a {
      border: 1px solid var(--line);
      background: var(--surface-elevated);
      color: var(--text-subtle);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }

    .toolbar button:hover,
    .toolbar a:hover,
    .toolbar button:focus-visible,
    .toolbar a:focus-visible {
      outline: none;
      background: var(--surface-subtle);
      border-color: var(--border-emphasis);
    }

    .theme-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      padding: 2px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--theme-toggle-bg);
      backdrop-filter: blur(10px);
    }

    .theme-option {
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      padding: 5px 8px;
      font-size: 0.74rem;
      font-weight: 600;
      line-height: 1;
      transition: background var(--transition), color var(--transition), box-shadow var(--transition);
    }

    .theme-option:hover,
    .theme-option:focus-visible {
      outline: none;
      background: var(--theme-toggle-hover);
      color: var(--text-subtle);
    }

    .theme-option.active {
      background: var(--theme-toggle-active-bg);
      color: var(--theme-toggle-active-ink);
      box-shadow: inset 0 0 0 1px var(--theme-toggle-active-line);
    }

    .dataset-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 30px;
      padding: 0;
      border: none;
      border-radius: 0;
      background: transparent;
      justify-content: flex-start;
    }

    .source-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-height: 30px;
      border-bottom: 1px solid var(--line);
      justify-content: flex-start;
    }

    .view-switch {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      min-height: 34px;
      border-bottom: 1px solid var(--line);
    }

    .view-chip {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 7px 2px 8px;
      margin-right: 12px;
      font-size: 0.79rem;
      font-weight: 600;
      line-height: 1;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
    }

    .view-chip.active {
      color: var(--teal-deep);
      border-bottom-color: var(--teal-deep);
    }

    .dataset-segment {
      border: 1px solid var(--border-strong);
      background: var(--surface-elevated);
      color: var(--text-muted);
      padding: 5px 10px;
      margin-right: 0;
      font-size: 0.78rem;
      font-weight: 500;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition), border-color var(--transition);
    }

    .dataset-segment.active {
      color: var(--teal-deep);
      background: var(--surface-accent);
      border-color: color-mix(in srgb, var(--teal) 24%, var(--mix-base));
      font-weight: 600;
    }

    .source-segment {
      border: none;
      background: transparent;
      color: var(--text-muted);
      padding: 7px 1px 8px;
      margin-right: 16px;
      font-size: 0.78rem;
      font-weight: 500;
      border-bottom: 2px solid transparent;
      transition: color var(--transition), border-color var(--transition);
    }

    .source-segment.active {
      color: var(--teal-deep);
      border-bottom-color: var(--teal-deep);
      font-weight: 600;
    }

    .source-segment.gpt.active {
      color: var(--model-gpt-ink);
      border-bottom-color: var(--model-gpt);
    }

    .source-segment.sonnet.active {
      color: var(--model-sonnet-ink);
      border-bottom-color: var(--model-sonnet);
    }

    .workspace {
      display: grid;
      grid-template-columns: 312px minmax(0, 1fr) 252px;
      gap: 12px;
      align-items: start;
    }

    .workspace.sidebar-collapsed {
      grid-template-columns: minmax(300px, 360px) minmax(0, 1fr);
    }

    .workspace.sidebar-collapsed .right-rail {
      display: none;
    }

    .view-pane.is-active {
      animation: view-appear 160ms ease both;
    }

    @keyframes view-appear {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .explorer-view {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      min-width: 0;
      align-items: start;
    }

    .rail,
    .stage {
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .rail {
      position: static;
    }

    .left-rail > .panel {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: clamp(460px, calc(100vh - 176px), 760px);
      overflow: visible;
    }

    .left-rail .control-grid {
      min-height: 0;
      grid-template-rows: auto auto auto 1fr;
      overflow: visible;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: none;
      padding: 14px;
      min-width: 0;
    }

    .panel[hidden] {
      display: none !important;
    }

    .view-pane[hidden] {
      display: none !important;
    }

    .panel h2,
    .panel h3 {
      margin: 0;
      font-family: inherit;
      letter-spacing: normal;
      line-height: 1.25;
    }

    .panel h2 {
      font-size: 0.96rem;
      font-weight: 600;
    }

    .panel h3 {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
    }

    .section-head p,
    .panel-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
    }

    .filter-panel {
      padding: 10px 12px;
      position: relative;
      z-index: 24;
      overflow: visible;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: minmax(280px, 2.5fr) repeat(2, minmax(132px, 0.9fr)) minmax(170px, 1.1fr) auto;
      gap: 8px;
      align-items: end;
    }

    .filter-grid .field {
      min-width: 0;
    }

    .filter-actions {
      display: flex;
      justify-content: flex-end;
      align-items: end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-meta {
      margin: 8px 0 0;
      color: var(--text-faint);
      font-size: 0.76rem;
      line-height: 1.35;
    }

    .panel-subtitle.compact {
      font-size: 0.78rem;
      line-height: 1.36;
    }

    .control-grid {
      display: grid;
      gap: 8px;
    }

    .rail-filter-bar {
      display: grid;
      gap: 7px;
      position: relative;
      z-index: 12;
      overflow: visible;
    }

    .rail-filter-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 7px;
      align-items: start;
    }

    .rail-filter-row.with-domain {
      grid-template-columns: minmax(0, 1fr) auto;
    }

    .rail-filter-row.with-domain.domain-hidden {
      grid-template-columns: auto;
      justify-content: end;
    }

    .field.compact {
      gap: 0;
    }

    .field.compact > span {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .rail-filter-bar input[type="text"],
    .rail-filter-bar select,
    .rail-filter-bar details.multi-select summary {
      min-height: 34px;
      padding-top: 7px;
      padding-bottom: 7px;
      border-radius: 8px;
      font-size: 0.8rem;
      background: var(--surface-input);
    }

    .rail-filter-bar details.multi-select summary {
      padding-right: 34px;
    }

    .rail-filter-bar .multi-select-summary {
      font-size: 0.8rem;
    }

    .rail-filter-bar .btn {
      min-height: 34px;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    label.field {
      display: grid;
      gap: 5px;
      color: var(--text-subtle);
      font-size: 0.82rem;
      font-weight: 800;
    }

    input[type="text"],
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 8px 10px;
      background: var(--surface-input);
      color: var(--ink);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    input[type="text"]:focus,
    select:focus,
    textarea:focus {
      border-color: var(--border-selected);
      background: var(--surface-input-focus);
      box-shadow: var(--focus-ring);
    }

    details.multi-select {
      position: relative;
      z-index: 0;
    }

    details.multi-select[open] {
      z-index: 48;
    }

    details.multi-select summary {
      list-style: none;
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 8px 38px 8px 10px;
      background: var(--surface-input);
      color: var(--ink);
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
    }

    details.multi-select summary::-webkit-details-marker {
      display: none;
    }

    details.multi-select summary::after {
      content: "";
      position: absolute;
      right: 12px;
      top: 50%;
      width: 8px;
      height: 8px;
      border-right: 1.5px solid var(--text-faint);
      border-bottom: 1.5px solid var(--text-faint);
      transform: translateY(-65%) rotate(45deg);
      pointer-events: none;
    }

    details.multi-select[open] summary {
      border-color: var(--border-selected);
      background: var(--surface-input-focus);
      box-shadow: var(--focus-ring);
    }

    details.multi-select[open] summary::after {
      transform: translateY(-35%) rotate(225deg);
    }

    .multi-select-summary {
      display: block;
      color: var(--text-subtle);
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .multi-select-panel {
      position: absolute;
      z-index: 60;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      padding: 8px;
      display: grid;
      gap: 6px;
    }

    .multi-select-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }

    .multi-select-actions button {
      border: none;
      background: transparent;
      color: var(--teal);
      padding: 0;
      font-size: 0.76rem;
      font-weight: 500;
    }

    .multi-select-actions button:hover,
    .multi-select-actions button:focus-visible {
      color: var(--teal-deep);
      outline: none;
      text-decoration: underline;
    }

    .multi-select-list {
      display: grid;
      gap: 4px;
      max-height: 220px;
      overflow-y: auto;
      padding-right: 2px;
    }

    .multi-select-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 2px;
      color: var(--text-subtle);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .multi-select-option input {
      margin: 0;
      width: auto;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toggle-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: var(--surface-elevated);
      padding: 7px 10px;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-subtle);
    }

    .toggle-chip input {
      width: auto;
      margin: 0;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .explorer-summary {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--text-faint);
      font-size: 0.76rem;
      line-height: 1.4;
    }

    .explorer-stat {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      min-width: 0;
    }

    .explorer-stat strong {
      font-size: 0.9rem;
      line-height: 1;
      color: var(--text-strong);
      font-weight: 600;
    }

    .explorer-stat span {
      color: var(--text-faint);
      font-size: 0.76rem;
      line-height: 1.25;
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface-elevated);
      color: var(--text-subtle);
      border-radius: 8px;
      padding: 7px 10px;
      font-size: 0.78rem;
      font-weight: 500;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }

    .btn:hover,
    .btn:focus-visible {
      border-color: var(--border-emphasis);
      background: var(--surface-subtle);
      outline: none;
    }

    .btn.primary {

      background: color-mix(in srgb, var(--mark-bg) 26%, var(--mix-base));
      color: var(--text-strong);
      border: 1px solid color-mix(in srgb, var(--mark-bg) 18%, var(--mix-base));
      border-bottom: 1px solid color-mix(in srgb, var(--mark-bg) 60%, var(--mix-base));
      border-radius: 2px;
      padding: 0.01em 0.08em;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
      transition: box-shadow var(--transition), background var(--transition);
      cursor: pointer;
    }

    .annotation-mark:hover,
    .annotation-mark.active,
    .annotation-mark.fresh {
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--mark-bg) 18%, transparent);
      background: color-mix(in srgb, var(--mark-bg) 28%, var(--mix-base));
    }

    .annotation-mark.fresh {
      animation: mark-flash 1.35s ease-out;
    }

    @keyframes mark-flash {
      0% {
        box-shadow: 0 0 0 0 color-mix(in srgb, var(--mark-bg) 40%, transparent);
        background: color-mix(in srgb, var(--mark-bg) 54%, var(--mix-base));
      }
      100% {
        box-shadow: 0 0 0 1px color-mix(in srgb, var(--mark-bg) 28%, transparent);
        background: color-mix(in srgb, var(--mark-bg) 38%, var(--mix-base));
      }
    }

    .selection-preview {
      border: 1px solid var(--line);
      background: var(--surface-elevated);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .selection-label {
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .selection-quote {
      margin: 0;
      font-size: 0.92rem;
      color: var(--text-subtle);
      line-height: 1.56;
      white-space: pre-wrap;
    }

    .inspector-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .inspector-tools {
      gap: 6px;
    }

    .field.compact {
      gap: 0;
    }

    .field.compact span {
      display: none;
    }

    .field.compact textarea {
      min-height: 76px;
      font-size: 0.88rem;
      line-height: 1.48;
    }

    .category-grid {
      display: grid;
      gap: 10px;
    }

    .category-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .composer-head {
      align-items: flex-start;
      gap: 10px;
    }

    .composer-heading-main {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .overall-trace-card {
      display: grid;
      gap: 12px;
    }

    .composer-target-switch {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      align-items: center;
      width: 100%;
      max-width: 228px;
    }

    .composer-target-button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-elevated);
      padding: 4px 9px;
      color: var(--text-subtle);
      font-size: 0.74rem;
      font-weight: 600;
      line-height: 1.15;
      white-space: nowrap;
      min-width: 0;
      transition: border-color var(--transition), background var(--transition), color var(--transition);
    }

    .composer-target-button:hover,
    .composer-target-button:focus-visible {
      outline: none;
      border-color: var(--border-emphasis);
      background: var(--surface-subtle);
    }

    .composer-target-button.selected {
      background: var(--surface-muted);
    }

    .composer-target-button.gpt.selected {
      border-color: var(--model-gpt-line);
      background: var(--model-gpt-soft);
      color: var(--model-gpt-ink);
    }

    .composer-target-button.sonnet.selected {
      border-color: var(--model-sonnet-line);
      background: var(--model-sonnet-soft);
      color: var(--model-sonnet-ink);
    }

    .save-state-pill {
      min-width: 9ch;
      justify-content: center;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .overall-label-list {
      display: grid;
      gap: 8px;
    }

    .overall-label-item {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--surface-elevated);
      padding: 8px 10px;
      text-align: left;
      color: var(--text-strong);
      font-weight: 600;
      font-size: 0.88rem;
      line-height: 1.25;
    }

    .overall-label-item.selected {
      border-color: var(--border-selected);
      background: var(--surface-accent-strong);
    }

    .overall-note-field {
      display: grid;
      gap: 8px;
    }

    .overall-note-field label {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .confidence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .confidence-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .confidence-chip.selected {
      border-color: var(--border-selected);
      background: var(--surface-accent-strong);
      color: var(--teal-deep);
    }

    .category-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 5px 8px;
      max-width: 100%;
      font-size: 0.82rem;
      line-height: 1.2;
    }

    .category-item.selected {
      border-color: var(--border-selected);
      box-shadow: none;
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .category-name {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-strong);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
      box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.08);
    }

    .category-description {
      display: none;
      margin: 0;
      color: var(--text-muted);
      font-size: 0.86rem;
      line-height: 1.48;
    }

    .annotation-list {
      display: grid;
      gap: 8px;
      max-height: calc(100vh - 208px);
      overflow: auto;
      padding-right: 4px;
    }

    .annotation-detail-card {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 10px;
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .annotation-detail-title {
      margin: 0;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-strong);
    }

    .annotation-detail-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .annotation-detail-actions .toolbar-btn {
      padding: 6px 8px;
    }

    .selection-toolbar {
      position: fixed;
      z-index: 100;
      display: none;
      width: min(420px, calc(100vw - 24px));
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      box-shadow: var(--shadow-lg);
      padding: 7px 9px 9px;
    }

    .selection-toolbar.visible {
      display: grid;
      gap: 8px;
    }

    .selection-toolbar.flash-mode {
      width: auto;
      min-width: 220px;
      max-width: min(360px, calc(100vw - 24px));
      gap: 6px;
      padding: 9px 11px;
      pointer-events: none;
    }

    .selection-flash-title {
      font-size: 0.76rem;
      font-weight: 500;
      color: var(--text-faint);
    }

    .selection-flash-body {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-subtle);
      font-size: 0.88rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .selection-toolbar-categories {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .toolbar-category-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 6px 8px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      font-size: 0.77rem;
      font-weight: 500;
      border-radius: 8px;
      border-color: var(--line);
    }

    .toolbar-category-chip.selected {
      border-color: var(--border-selected);
      background: var(--surface-accent);
    }

    .toolbar-btn {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-elevated);
      color: var(--text-subtle);
      padding: 6px 10px;
      font-size: 0.77rem;
      font-weight: 500;
    }

    .toolbar-btn.primary {
      background: rgba(28, 142, 120, 0.14);
      border-color: rgba(28, 142, 120, 0.14);
      color: #165b51;
    }

    .toolbar-meta {
      color: var(--text-faint);
      font-size: 0.78rem;
    }

    details.inline-details {
      border-top: 1px solid var(--border-soft);
      padding-top: 12px;
    }

    details.inline-details summary {
      cursor: pointer;
      color: var(--text-subtle);
      font-size: 0.84rem;
      font-weight: 800;
      list-style: none;
    }

    details.inline-details summary::-webkit-details-marker {
      display: none;
    }

    .model-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .annotation-card {
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      padding: 9px 10px;
      display: grid;
      gap: 5px;
      text-align: left;
      transition: border-color var(--transition), background var(--transition);
    }

    .annotation-card:hover,
    .annotation-card.active {
      border-color: var(--border-emphasis);
      background: var(--surface-subtle-strong);
    }

    .annotation-quote {
      margin: 0;
      color: var(--text-subtle);
      font-size: 0.84rem;
      line-height: 1.48;
      text-align: left;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 4;
      overflow: hidden;
    }

    .annotation-comment {
      margin: 0;
      color: var(--text-muted);
      font-size: 0.8rem;
      line-height: 1.42;
      text-align: left;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .annotation-meta {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.4;
    }

    .inline-note-field {
      display: grid;
      gap: 6px;
    }

    .inline-note-field label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .inline-note-field textarea {
      min-height: 82px;
      resize: vertical;
    }

    .empty-state {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      padding: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.88rem;
      line-height: 1.52;
    }

    .empty-state strong {
      color: var(--text-strong);
    }

    dialog {
      border: none;
      padding: 0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(20, 25, 23, 0.12);
      width: min(560px, calc(100vw - 32px));
      background: transparent;
    }

    dialog::backdrop {
      background: var(--overlay-backdrop);
    }

    .dialog-card {
      background: var(--panel-strong);
      border-radius: 10px;
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .app-toast {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 120;
      display: none;
      max-width: min(360px, calc(100vw - 24px));
      border: 1px solid var(--border-soft);
      border-radius: 8px;
      background: var(--surface-elevated);
      box-shadow: var(--shadow-lg);
      color: var(--text-subtle);
      padding: 9px 11px;
      font-size: 0.82rem;
      line-height: 1.42;
    }

    .app-toast.visible {
      display: block;
    }

    .app-toast.error {
      border-color: rgba(209, 73, 91, 0.18);
      color: #7e3440;
    }

    .inspector-tools .btn {
      padding: 6px 8px;
      border-color: var(--line);
      background: var(--surface-muted);
      color: var(--text-muted);
      box-shadow: none;
      text-decoration: none;
    }

    .inspector-tools .btn:hover,
    .inspector-tools .btn:focus-visible {
      transform: none;
      border-color: var(--border-emphasis);
      background: var(--surface-subtle);
      box-shadow: none;
      color: var(--text-subtle);
    }

    .dialog-grid {
      display: grid;
      gap: 10px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    :root[data-theme="dark"] .btn.primary {
      background: linear-gradient(180deg, #74b3a6 0%, #5e9f91 100%);
      border-color: #74b3a6;
      color: #08110e;
    }

    :root[data-theme="dark"] .btn.primary:hover,
    :root[data-theme="dark"] .btn.primary:focus-visible {
      background: #81c0b3;
      border-color: #81c0b3;
    }

    :root[data-theme="dark"] .btn.warn {
      background: #43252c;
      border-color: #6d3a44;
      color: #f1b1bb;
    }

    :root[data-theme="dark"] .toolbar-btn.primary {
      background: rgba(121, 184, 170, 0.18);
      border-color: rgba(121, 184, 170, 0.22);
      color: #c7ebe2;
    }

    :root[data-theme="dark"] .pill.green {
      background: #183126;
      border-color: #2c5943;
      color: #9dd8bb;
    }

    :root[data-theme="dark"] .pill.amber {
      background: #362815;
      border-color: #6c5330;
      color: #efca8d;
    }

    :root[data-theme="dark"] .pill.red {
      background: #3a2026;
      border-color: #74414a;
      color: #efb0ba;
    }

    :root[data-theme="dark"] .pill.blue {
      background: #172837;
      border-color: #35536f;
      color: #b8d7f8;
    }

    :root[data-theme="dark"] .pill.violet {
      background: #2a2138;
      border-color: #564273;
      color: #d8c7f4;
    }

    :root[data-theme="dark"] .pill.slate {
      background: #1f2925;
      border-color: #3a4742;
      color: #c2d0cb;
    }

    :root[data-theme="dark"] .swatch {
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    :root[data-theme="dark"] .app-toast.error {
      border-color: rgba(225, 111, 126, 0.24);
      color: #f2b2bc;
    }

    @media (max-width: 1440px) {
      .workspace {
        grid-template-columns: minmax(280px, 340px) minmax(0, 1fr);
      }

      .workspace > .right-rail {
        grid-column: 1 / -1;
        position: static;
      }

      .right-rail {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .filter-grid {
        grid-template-columns: minmax(240px, 2fr) repeat(2, minmax(150px, 1fr)) minmax(170px, 1fr);
      }

      .filter-actions {
        grid-column: 1 / -1;
        justify-content: flex-start;
      }
    }

    @media (max-width: 1180px) {
      .stage-body,
      .right-rail {
        grid-template-columns: 1fr;
      }

      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .explorer-view {
        grid-template-columns: 1fr;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .rail {
        position: static;
      }

      .left-rail > .panel {
        min-height: 0;
      }

      .left-rail .control-grid {
        grid-template-rows: none;
      }

      .case-list,
      .annotation-list {
        max-height: none;
      }
    }

    @media (max-width: 720px) {
      .app {
        width: min(100%, 100vw);
        margin: 10px auto 16px;
      }

      .appbar {
        flex-wrap: wrap;
        align-items: flex-start;
        gap: 10px;
      }

      .appbar-left {
        flex-wrap: wrap;
      }

      .panel,
      .question-panel,
      .reasoning-panel {
        padding: 14px;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .toolbar {
        justify-content: flex-start;
        margin-left: 0;
        width: 100%;
      }

      .appbar-actions {
        min-width: 100%;
        flex-wrap: wrap;
      }

      .appbar-right-group {
        justify-content: flex-start;
        width: 100%;
        overflow: visible;
        flex-wrap: wrap;
      }

      .view-switch {
        order: 3;
      }

      .switch-cluster.model-cluster,
      .switch-cluster.benchmark-cluster {
        min-width: 0;
        width: auto;
      }

      .switch-cluster.benchmark-cluster {
        padding-left: 0;
        border-left: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="appbar">
      <div class="appbar-left">
        <div class="appbar-brand">
          <img class="appbar-logo" src="../assets/bsbench.png" alt="BullshitBench logo">
          <p class="appbar-brand-name">BullshitBench</p>
        </div>
        <div class="view-switch" id="viewSwitch" aria-label="Workspace view"></div>
      </div>
      <div class="appbar-actions">
        <div class="appbar-right-group">
          <div class="switch-cluster model-cluster">
            <div class="source-switch" id="sourceSwitch" aria-label="Model switch"></div>
          </div>
          <div class="switch-cluster benchmark-cluster">
            <div class="dataset-switch" id="datasetSwitch" aria-label="Dataset switch"></div>
          </div>
        </div>
        <div class="toolbar">
          <div id="themeSwitch" class="theme-switch" aria-label="Colour theme"></div>
          <button id="exportBtn" type="button">Export</button>
          <button id="importBtn" type="button">Import</button>
          <button id="toggleSidebarBtn" type="button">Show tools</button>
        </div>
        <div class="status-line" id="statusLine">Connecting to local annotation store...</div>
      </div>
    </header>

    <section class="panel filter-panel view-pane" id="filterPanel">
      <div class="filter-grid">
        <label class="field">
          <span>Search</span>
          <input id="searchInput" type="text" placeholder="Question id, wording, note text, label...">
        </label>
        <label class="field">
          <span>Grade</span>
          <select id="gradeFilterSelect">
            <option value="all">All grades</option>
            <option value="accepted">Accepted nonsense</option>
            <option value="partial">Partial challenge</option>
            <option value="clear">Clear pushback</option>
            <option value="missing">Missing</option>
          </select>
        </label>
        <label class="field">
          <span>Labels</span>
          <select id="annotationFilterSelect">
            <option value="all">All</option>
            <option value="labelled">Labelled</option>
            <option value="unlabelled">Unlabelled</option>
          </select>
        </label>
        <label id="domainFilterField" class="field">
          <span>Domains</span>
          <details id="domainFilterDetails" class="multi-select">
            <summary>
              <span id="domainFilterSummary" class="multi-select-summary">All domains</span>
            </summary>
            <div class="multi-select-panel">
              <div class="multi-select-actions">
                <button id="selectAllDomainsBtn" type="button">All domains</button>
                <button id="closeDomainFilterBtn" type="button">Done</button>
              </div>
              <div id="domainFilterList" class="multi-select-list"></div>
            </div>
          </details>
        </label>
        <div class="filter-actions">
          <button id="openNextUnlabeledBtn" class="btn" type="button">Open next unlabeled</button>
          <button id="resetFiltersBtn" class="btn ghost" type="button">Reset filters</button>
        </div>
      </div>
      <p class="filter-meta" id="filterMeta"></p>
    </section>

    <section class="explorer-view view-pane" id="explorerView">
      <section class="panel explorer-panel">
        <div class="section-head">
          <div>
            <h2>Questions</h2>
            <p class="panel-subtitle" id="explorerMeta"></p>
          </div>
        </div>
        <div class="explorer-summary" id="explorerSummary"></div>
        <div class="explorer-table-wrap">
          <table class="explorer-table">
            <thead>
              <tr id="questionExplorerHead"></tr>
            </thead>
            <tbody id="questionExplorerList"></tbody>
          </table>
        </div>
      </section>
    </section>

    <main class="workspace view-pane" id="workspace">
      <aside class="rail left-rail">
        <section class="panel">
          <div class="section-head">
            <div>
              <h2>Cases</h2>
            </div>
            <button id="openExplorerBtn" class="btn ghost small" type="button">Back to browse</button>
          </div>
          <div class="control-grid">
            <label class="field">
              <span>Author</span>
              <input id="authorInput" type="text" placeholder="Your name for saved labels">
            </label>
            <div class="rail-filter-bar" id="railFilterBar">
              <label class="field compact">
                <span>Search</span>
                <input id="railSearchInput" type="text" placeholder="Filter cases">
              </label>
              <div class="rail-filter-row">
                <label class="field compact">
                  <span>Grade</span>
                  <select id="railGradeFilterSelect">
                    <option value="all">All grades</option>
                    <option value="accepted">Accepted nonsense</option>
                    <option value="partial">Partial challenge</option>
                    <option value="clear">Clear pushback</option>
                    <option value="missing">Missing</option>
                  </select>
                </label>
                <label class="field compact">
                  <span>Labels</span>
                  <select id="railAnnotationFilterSelect">
                    <option value="all">All labels</option>
                    <option value="labelled">Labelled</option>
                    <option value="unlabelled">Unlabelled</option>
                  </select>
