  <input id="importInput" class="visually-hidden" type="file" accept="application/json">
  <div id="selectionToolbar" class="selection-toolbar"></div>
  <div id="appToast" class="app-toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <script>
    const SCORE_META = {
      2: { label: "Clear pushback", tone: "green" },
      1: { label: "Partial challenge", tone: "amber" },
      0: { label: "Accepted nonsense", tone: "red" },
      missing: { label: "Missing", tone: "slate" },
    };

    const CONFIDENCE_META = {
      clear: { label: "Clear" },
      borderline: { label: "Borderline" },
    };

    const THEME_OPTIONS = [
      { key: "system", label: "System" },
      { key: "light", label: "Light" },
      { key: "dark", label: "Dark" },
    ];

    const systemThemeMedia = window.matchMedia?.("(prefers-color-scheme: dark)") || null;

    function initialThemePreference() {
      const stored = window.localStorage.getItem("reasoningLab.theme");
      return ["light", "dark"].includes(stored) ? stored : "system";
    }

    function resolvedThemePreference(preference = initialThemePreference()) {
      if (preference === "light" || preference === "dark") return preference;
      return systemThemeMedia?.matches ? "dark" : "light";
    }

    function applyThemePreference(preference = initialThemePreference()) {
      const nextPreference = ["light", "dark"].includes(preference) ? preference : "system";
      const resolved = resolvedThemePreference(nextPreference);
      document.documentElement.dataset.themePreference = nextPreference;
      document.documentElement.dataset.theme = resolved;
      document.documentElement.style.colorScheme = resolved;
      return resolved;
    }

    function initialAnnotationFilter() {
      const direct = window.localStorage.getItem("reasoningLab.annotationFilter");
      if (direct) return direct;
      const legacyStatus = window.localStorage.getItem("reasoningLab.caseStatusFilter") || "";
      const legacyAnnotated = window.localStorage.getItem("reasoningLab.onlyAnnotated") === "1";
      if (legacyStatus === "unlabeled") return "unlabelled";
      if (legacyAnnotated || ["in_progress", "reviewed", "any_labels"].includes(legacyStatus)) return "labelled";
      return "all";
    }

    function normalizeCaseSortValue(value) {
      const key = String(value || "").trim().toLowerCase();
      return {
        recommended: "recommended",
        recent: "updated_desc",
        most_labels: "highlights_desc",
        least_labels: "highlights_asc",
        grade: "grade_asc",
        overall_label: "overall_label_asc",
        trace_tokens: "recommended",
        question_id: "question_id_asc",
        question_asc: "question_asc",
        question_desc: "question_desc",
        question_id_asc: "question_id_asc",
        question_id_desc: "question_id_desc",
        domain_asc: "domain_asc",
        domain_desc: "domain_desc",
        grade_asc: "grade_asc",
        grade_desc: "grade_desc",
        status_asc: "status_asc",
        status_desc: "status_desc",
        overall_label_asc: "overall_label_asc",
        overall_label_desc: "overall_label_desc",
        highlights_asc: "highlights_asc",
        highlights_desc: "highlights_desc",
        updated_asc: "updated_asc",
        updated_desc: "updated_desc",
      }[key] || "recommended";
    }

    const STATE = {
      bootstrap: null,
      themePreference: initialThemePreference(),
      sourceKey: window.localStorage.getItem("reasoningLab.sourceKey") || "gpt54_high",
      datasetKey: window.localStorage.getItem("reasoningLab.datasetKey") || "v2",
      viewMode: window.localStorage.getItem("reasoningLab.viewMode") || "explorer",
      search: "",
      gradeFilter: window.localStorage.getItem("reasoningLab.gradeFilter") || "all",
      annotationFilter: initialAnnotationFilter(),
      caseSort: normalizeCaseSortValue(window.localStorage.getItem("reasoningLab.caseSort") || "recommended"),
      selectedDomainsByDataset: (() => {
        try {
          const raw = window.localStorage.getItem("reasoningLab.selectedDomainsByDataset");
          const parsed = raw ? JSON.parse(raw) : {};
          return parsed && typeof parsed === "object" ? parsed : {};
        } catch (_error) {
          return {};
        }
      })(),
      selectedCaseId: window.localStorage.getItem("reasoningLab.selectedCaseId") || "",
      selection: null,
      activeAnnotationId: "",
      selectedCategoryId: "",
      answerCollapsed: window.localStorage.getItem("reasoningLab.answerCollapsed") === "1",
      sidebarOpen: window.localStorage.getItem("reasoningLab.sidebarOpen") === "1",
      author: window.localStorage.getItem("reasoningLab.author") || "",
      draftComment: "",
      draftConfidence: "clear",
      draftDocumentNote: null,
      documentNoteStatus: null,
      composerTargetSourceKey: window.localStorage.getItem("reasoningLab.composerTargetSourceKey") || "",
      lastSelectionAt: 0,
      selectionAnchor: null,
      flashNotice: null,
      justSavedAnnotationId: "",
      toast: null,
      compareOpen: false,
    };

    applyThemePreference(STATE.themePreference);

    const syncThemeOnSystemChange = () => {
      if (STATE.themePreference !== "system") return;
      applyThemePreference("system");
      if (el.themeSwitch) renderThemeSwitch();
    };

    if (systemThemeMedia?.addEventListener) {
      systemThemeMedia.addEventListener("change", syncThemeOnSystemChange);
    } else if (systemThemeMedia?.addListener) {
      systemThemeMedia.addListener(syncThemeOnSystemChange);
    }

    const el = {};
    let flashNoticeTimer = 0;
    let toastTimer = 0;
    let commentSaveTimer = 0;
    let documentNoteSaveTimer = 0;
    let selectionCaptureFrame = 0;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    function categoryTooltip(category) {
      if (!category) return "";
      const name = String(category.name || category.id || "").trim();
      const description = String(category.description || "").trim();
      const guidance = String(category.guidance || "").trim();
      return [name, description || guidance].filter(Boolean).join(": ");
    }

    function normalizedConfidence(value, allowBlank = false) {
      const key = String(value || "").trim().toLowerCase();
      if (!key) return allowBlank ? "" : "clear";
      return CONFIDENCE_META[key] ? key : (allowBlank ? "" : "clear");
    }

    function confidenceOptions(allowBlank = false) {
      const keys = Object.keys(CONFIDENCE_META);
      return allowBlank ? ["", ...keys] : keys;
    }

    function confidenceLabel(value) {
      if (!value) return "";
      return CONFIDENCE_META[value]?.label || value;
    }

    function renderInlineMarkdown(text) {
      let html = escapeHtml(text || "");
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
      html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
      html = html.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      html = html.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?:;]|$)/g, '$1<em>$2</em>');
      return html;
    }

    function renderMarkdown(text) {
      const source = String(text || "").replace(/\r\n?/g, "\n");
      if (!source.trim()) return `<p>${escapeHtml("No response saved.")}</p>`;
      const lines = source.split("\n");
      const html = [];
      let paragraph = [];
      let listType = "";
      let codeFence = false;
      let codeLines = [];

      function flushParagraph() {
        if (!paragraph.length) return;
        html.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
        paragraph = [];
      }

      function closeList() {
        if (!listType) return;
        html.push(`</${listType}>`);
        listType = "";
      }

      function flushCodeFence() {
        if (!codeFence) return;
        html.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        codeFence = false;
        codeLines = [];
      }

      for (const line of lines) {
        if (/^```/.test(line.trim())) {
          flushParagraph();
          closeList();
          if (codeFence) {
            flushCodeFence();
          } else {
            codeFence = true;
            codeLines = [];
          }
          continue;
        }

        if (codeFence) {
          codeLines.push(line);
          continue;
        }

        const trimmed = line.trim();
        if (!trimmed) {
          flushParagraph();
          closeList();
          continue;
        }

        const heading = trimmed.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushParagraph();
          closeList();
          const level = Math.min(heading[1].length + 1, 4);
          html.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);
          continue;
        }

        const unordered = trimmed.match(/^[-*]\s+(.+)$/);
        if (unordered) {
          flushParagraph();
          if (listType !== "ul") {
            closeList();
            listType = "ul";
            html.push("<ul>");
          }
          html.push(`<li>${renderInlineMarkdown(unordered[1])}</li>`);
          continue;
        }

        const ordered = trimmed.match(/^\d+\.\s+(.+)$/);
        if (ordered) {
          flushParagraph();
          if (listType !== "ol") {
            closeList();
            listType = "ol";
            html.push("<ol>");
          }
          html.push(`<li>${renderInlineMarkdown(ordered[1])}</li>`);
          continue;
        }

        const quote = trimmed.match(/^>\s?(.+)$/);
        if (quote) {
          flushParagraph();
          closeList();
          html.push(`<blockquote><p>${renderInlineMarkdown(quote[1])}</p></blockquote>`);
          continue;
        }

        paragraph.push(trimmed);
      }

      flushParagraph();
      closeList();
      flushCodeFence();
      return html.join("");
    }

    function formatNumber(value) {
      if (typeof value !== "number" || Number.isNaN(value)) return "-";
      return new Intl.NumberFormat("en-US").format(Math.round(value));
    }

    function formatScore(value) {
      return typeof value === "number" ? value.toFixed(1) : "-";
    }

    function formatDate(value) {
      if (!value) return "Unknown";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
      });
    }

    function formatRelativeTime(value) {
      if (!value) return "";
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      const diffMs = Date.now() - parsed.getTime();
      const diffMinutes = Math.round(diffMs / 60000);
      if (Math.abs(diffMinutes) < 1) return "just now";
      if (Math.abs(diffMinutes) < 60) return `${diffMinutes}m ago`;
      const diffHours = Math.round(diffMinutes / 60);
      if (Math.abs(diffHours) < 24) return `${diffHours}h ago`;
      const diffDays = Math.round(diffHours / 24);
      return `${diffDays}d ago`;
    }

    function clampText(text, limit) {
      const source = String(text || "").trim();
      if (!source) return "";
      if (source.length <= limit) return source;
      return source.slice(0, limit).trimEnd() + "...";
    }

    function currentStore() {
      return STATE.bootstrap?.store || null;
    }

    function readDocumentNoteDrafts() {
      try {
        const raw = window.localStorage.getItem("reasoningLab.documentNoteDrafts");
        const parsed = raw ? JSON.parse(raw) : {};
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (_error) {
        return {};
      }
    }

    function writeDocumentNoteDrafts(drafts) {
      window.localStorage.setItem("reasoningLab.documentNoteDrafts", JSON.stringify(drafts || {}));
    }

    function persistDocumentNoteDraft(documentId, draft) {
      if (!documentId) return;
      const drafts = readDocumentNoteDrafts();
      const summary = String(draft?.summary || "");
      const labelId = String(draft?.labelId || "");
      const confidence = normalizedConfidence(draft?.confidence, true);
      if (!summary.trim() && !labelId) {
        delete drafts[documentId];
      } else {
        drafts[documentId] = {
          documentId,
          summary,
          labelId,
          confidence,
        };
      }
      writeDocumentNoteDrafts(drafts);
    }

    function clearDocumentNoteDraft(documentId) {
      if (!documentId) return;
      const drafts = readDocumentNoteDrafts();
      if (!(documentId in drafts)) return;
      delete drafts[documentId];
      writeDocumentNoteDrafts(drafts);
    }

    function currentAtlas() {
      return STATE.bootstrap?.atlas || null;
    }

    function currentSource() {
      return currentAtlas()?.sources?.[STATE.sourceKey] || null;
    }

    function modelTone(sourceKey) {
      const key = String(sourceKey || "").toLowerCase();
      if (key.includes("gpt")) return "gpt";
      if (key.includes("sonnet")) return "sonnet";
      return "";
    }

    function modelPanelClass(source) {
      const tone = modelTone(source?.key);
      return tone ? `model-panel ${tone}` : "";
    }

    function renderModelChip(source) {
      const tone = modelTone(source?.key);
      const className = tone ? `mini-stat model-chip ${tone}` : "mini-stat";
      return `<span class="${className}">${escapeHtml(source?.label || "Model")}</span>`;
    }

    function compactSourceLabel(source) {
      const label = String(source?.label || "").trim();
      if (!label) return "Model";
      if (/^gpt-5\.4/i.test(label)) return "GPT-5.4";
      return label;
    }

    function renderCompareToggle(compareSource) {
      const tone = modelTone(compareSource?.key);
      const className = `compare-toggle${tone ? ` ${tone}` : ""}${STATE.compareOpen ? " active" : ""}`;
      const label = STATE.compareOpen
        ? `Hide ${compareSource?.label || "comparison"} comparison`
        : `Compare with ${compareSource?.label || "the other model"}`;
      return `
        <button
          id="toggleCompareBtn"
          class="${className}"
          type="button"
          aria-label="${escapeAttribute(label)}"
          aria-pressed="${STATE.compareOpen ? "true" : "false"}"
          title="${escapeAttribute(label)}"
        >
          <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <rect class="compare-left" x="2.5" y="4.25" width="6.4" height="10.75" rx="1.55"></rect>
            <rect class="compare-right" x="10.15" y="4.25" width="6.7" height="10.75" rx="1.55"></rect>
            <circle class="compare-badge" cx="15.5" cy="15.35" r="3.05"></circle>
            <path class="compare-symbol" d="M14.05 15.35h2.9"></path>
            ${STATE.compareOpen ? "" : `<path class="compare-symbol" d="M15.5 13.9v2.9"></path>`}
          </svg>
        </button>
      `;
    }

    function currentDataset() {
      return currentSource()?.datasets?.[STATE.datasetKey] || null;
    }

    function setAnswerCollapsed(collapsed) {
      STATE.answerCollapsed = Boolean(collapsed);
      window.localStorage.setItem("reasoningLab.answerCollapsed", STATE.answerCollapsed ? "1" : "0");
    }

    function setSidebarOpen(open) {
      STATE.sidebarOpen = Boolean(open);
      window.localStorage.setItem("reasoningLab.sidebarOpen", STATE.sidebarOpen ? "1" : "0");
    }

    function setThemePreference(preference) {
      STATE.themePreference = ["light", "dark"].includes(preference) ? preference : "system";
      window.localStorage.setItem("reasoningLab.theme", STATE.themePreference);
      applyThemePreference(STATE.themePreference);
    }

    function setSourceKey(key) {
      STATE.sourceKey = key;
      window.localStorage.setItem("reasoningLab.sourceKey", STATE.sourceKey);
    }

    function setDatasetKey(key) {
      STATE.datasetKey = key;
      window.localStorage.setItem("reasoningLab.datasetKey", STATE.datasetKey);
    }

    function setViewMode(mode) {
      STATE.viewMode = mode === "label" ? "label" : "explorer";
      window.localStorage.setItem("reasoningLab.viewMode", STATE.viewMode);
    }

    function setGradeFilter(value) {
      STATE.gradeFilter = value || "all";
      window.localStorage.setItem("reasoningLab.gradeFilter", STATE.gradeFilter);
    }

    function setAnnotationFilter(value) {
      STATE.annotationFilter = value || "all";
      window.localStorage.setItem("reasoningLab.annotationFilter", STATE.annotationFilter);
    }

    function setCaseSort(value) {
      STATE.caseSort = normalizeCaseSortValue(value || "recommended");
      window.localStorage.setItem("reasoningLab.caseSort", STATE.caseSort);
    }

    function setSelectedCaseId(questionId) {
      STATE.selectedCaseId = questionId || "";
      window.localStorage.setItem("reasoningLab.selectedCaseId", STATE.selectedCaseId);
    }

    function setComposerTargetSourceKey(sourceKey) {
      STATE.composerTargetSourceKey = sourceKey || "";
      window.localStorage.setItem(
        "reasoningLab.composerTargetSourceKey",
        STATE.composerTargetSourceKey,
      );
    }

    function syncComposerTarget(sourceKey, options = {}) {
      if (!sourceKey || sourceKey === STATE.composerTargetSourceKey) return;
      setComposerTargetSourceKey(sourceKey);
      if (options.renderComposer) {
        renderComposerPanel(currentCaseForUi());
      }
    }

    function availableDomains() {
      const dataset = currentDataset();
      if (!dataset || dataset.key !== "v2") return [];
      return [...new Set(
        (dataset.cases || [])
          .map((caseRow) => caseDomainLabel(caseRow))
          .filter(Boolean)
      )].sort((left, right) => left.localeCompare(right));
    }

    function caseDomainLabel(caseRow) {
      const prefix = String(caseRow?.question_id || "").split("_")[0];
      const label = {
        sw: "Coding",
        med: "Medical",
        fin: "Finance",
        leg: "Legal",
        phys: "Physics",
      }[prefix];
      return label || "";
    }

    function selectedDomainsForCurrentDataset() {
      const available = availableDomains();
      const stored = Array.isArray(STATE.selectedDomainsByDataset?.[STATE.datasetKey])
        ? STATE.selectedDomainsByDataset[STATE.datasetKey]
        : null;
      if (stored === null) return null;
      const valid = stored
        .map((item) => String(item || "").trim())
        .filter((item) => available.includes(item));
      if (!valid.length && stored.length) return null;
      if (valid.length === available.length) return null;
      return valid;
    }

    function setSelectedDomainsForCurrentDataset(domains) {
      const available = availableDomains();
      if (domains === null) {
        delete STATE.selectedDomainsByDataset[STATE.datasetKey];
        window.localStorage.setItem(
          "reasoningLab.selectedDomainsByDataset",
          JSON.stringify(STATE.selectedDomainsByDataset),
        );
        return;
      }
      const valid = [...new Set((domains || [])
        .map((item) => String(item || "").trim())
        .filter((item) => available.includes(item)))].sort((left, right) => left.localeCompare(right));
      if (valid.length === available.length) {
        delete STATE.selectedDomainsByDataset[STATE.datasetKey];
      } else {
        STATE.selectedDomainsByDataset[STATE.datasetKey] = valid;
      }
      window.localStorage.setItem(
        "reasoningLab.selectedDomainsByDataset",
        JSON.stringify(STATE.selectedDomainsByDataset),
      );
    }

    function resetSharedFilters() {
      STATE.search = "";
      setGradeFilter("all");
      setAnnotationFilter("all");
      setCaseSort("recommended");
      setSelectedDomainsForCurrentDataset(null);
    }

    function domainSummaryText() {
      const available = availableDomains();
      const selected = selectedDomainsForCurrentDataset();
      if (!available.length) return "All domains";
      if (selected === null) return "All domains";
      if (!selected.length) return "No domains";
      if (selected.length === 1) return selected[0];
      if (selected.length === 2) return selected.join(", ");
      return `${selected.length} domains`;
    }

    function categories() {
      const items = currentStore()?.categories || [];
      return [...items].sort((left, right) => {
        const leftOrder = Number(left?.order ?? 999);
        const rightOrder = Number(right?.order ?? 999);
        if (leftOrder !== rightOrder) return leftOrder - rightOrder;
        return String(left?.name || "").localeCompare(String(right?.name || ""));
      });
    }

    function categoryMap() {
      const map = new Map();
      categories().forEach((category) => map.set(category.id, category));
      return map;
    }

    function primaryVariantKey(source = currentSource()) {
      return String(source?.primary_variant_key || "");
    }

    function baselineVariantKey(source = currentSource()) {
      return String(source?.baseline_variant_key || "");
    }

    function primaryVariant(caseRow, source = currentSource()) {
      const key = primaryVariantKey(source);
      return key ? (caseRow?.variants?.[key] || null) : null;
    }

    function sourceForKey(sourceKey) {
      return currentAtlas()?.sources?.[sourceKey] || null;
    }

    function datasetForKeys(sourceKey, datasetKey) {
      return sourceForKey(sourceKey)?.datasets?.[datasetKey] || null;
    }

    function caseForKeys(sourceKey, datasetKey, questionId) {
      if (!questionId) return null;
      return (datasetForKeys(sourceKey, datasetKey)?.cases || []).find(
        (caseRow) => caseRow.question_id === questionId,
      ) || null;
    }

    function alternateSourceKey(questionId = STATE.selectedCaseId, datasetKey = STATE.datasetKey) {
      const atlas = currentAtlas();
      if (!atlas) return "";
      const orderedKeys = Array.isArray(atlas.source_order) && atlas.source_order.length
        ? atlas.source_order
        : Object.keys(atlas.sources || {});
      return orderedKeys.find((key) => key !== STATE.sourceKey && caseForKeys(key, datasetKey, questionId)) || "";
    }

    function scoreMeta(score) {
      if (typeof score === "number") {
        if (score >= 1.5) return SCORE_META[2];
        if (score >= 0.5) return SCORE_META[1];
        if (score >= 0) return SCORE_META[0];
      }
      return SCORE_META.missing;
    }

    function verdictKey(score) {
      if (typeof score === "number") {
        if (score >= 1.5) return "clear";
        if (score >= 0.5) return "partial";
        if (score >= 0) return "accepted";
      }
      return "missing";
    }

    function gradeRank(score) {
      return {
        accepted: 0,
        partial: 1,
        clear: 2,
        missing: 3,
      }[verdictKey(score)] ?? 3;
    }

    function filteredCases() {
      const dataset = currentDataset();
      if (!dataset) return [];
      const query = STATE.search.trim().toLowerCase();
      const selectedDomainList = selectedDomainsForCurrentDataset();
      const selectedDomains = new Set(selectedDomainList || []);
      return dataset.cases.filter((caseRow) => {
        const primary = primaryVariant(caseRow);
        const annotationCount = caseAnnotationCount(caseRow);
        const documentNote = caseDocumentNote(caseRow);
        const progress = caseProgressMeta(caseRow);
        if (STATE.gradeFilter !== "all") {
          const caseVerdict = verdictKey(primary?.consensus_score);
          if (caseVerdict !== STATE.gradeFilter) return false;
        }
        if (STATE.annotationFilter !== "all") {
          const isLabelled = caseIsLabelledForBrowse(caseRow);
          if (STATE.annotationFilter === "labelled" && !isLabelled) return false;
          if (STATE.annotationFilter === "unlabelled" && isLabelled) return false;
        }
        if (selectedDomainList !== null && !selectedDomains.has(caseDomainLabel(caseRow))) return false;
        if (!query) return true;
        const haystack = [
          caseRow.question_id,
          caseDomainLabel(caseRow),
          caseRow.domain,
          caseRow.technique,
          caseRow.question,
          caseRow.nonsensical_element,
          progress.label,
          primary?.response_text,
          primary?.reasoning_summary,
          documentNote?.summary,
          documentNote?.label_id,
          documentNote?.label_snapshot?.name,
          documentNote?.confidence,
          documentNote?.author,
          ...(annotationsForCase(caseRow).map((item) => `${item.quote} ${item.comment} ${item.author} ${item.label_id} ${item.confidence || ""}`)),
        ].join(" ").toLowerCase();
        return haystack.includes(query);
      });
    }

    function sortCases(rows) {
      const items = [...rows];
      const sortKey = normalizeCaseSortValue(STATE.caseSort);
      items.sort((left, right) => {
        const leftProgress = caseProgressMeta(left);
        const rightProgress = caseProgressMeta(right);
        const leftCount = caseAnnotationCount(left);
        const rightCount = caseAnnotationCount(right);
        const leftRecent = Date.parse(caseLastTouched(left) || "") || 0;
        const rightRecent = Date.parse(caseLastTouched(right) || "") || 0;
        const leftPrimary = primaryVariant(left);
        const rightPrimary = primaryVariant(right);
        const leftGrade = gradeRank(leftPrimary?.consensus_score);
        const rightGrade = gradeRank(rightPrimary?.consensus_score);
        const leftTrace = Number(leftPrimary?.response_reasoning_tokens ?? -Infinity);
        const rightTrace = Number(rightPrimary?.response_reasoning_tokens ?? -Infinity);
        const leftBrowseState = Number(caseIsLabelledForBrowse(left));
        const rightBrowseState = Number(caseIsLabelledForBrowse(right));
        const leftQuestion = String(left.question || "");
        const rightQuestion = String(right.question || "");
        const leftQuestionId = String(left.question_id || "");
        const rightQuestionId = String(right.question_id || "");
        const leftDomain = caseDomainLabel(left) || "";
        const rightDomain = caseDomainLabel(right) || "";
        const leftOverallLabel = documentNoteLabelName(caseDocumentNote(left));
        const rightOverallLabel = documentNoteLabelName(caseDocumentNote(right));
        const leftMissingOverall = Number(!leftOverallLabel);
        const rightMissingOverall = Number(!rightOverallLabel);

        if (sortKey === "question_asc") {
          const diff = leftQuestion.localeCompare(rightQuestion);
          if (diff) return diff;
        } else if (sortKey === "question_desc") {
          const diff = rightQuestion.localeCompare(leftQuestion);
          if (diff) return diff;
        } else if (sortKey === "question_id_asc") {
          const diff = leftQuestionId.localeCompare(rightQuestionId);
          if (diff) return diff;
        } else if (sortKey === "question_id_desc") {
          const diff = rightQuestionId.localeCompare(leftQuestionId);
          if (diff) return diff;
        } else if (sortKey === "domain_asc") {
          const diff = leftDomain.localeCompare(rightDomain);
          if (diff) return diff;
        } else if (sortKey === "domain_desc") {
          const diff = rightDomain.localeCompare(leftDomain);
          if (diff) return diff;
        } else if (sortKey === "updated_desc") {
          const diff = rightRecent - leftRecent;
          if (diff) return diff;
        } else if (sortKey === "updated_asc") {
          const diff = leftRecent - rightRecent;
          if (diff) return diff;
        } else if (sortKey === "highlights_desc") {
          const diff = rightCount - leftCount;
          if (diff) return diff;
        } else if (sortKey === "highlights_asc") {
          const diff = leftCount - rightCount;
          if (diff) return diff;
        } else if (sortKey === "grade_asc") {
          const diff = leftGrade - rightGrade;
          if (diff) return diff;
        } else if (sortKey === "grade_desc") {
          const diff = rightGrade - leftGrade;
          if (diff) return diff;
        } else if (sortKey === "status_desc") {
          const diff = rightBrowseState - leftBrowseState;
          if (diff) return diff;
        } else if (sortKey === "status_asc") {
          const diff = leftBrowseState - rightBrowseState;
          if (diff) return diff;
        } else if (sortKey === "overall_label_asc") {
          const missingDiff = leftMissingOverall - rightMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = leftOverallLabel.localeCompare(rightOverallLabel);
          if (diff) return diff;
        } else if (sortKey === "overall_label_desc") {
          const missingDiff = leftMissingOverall - rightMissingOverall;
          if (missingDiff) return missingDiff;
          const diff = rightOverallLabel.localeCompare(leftOverallLabel);
          if (diff) return diff;
        } else {
          const progressDiff = leftProgress.rank - rightProgress.rank;
          if (progressDiff) return progressDiff;
          const gradeDiff = leftGrade - rightGrade;
          if (gradeDiff) return gradeDiff;
          const traceDiff = rightTrace - leftTrace;
          if (traceDiff) return traceDiff;
          const countDiff = rightCount - leftCount;
          if (countDiff) return countDiff;
        }

        return leftQuestionId.localeCompare(rightQuestionId);
      });
      return items;
    }

    function ensureSelection(rows) {
      if (!rows.length) {
        setSelectedCaseId("");
        return;
      }
      if (!rows.some((row) => row.question_id === STATE.selectedCaseId)) {
        setSelectedCaseId(rows[0].question_id);
      }
    }

    function selectedCase(rows) {
      return rows.find((row) => row.question_id === STATE.selectedCaseId) || null;
    }

    function annotations() {
      return currentStore()?.annotations || [];
    }

    function documentNotes() {
      return currentStore()?.document_notes || [];
    }

    function documentNoteForDocument(documentId) {
      return documentNotes().find((item) => item.document_id === documentId) || null;
    }

    function caseDocumentId(caseRow) {
      return reasonDocument(caseRow)?.document_id || "";
    }

    function caseDocumentNote(caseRow) {
      const documentId = caseDocumentId(caseRow);
      return documentId ? documentNoteForDocument(documentId) : null;
    }

    function documentNoteLabelName(note) {
      if (!note) return "";
      if (note?.label_snapshot?.name) return String(note.label_snapshot.name);
      if (note?.label_id) return String(categoryMap().get(note.label_id)?.name || note.label_id);
      return "";
    }

    function documentNoteLabelMeta(note) {
      if (!note) return null;
      const category = note?.label_id ? categoryMap().get(note.label_id) : null;
      const name = documentNoteLabelName(note);
      if (!name) return null;
      return {
        name,
        color: String(note?.label_snapshot?.color || category?.color || "#8aa19b"),
      };
    }

    function caseLastTouched(caseRow) {
      const timestamps = [
        ...annotationsForCase(caseRow).map((item) => item.updated_at_utc),
        caseDocumentNote(caseRow)?.updated_at_utc,
      ].filter(Boolean).map((value) => new Date(value).getTime()).filter((value) => Number.isFinite(value));
      if (!timestamps.length) return "";
      return new Date(Math.max(...timestamps)).toISOString();
    }

    function caseProgressMeta(caseRow) {
      const spanCount = caseAnnotationCount(caseRow);
      const note = caseDocumentNote(caseRow);
      const hasOverallLabel = Boolean(note?.label_id);
      const hasOverallNote = Boolean((note?.summary || "").trim());
      const hasAnyLabels = spanCount > 0 || hasOverallLabel || hasOverallNote;
      if (!hasAnyLabels) {
        return {
          key: "unlabeled",
          label: "Unlabelled",
          tone: "slate",
          rank: 0,
          hasAnyLabels: false,
          hasOverallLabel: false,
          hasOverallNote: false,
        };
      }
      if (spanCount > 0 && (hasOverallLabel || hasOverallNote)) {
        return {
          key: "reviewed",
          label: "Reviewed",
          tone: "green",
          rank: 2,
          hasAnyLabels: true,
          hasOverallLabel,
          hasOverallNote,
        };
      }
      return {
        key: "in_progress",
        label: "In progress",
        tone: "blue",
        rank: 1,
        hasAnyLabels: true,
        hasOverallLabel,
        hasOverallNote,
      };
    }

    function caseBrowseLabelMeta(caseRow) {
      if (caseIsLabelledForBrowse(caseRow)) {
        return { label: "Labelled", tone: "green" };
      }
      return { label: "Unlabelled", tone: "slate" };
    }

    function caseIsLabelledForBrowse(caseRow) {
      const note = caseDocumentNote(caseRow);
      return caseAnnotationCount(caseRow) > 0 || Boolean(note?.label_id);
    }

    function draftDocumentNoteFor(documentId) {
      if (!STATE.draftDocumentNote || STATE.draftDocumentNote.documentId !== documentId) {
        const drafts = readDocumentNoteDrafts();
        const stored = drafts[documentId];
        if (!stored || typeof stored !== "object") return null;
        return {
          documentId,
          summary: String(stored.summary || ""),
          labelId: String(stored.labelId || ""),
          confidence: normalizedConfidence(stored.confidence, true),
        };
      }
      return STATE.draftDocumentNote;
    }

    function setDocumentNoteStatus(documentId, message) {
      STATE.documentNoteStatus = documentId
        ? { documentId, message: String(message || "") }
        : null;
      const statusNode = document.getElementById("documentNoteSaveState");
      if (statusNode && STATE.documentNoteStatus?.documentId === statusNode.dataset.documentId) {
        statusNode.textContent = STATE.documentNoteStatus.message;
      }
    }

    function documentNoteStatusText(documentId, documentNote, documentNoteDraft = null) {
      if (STATE.documentNoteStatus?.documentId === documentId && STATE.documentNoteStatus.message) {
        return STATE.documentNoteStatus.message;
      }
      if (
        documentNoteDraft
        && (
          (documentNoteDraft.summary || "") !== (documentNote?.summary || "")
          || (documentNoteDraft.labelId || "") !== (documentNote?.label_id || "")
          || normalizedConfidence(documentNoteDraft.confidence, true) !== normalizedConfidence(documentNote?.confidence, true)
        )
      ) {
        return "Saved locally";
      }
      if (documentNote?.updated_at_utc) return "Saved";
      return "Autosave on";
    }

    function annotationsForDocument(documentId) {
      return annotations()
        .filter((item) => item.document_id === documentId)
        .sort((left, right) => {
          const startDiff = Number(left.start || 0) - Number(right.start || 0);
          if (startDiff) return startDiff;
          return Number(left.end || 0) - Number(right.end || 0);
        });
    }

    function overlappingAnnotationsForSelection(selection = STATE.selection) {
      if (!selection) return [];
      const documentId = selection.document_id || selection.documentId;
      if (!documentId) return [];
      const start = Number(selection.start);
      const end = Number(selection.end);
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return [];
      return annotationsForDocument(documentId).filter((item) => {
        const itemStart = Number(item.start || 0);
        const itemEnd = Number(item.end || 0);
        return start < itemEnd && end > itemStart;
      });
    }

    function annotationForSelection(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (overlaps.length !== 1) return null;
      return overlaps[0];
    }

    function annotationSegmentsAfterClear(annotation, selection = STATE.selection) {
      if (!annotation || !selection) return [];
      const annotationStart = Number(annotation.start);
      const annotationEnd = Number(annotation.end);
      const selectionStart = Number(selection.start);
      const selectionEnd = Number(selection.end);
      if (
        !Number.isFinite(annotationStart)
        || !Number.isFinite(annotationEnd)
        || !Number.isFinite(selectionStart)
        || !Number.isFinite(selectionEnd)
      ) {
        return [];
      }
      if (selectionEnd <= annotationStart || selectionStart >= annotationEnd) {
        return [{ start: annotationStart, end: annotationEnd }];
      }
      return [
        selectionStart > annotationStart ? { start: annotationStart, end: Math.min(selectionStart, annotationEnd) } : null,
        selectionEnd < annotationEnd ? { start: Math.max(selectionEnd, annotationStart), end: annotationEnd } : null,
      ].filter((segment) => segment && Number(segment.end) > Number(segment.start));
    }

    function clearActionLabel(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (!overlaps.length) return "Clear";
      const isPartial = overlaps.some((annotation) => annotationSegmentsAfterClear(annotation, selection).length > 0);
      if (isPartial) return "Clear selected part";
      return overlaps.length > 1 ? "Clear labels" : "Clear label";
    }

    function annotationsForCase(caseRow) {
      const documentId = reasonDocument(caseRow)?.document_id;
      if (!documentId) return [];
      return annotationsForDocument(documentId);
    }

    function caseAnnotationCount(caseRow) {
      return annotationsForCase(caseRow).length;
    }

    function selectedCategory() {
      const items = categories();
      if (!items.length) return null;
      const match = items.find((item) => item.id === STATE.selectedCategoryId);
      if (match) return match;
      STATE.selectedCategoryId = items[0].id;
      return items[0];
    }

    function reasonDocument(caseRow, source = currentSource()) {
      return primaryVariant(caseRow, source)?.reasoning_document || null;
    }

    function comparisonContext(caseRow) {
      if (!caseRow) return null;
      const dataset = currentDataset();
      const compareKey = alternateSourceKey(caseRow.question_id, dataset?.key || STATE.datasetKey);
      if (!compareKey) return null;
      const source = sourceForKey(compareKey);
      const compareCase = caseForKeys(compareKey, dataset?.key || STATE.datasetKey, caseRow.question_id);
      if (!source || !compareCase) return null;
      return {
        sourceKey: compareKey,
        source,
        caseRow: compareCase,
        document: reasonDocument(compareCase, source),
      };
    }

    function composerTargetContext(caseRow) {
      if (!caseRow) return { options: [], selected: null };
      const primarySource = currentSource();
      const primaryDocument = reasonDocument(caseRow, primarySource);
      const options = [];
      if (primarySource && primaryDocument) {
        options.push({
          key: primarySource.key,
          source: primarySource,
          caseRow,
          document: primaryDocument,
          side: "primary",
        });
      }
      if (STATE.compareOpen) {
        const compare = comparisonContext(caseRow);
        if (compare?.source && compare?.document) {
          options.push({
            key: compare.source.key,
            source: compare.source,
            caseRow: compare.caseRow,
            document: compare.document,
            side: "comparison",
          });
        }
      }
      if (!options.length) return { options: [], selected: null };
      const selected =
        options.find((option) => option.key === STATE.composerTargetSourceKey)
        || options[0];
      if (selected.key !== STATE.composerTargetSourceKey) {
        setComposerTargetSourceKey(selected.key);
      }
      return { options, selected };
    }

    function atlasDocument(documentId) {
      if (!documentId) return null;
      const atlas = currentAtlas();
      for (const source of Object.values(atlas?.sources || {})) {
        for (const dataset of Object.values(source?.datasets || {})) {
          for (const caseRow of dataset?.cases || []) {
            for (const variant of Object.values(caseRow?.variants || {})) {
              const document = variant?.reasoning_document;
              const legacyIds = Array.isArray(document?.legacy_document_ids)
                ? document.legacy_document_ids
                : [];
              if (document?.document_id === documentId || legacyIds.includes(documentId)) {
                return document;
              }
            }
          }
        }
      }
      return null;
    }

    function splitTextIntoSentences(text, absoluteStart) {
      const source = String(text || "");
      if (!source.trim()) return [];
      const sentences = [];
      if (typeof Intl !== "undefined" && typeof Intl.Segmenter === "function") {
        const segmenter = new Intl.Segmenter("en", { granularity: "sentence" });
        let index = 0;
        for (const part of segmenter.segment(source)) {
          if (!part.segment.trim()) continue;
          index += 1;
          sentences.push({
            index,
            text: part.segment,
            start: absoluteStart + part.index,
            end: absoluteStart + part.index + part.segment.length,
          });
        }
      }
      if (sentences.length) return sentences;

      const regex = /.+?(?:[.!?](?=\s|$)|\n+|$)/gs;
      let match;
      let index = 0;
      while ((match = regex.exec(source))) {
        if (!match[0].trim()) continue;
        index += 1;
        sentences.push({
          index,
          text: match[0],
          start: absoluteStart + match.index,
          end: absoluteStart + match.index + match[0].length,
        });
      }
      return sentences;
    }

    function splitTextIntoParagraphs(text, absoluteStart) {
      const source = String(text || "");
      if (!source.trim()) return [];
      const paragraphs = [];
      const regex = /[\s\S]*?(?:\n\s*\n|$)/g;
      let match;
      while ((match = regex.exec(source))) {
        if (!match[0]) break;
        const rawBlock = match[0];
        const trimmedSeparatorBlock = rawBlock.replace(/\n\s*\n$/, "");
        if (!trimmedSeparatorBlock.trim()) {
          if (regex.lastIndex >= source.length) break;
          continue;
        }
        const leadingWhitespace = trimmedSeparatorBlock.match(/^\s*/)?.[0]?.length || 0;
        const trailingWhitespace = trimmedSeparatorBlock.match(/\s*$/)?.[0]?.length || 0;
        const bodyEnd = trimmedSeparatorBlock.length - trailingWhitespace;
        const paragraphText = trimmedSeparatorBlock.slice(leadingWhitespace, bodyEnd);
        if (paragraphText) {
          const paragraphStart = absoluteStart + match.index + leadingWhitespace;
          paragraphs.push({
            text: paragraphText,
            start: paragraphStart,
            end: paragraphStart + paragraphText.length,
          });
        }
        if (regex.lastIndex >= source.length) break;
      }
      return paragraphs;
    }

    function traceParagraphs(document) {
      const sections = (document?.sections || []).length
        ? document.sections.map((section) => ({
          text: section.body || "",
          start: Number(section.body_start || 0),
        }))
        : [{
          text: document?.text || "",
          start: 0,
        }];
      return sections.flatMap((section) => splitTextIntoParagraphs(section.text, section.start));
    }

    function rangeWithinBounds(item, start, end) {
      if (!item) return false;
      return Number(item.start) >= Number(start) && Number(item.end) <= Number(end);
    }

    function selectedRangeForDocument(documentId) {
      if (!documentId) return null;
      const selected =
        annotations().find((item) => item.id === STATE.activeAnnotationId)
        || STATE.selection;
      if (!selected) return null;
      const selectedDocumentId = selected.document_id || selected.documentId || "";
      return selectedDocumentId === documentId ? selected : null;
    }

    function renderTraceDocumentMarkup(document, spanAnnotations, selectedRange) {
      const documentId = document?.document_id || "";
      const categoryLookup = categoryMap();
      const paragraphs = traceParagraphs(document);
      return {
        paragraphs,
        isSelected: paragraphs.some((paragraph) => rangeWithinBounds(selectedRange, paragraph.start, paragraph.end)),
        markup: `
          <div class="trace-document" data-document-id="${escapeHtml(documentId)}">
            ${paragraphs.map((paragraph) => `<p class="annotation-text trace-paragraph" data-document-id="${escapeHtml(documentId)}" data-body-start="${escapeHtml(paragraph.start)}" data-body-end="${escapeHtml(paragraph.end)}">${splitTextIntoSentences(paragraph.text || "", paragraph.start).map((sentence) => `<span class="trace-sentence${rangeWithinBounds(selectedRange, sentence.start, sentence.end) ? " selected" : ""}" data-sentence-select="1" data-document-id="${escapeHtml(documentId)}" data-sentence-start="${escapeHtml(sentence.start)}" data-sentence-end="${escapeHtml(sentence.end)}">${renderHighlightedText(sentence.text || "", Number(sentence.start), spanAnnotations, categoryLookup)}</span>`).join("")}</p>`).join("")}
          </div>
        `,
      };
    }

    function renderHighlightedText(source, absoluteStart, spanAnnotations, categoryLookup) {
      const sectionStart = absoluteStart;
      const sectionEnd = absoluteStart + source.length;
      const relevant = spanAnnotations
        .filter((item) => Number(item.start) < sectionEnd && Number(item.end) > sectionStart)
        .sort((left, right) => Number(left.start) - Number(right.start));
      let cursor = sectionStart;
      let html = "";
      relevant.forEach((annotation) => {
        const start = Math.max(Number(annotation.start), sectionStart);
        const end = Math.min(Number(annotation.end), sectionEnd);
        if (end <= start) return;
        const safeStart = Math.max(cursor, start);
        if (end <= safeStart) return;
        html += escapeHtml(source.slice(cursor - sectionStart, safeStart - sectionStart));
        const category = categoryLookup.get(annotation.label_id) || {
          color: "#8aa19b",
          text_color: "#1f2825",
          name: annotation.label_id,
        };
        const activeClass = annotation.id === STATE.activeAnnotationId ? " active" : "";
        const freshClass = annotation.id === STATE.justSavedAnnotationId ? " fresh" : "";
        html += `
          <mark
            class="annotation-mark${activeClass}${freshClass}"
            data-annotation-id="${escapeHtml(annotation.id)}"
            title="${escapeHtml(category.name || annotation.label_id)}"
            style="--mark-bg:${escapeHtml(category.color || "#8aa19b")};--mark-ink:${escapeHtml(category.text_color || "#1f2825")};"
          >${escapeHtml(source.slice(safeStart - sectionStart, end - sectionStart))}</mark>
        `;
        cursor = end;
      });
      html += escapeHtml(source.slice(cursor - sectionStart));
      return html;
    }

    function anchorFromRect(rect) {
      if (!rect) return null;
      return {
        x: rect.left + rect.width / 2,
        y: rect.top,
      };
    }

    function toolbarAnchorForSelection() {
      return STATE.selectionAnchor || {
        x: window.innerWidth / 2,
        y: Math.max(120, window.innerHeight * 0.25),
      };
    }

    function renderToast() {
      const toast = el.appToast;
      if (!toast) return;
      if (!STATE.toast?.message) {
        toast.className = "app-toast";
        toast.textContent = "";
        return;
      }
      toast.className = `app-toast visible ${STATE.toast.tone || ""}`.trim();
      toast.textContent = STATE.toast.message;
    }

    function setToast(message, tone = "neutral", durationMs = 2600) {
      if (toastTimer) {
        window.clearTimeout(toastTimer);
      }
      STATE.toast = { message, tone };
      renderToast();
      if (durationMs > 0) {
        toastTimer = window.setTimeout(() => {
          STATE.toast = null;
          renderToast();
        }, durationMs);
      }
    }

    async function runUiAction(action, fallbackMessage = "Something went wrong.") {
      try {
        await action();
      } catch (error) {
        console.error(error);
        setToast(error?.message || fallbackMessage, "error");
      }
    }

    function queueFlashNoticeClear() {
      if (flashNoticeTimer) {
        window.clearTimeout(flashNoticeTimer);
      }
      flashNoticeTimer = window.setTimeout(() => {
        STATE.flashNotice = null;
        STATE.justSavedAnnotationId = "";
        render();
      }, 1400);
    }

    function setFlashNotice(labelId, annotationId, anchor, message) {
      const category = categoryMap().get(labelId) || {
        name: labelId,
        color: "#8aa19b",
      };
      STATE.flashNotice = {
        message: message || `Saved as ${category.name || labelId}`,
        color: category.color || "#8aa19b",
        anchor: anchor || toolbarAnchorForSelection(),
      };
      STATE.justSavedAnnotationId = annotationId || "";
      queueFlashNoticeClear();
    }

    function clearTransientSelection() {
      if (commentSaveTimer) {
        window.clearTimeout(commentSaveTimer);
      }
      STATE.selection = null;
      STATE.selectionAnchor = null;
      STATE.flashNotice = null;
      STATE.justSavedAnnotationId = "";
      const selection = window.getSelection?.();
      if (selection && selection.rangeCount) {
        selection.removeAllRanges();
      }
    }

    function renderSelectionToolbar() {
      const toolbar = el.selectionToolbar;
      if (!toolbar) return;
      if (STATE.viewMode !== "label") {
        toolbar.classList.remove("visible");
        toolbar.classList.remove("flash-mode");
        toolbar.innerHTML = "";
        return;
      }
      if ((!STATE.selection || STATE.activeAnnotationId) && !STATE.flashNotice) {
        toolbar.classList.remove("visible");
        toolbar.classList.remove("flash-mode");
        toolbar.innerHTML = "";
        return;
      }
      if (!STATE.selection && STATE.flashNotice) {
        toolbar.innerHTML = `
          <div class="selection-flash-title">Saved</div>
          <div class="selection-flash-body">
            <span class="swatch" style="background:${escapeAttribute(STATE.flashNotice.color || "#8aa19b")}"></span>
            <span>${escapeHtml(STATE.flashNotice.message || "Label saved")}</span>
          </div>
        `;
        toolbar.classList.add("visible", "flash-mode");
        window.requestAnimationFrame(() => {
          const rect = toolbar.getBoundingClientRect();
          const anchor = STATE.flashNotice?.anchor || toolbarAnchorForSelection();
          const centeredLeft = anchor.x - rect.width / 2;
          const left = Math.max(12, Math.min(window.innerWidth - rect.width - 12, centeredLeft));
          const topAbove = anchor.y - rect.height - 14;
          const top =
            topAbove > 84
              ? topAbove
              : Math.min(window.innerHeight - rect.height - 12, anchor.y + 18);
          toolbar.style.left = `${left}px`;
          toolbar.style.top = `${top}px`;
        });
        return;
      }
      const matchedAnnotations = overlappingAnnotationsForSelection();
      toolbar.classList.remove("flash-mode");
      toolbar.innerHTML = `
        <div class="selection-toolbar-categories">
          ${categories().map((category) => `
            <button
              class="toolbar-category-chip"
              type="button"
              data-toolbar-category="${escapeAttribute(category.id)}"
              title="${escapeAttribute(categoryTooltip(category))}"
            >
              <span class="swatch" style="background:${escapeAttribute(category.color || "#8aa19b")}"></span>
              <span>${escapeHtml(category.name || category.id)}</span>
            </button>
          `).join("")}

        </div>
      `;
      toolbar.classList.add("visible");
      window.requestAnimationFrame(() => {
        const rect = toolbar.getBoundingClientRect();
        const anchor = toolbarAnchorForSelection();
        const centeredLeft = anchor.x - rect.width / 2;
        const left = Math.max(12, Math.min(window.innerWidth - rect.width - 12, centeredLeft));
        const topAbove = anchor.y - rect.height - 14;
        const top =
          topAbove > 84
            ? topAbove
            : Math.min(window.innerHeight - rect.height - 12, anchor.y + 18);
        toolbar.style.left = `${left}px`;
        toolbar.style.top = `${top}px`;
      });
    }

      el.railAnnotationFilterSelect.value = STATE.annotationFilter;

          <strong>${escapeHtml(String(labeledCount))}</strong>

    function sortDirectionForColumn(columnKey) {
      const sortKey = normalizeCaseSortValue(STATE.caseSort);
      if (sortKey === `${columnKey}_asc`) return "ascending";
      if (sortKey === `${columnKey}_desc`) return "descending";
      return "none";
    }

    function nextSortValueForColumn(columnKey) {
      const defaultDirection = {
        question: "asc",
        question_id: "asc",
        domain: "asc",
        grade: "asc",
        status: "desc",
        overall_label: "asc",
        highlights: "desc",
        updated: "desc",
      }[columnKey] || "asc";
      const currentDirection = sortDirectionForColumn(columnKey);
      if (currentDirection === "ascending") return `${columnKey}_desc`;
      if (currentDirection === "descending") return `${columnKey}_asc`;
      return `${columnKey}_${defaultDirection}`;
    }

        { key: "overall_label", label: "Overall label" },
        { key: "highlights", label: "Highlights" },

      el.questionExplorerHead.innerHTML = `

    function renderComposerPanel(caseRow) {

      el.composerPanel.hidden = false;
      const selectedTarget = targetContext.selected;
      const documentNote = traceDocument ? documentNoteForDocument(traceDocument.document_id) : null;

      const documentNoteSummary = documentNoteDraft
        ? documentNoteDraft.summary
        : (documentNote?.summary || "");
      const documentNoteLabelId = documentNoteDraft
        ? documentNoteDraft.labelId
        : (documentNote?.label_id || "");

        ? normalizedConfidence(documentNoteDraft.confidence, true)

    function nearestSentenceNode(node) {
      if (!node) return null;
      const element =
        node.nodeType === Node.ELEMENT_NODE
          ? node
          : node.parentElement;
      return element?.closest?.("[data-sentence-select]") || null;
    }

    function nearestParagraphNode(node) {
      if (!node) return null;
      const element =
        node.nodeType === Node.ELEMENT_NODE
          ? node
          : node.parentElement;
      return element?.closest?.(".trace-paragraph") || null;
    }

    function adjacentParagraphNode(paragraph, direction) {
      if (!paragraph) return null;
      let cursor = paragraph;
      while (cursor) {
        cursor = direction === "next" ? cursor.nextElementSibling : cursor.previousElementSibling;
        if (!cursor) return null;
        if (cursor.matches?.(".trace-paragraph")) return cursor;
      }
      return null;
    }

    function paragraphBoundaryNode(root, container, offset, direction) {
      if (!container) return null;
      if (container.nodeType === Node.ELEMENT_NODE && container.matches?.(".trace-paragraph") && root.contains(container)) {
        const childCount = container.childNodes?.length || 0;
        if (direction === "end" && offset <= 0) {
          return adjacentParagraphNode(container, "previous") || container;
        }
        if (direction === "start" && offset >= childCount) {
          return adjacentParagraphNode(container, "next") || container;
        }
        return container;
      }
      const nearest = nearestParagraphNode(container);
      if (nearest && root.contains(nearest)) return nearest;
      return resolveBoundaryNode(root, container, offset, ".trace-paragraph", direction);
    }

    function boundaryMatchWithin(node, selector, direction) {
      if (!node || node.nodeType !== Node.ELEMENT_NODE) return null;
      if (node.matches?.(selector)) return node;
      const matches = node.querySelectorAll?.(selector) || [];
      if (!matches.length) return null;
      return direction === "start" ? matches[0] : matches[matches.length - 1];
    }

    function resolveBoundaryNode(root, container, offset, selector, direction) {
      if (!container) return null;
      const owner =
        container.nodeType === Node.ELEMENT_NODE
          ? container
          : container.parentElement;
      const ancestorMatch = owner?.closest?.(selector);
      if (ancestorMatch && root.contains(ancestorMatch)) return ancestorMatch;
      if (container.nodeType === Node.ELEMENT_NODE) {
        const children = Array.from(container.childNodes || []);
        if (direction === "start") {
          for (let index = Math.max(0, offset); index < children.length; index += 1) {
            const match = boundaryMatchWithin(children[index], selector, "start");
            if (match && root.contains(match)) return match;
          }
        } else {
          for (let index = Math.min(children.length - 1, offset - 1); index >= 0; index -= 1) {
            const match = boundaryMatchWithin(children[index], selector, "end");
            if (match && root.contains(match)) return match;
          }
        }
      }
      return null;
    }

    function offsetWithinSentence(sentence, container, offset) {
      try {
        const probe = document.createRange();
        probe.selectNodeContents(sentence);
        probe.setEnd(container, offset);
        return probe.toString().length;
      } catch (_error) {
        return 0;
      }
    }

    function readSelectionFromTrace(root) {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) return null;
      const range = selection.getRangeAt(0);
      if (range.collapsed) return null;
      if (!root.contains(range.startContainer) || !root.contains(range.endContainer)) return null;
      const startSentence =
        nearestSentenceNode(range.startContainer)
        || resolveBoundaryNode(root, range.startContainer, range.startOffset, "[data-sentence-select]", "start");
      const endSentence =
        nearestSentenceNode(range.endContainer)
        || resolveBoundaryNode(root, range.endContainer, range.endOffset, "[data-sentence-select]", "end");
      const startParagraph =
        paragraphBoundaryNode(root, range.startContainer, range.startOffset, "start");
      const endParagraph =
        paragraphBoundaryNode(root, range.endContainer, range.endOffset, "end");
      const documentId = root.dataset.documentId || startSentence?.dataset?.documentId || "";
      const document = atlasDocument(documentId);
      if (!document?.text) return null;
      let start = Number.NaN;
      let end = Number.NaN;
      if (startSentence) {
        const startBase = Number(startSentence.dataset.sentenceStart || 0);
        start = startBase + offsetWithinSentence(startSentence, range.startContainer, range.startOffset);
      } else if (startParagraph) {
        start = Number(startParagraph.dataset.bodyStart || Number.NaN);
      }
      if (endSentence) {
        const endBase = Number(endSentence.dataset.sentenceStart || 0);
        end = endBase + offsetWithinSentence(endSentence, range.endContainer, range.endOffset);
      } else if (endParagraph) {
        end = Number(endParagraph.dataset.bodyEnd || Number.NaN);
      }
      const quote = String(document.text || "").slice(start, end);
      if (!quote.trim()) return null;
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return null;
      return {
        documentId,
        start,
        end,
        quote,
        selectionMode: "freeform",
      };
    }

    async function apiRequest(url, options = {}) {
      const response = await fetch(url, {
        headers: {

          ...(options.headers || {}),
        },

      });
      const payload = await response.json().catch(() => ({}));
      if (!response.ok || payload.ok === false) {
        throw new Error(payload.error || `Request failed: ${response.status}`);
      }
      return payload;
    }

        ? STATE.datasetKey

    function upsertDocumentNoteInStore(note, documentId) {
      if (!STATE.bootstrap?.store || !documentId) return;
      const items = Array.isArray(STATE.bootstrap.store.document_notes)
        ? STATE.bootstrap.store.document_notes
        : [];
      const nextItems = items.filter((item) => item.document_id !== documentId);
      if (note) {
        nextItems.push(note);
        nextItems.sort((left, right) => {
          const datasetDiff = String(left.dataset_key || "").localeCompare(String(right.dataset_key || ""));
          if (datasetDiff) return datasetDiff;
          const questionDiff = String(left.question_id || "").localeCompare(String(right.question_id || ""));
          if (questionDiff) return questionDiff;
          return String(left.document_id || "").localeCompare(String(right.document_id || ""));
        });
      }
      STATE.bootstrap.store.document_notes = nextItems;
    }

    function annotationPayloadForRange(annotation, start, end) {
      const documentId = annotation.document_id || annotation.documentId;
      const document = atlasDocument(documentId);
      const quote = String(document?.text || "").slice(start, end);
      return {
        document_id: documentId,
        start,
        end,
        quote,
        label_id: annotation.label_id,
        confidence: annotation.confidence || "clear",
        comment: annotation.comment || "",
        author: annotation.author || STATE.author,
        status: annotation.status || "confirmed",
        selection_mode: annotation?.provenance?.selection_mode || annotation.selection_mode || "freeform",
        interface: "reasoning-annotation-studio",
        labeler_type: annotation?.provenance?.labeler_type || "human",
        source_text_hash: annotation.source_text_hash || document?.text_hash || "",
      };
    }

    async function clearSelectionFromAnnotations(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (!selection || !overlaps.length) {
        clearTransientSelection();
        STATE.activeAnnotationId = "";
        STATE.draftComment = "";
        STATE.draftConfidence = "clear";
        refreshSelectionUi();
        return;
      }

      const deletes = [];
      const updates = [];
      const creates = [];

      overlaps.forEach((annotation) => {
        const remainingSegments = annotationSegmentsAfterClear(annotation, selection);
        if (!remainingSegments.length) {
          deletes.push(annotation.id);
          return;
        }
        updates.push({
          annotationId: annotation.id,
          body: annotationPayloadForRange(annotation, remainingSegments[0].start, remainingSegments[0].end),
        });
        remainingSegments.slice(1).forEach((segment) => {
          creates.push(annotationPayloadForRange(annotation, segment.start, segment.end));
        });
      });

      clearTransientSelection();
      STATE.activeAnnotationId = "";
      STATE.draftComment = "";
      STATE.draftConfidence = "clear";

      for (const annotationId of deletes) {
        await apiRequest(`/api/annotations/${encodeURIComponent(annotationId)}`, {
          method: "DELETE",
        });
      }
      for (const update of updates) {
        await apiRequest(`/api/annotations/${encodeURIComponent(update.annotationId)}`, {
          method: "PATCH",
          body: JSON.stringify(update.body),
        });
      }
      for (const body of creates) {
        await apiRequest("/api/annotations", {
          method: "POST",
          body: JSON.stringify(body),
        });
      }

      await refreshStoreOnly();
      render();
    }

    async function deleteAnnotations(annotationIds) {
      const ids = [...new Set((annotationIds || []).filter(Boolean))];
      if (!ids.length) return;
      const previousStore = STATE.bootstrap?.store
        ? JSON.parse(JSON.stringify(STATE.bootstrap.store))
        : null;
      clearTransientSelection();
      STATE.activeAnnotationId = "";
      STATE.draftComment = "";
      STATE.draftConfidence = "clear";
      if (STATE.bootstrap?.store?.annotations) {
        STATE.bootstrap.store.annotations = STATE.bootstrap.store.annotations.filter((item) => !ids.includes(item.id));
        render();
      }
      try {
        await Promise.all(ids.map((annotationId) => apiRequest(`/api/annotations/${encodeURIComponent(annotationId)}`, {
          method: "DELETE",
        })));
        await refreshStoreOnly();
        render();
      } catch (error) {
        if (previousStore && STATE.bootstrap) {
          STATE.bootstrap.store = previousStore;
        }
        render();
        throw error;
      }
    }
