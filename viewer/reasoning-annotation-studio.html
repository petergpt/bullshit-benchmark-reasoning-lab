    function recordIsAiLabelled(record) {
      if (!record) return false;
      if (typeof record.ai_labelled === "boolean") return record.ai_labelled;
      const provenance = record.provenance || {};
      return provenance.labeler_type === "model" || provenance.source === "ai_labelling";
    }

    function recordIsHumanReviewed(record) {
      if (!record) return false;
      if (typeof record.human_reviewed === "boolean") return record.human_reviewed;
      const provenance = record.provenance || {};
      return provenance.labeler_type === "human";
    }

    function overallLabelCountsAsReviewed(record) {
      if (!record || !record.label_id) return false;
      return recordIsHumanReviewed(record) || !recordIsAiLabelled(record);
    }

    function setAiLabelJob(documentId, job) {
      if (!documentId) return;
      if (job) {
        STATE.aiLabelJobsByDocument[documentId] = job;
      } else {
        delete STATE.aiLabelJobsByDocument[documentId];
      }
    }

    function aiLabelJobForDocument(documentId) {
      return documentId ? (STATE.aiLabelJobsByDocument[documentId] || null) : null;
    }

    function documentReviewState(documentId) {
      const note = documentNoteForDocument(documentId);
      const spanItems = annotationsForDocument(documentId);
      const items = [
        ...(note ? [note] : []),
        ...spanItems,
      ];
      const sessionIds = new Set(
        [
          ...reviewSessionsForDocument(documentId)
            .map((item) => String(item?.id || "").trim()),
          ...items.map((item) => String(item?.review_session_id || "").trim()),
        ].filter(Boolean),
      );
      const reviewEvents = reviewEventsForDocument(documentId, sessionIds);
      const aiItems = items.filter((item) => recordIsAiLabelled(item));
      const humanReviewedItems = items.filter((item) => recordIsHumanReviewed(item));
      const reviewedAiItems = aiItems.filter((item) => recordIsHumanReviewed(item));
      const humanAddedItems = items.filter((item) => recordIsHumanAdded(item));
      const pendingAiItems = aiItems.filter((item) => !recordIsHumanReviewed(item));
      return {
        note,
        items,
        aiItems,
        humanReviewedItems,
        reviewedAiItems,
        humanAddedItems,
        reviewEvents,
        pendingAiItems,
        hasAnyAi: aiItems.length > 0,
        hasHumanReviewed: reviewedAiItems.length > 0 || humanAddedItems.length > 0 || reviewEvents.length > 0,
        hasReviewedAi: reviewedAiItems.length > 0,
        hasPendingAiReview: pendingAiItems.length > 0,
      };
    }

    function renderRecordStatusBadges(record) {
      if (!record) return "";
      const badges = [];
      if (recordIsAiLabelled(record)) {
        badges.push(renderStatusPill("AI", "ai"));
        badges.push(
          renderStatusPill(
            recordIsHumanReviewed(record) ? "Reviewed" : "Pending review",
            recordIsHumanReviewed(record) ? "reviewed" : "pending",
          ),
        );
      } else if (recordIsHumanAdded(record)) {
        badges.push(renderStatusPill("Human added", "human"));
      }
      return badges.join("");
    }

    function renderDocumentStatusBadges(documentId) {
      const reviewState = documentReviewState(documentId);
      const badges = [];
      if (reviewState.aiItems.length) badges.push(renderStatusPill(`AI ${reviewState.aiItems.length}`, "ai"));
      if (reviewState.pendingAiItems.length) badges.push(renderStatusPill(`Pending ${reviewState.pendingAiItems.length}`, "pending"));
      if (reviewState.reviewedAiItems.length) badges.push(renderStatusPill(`Reviewed ${reviewState.reviewedAiItems.length}`, "reviewed"));
      if (reviewState.humanAddedItems.length) badges.push(renderStatusPill(`Added ${reviewState.humanAddedItems.length}`, "human"));
      return badges.join("");
    }

    function aiLabelButtonMeta(documentId) {
      const aiMeta = aiLabellingMeta();
      const job = aiLabelJobForDocument(documentId);
      const reviewState = documentReviewState(documentId);
      if (!aiMeta.enabled) {
        return {
          enabled: false,
          label: "AI unavailable",
          title: "Set OPENROUTER_API_KEY on the server to enable AI labelling.",
        };
      }
      if (!documentId) {
        return {
          enabled: false,
          label: "Label with AI",
          title: "No reasoning trace is available for this case.",
        };
      }
      if (job?.pending) {
        return {
          enabled: false,
          loading: true,
          icon: "loader",
          label: job.action === "clear" ? "Clearing..." : "Labelling...",
          title: job.action === "clear"
            ? "Clearing AI labels for this reasoning trace."
            : job.action === "complete"
              ? "AI completion is currently running for this reasoning trace."
              : "AI labelling is currently running for this reasoning trace.",
        };
      }
      if (reviewState.hasHumanReviewed) {
        return {
          enabled: true,
          loading: false,
          icon: "sparkles",
          label: reviewState.hasAnyAi ? "Complete with AI" : "Label with AI",
          title: reviewState.hasAnyAi
            ? "Complete the remaining labelling with AI while keeping the existing human-reviewed labels. Any unreviewed AI suggestions on this trace will be replaced."
            : "Complete the remaining labelling with AI while keeping the existing human-reviewed labels.",
        };
      }
      if (reviewState.hasAnyAi) {
        return {
          enabled: true,
          loading: false,
          icon: "sparkles",
          label: "Re-label with AI",
          title: "Replace the current unreviewed AI labels for this reasoning trace.",
        };
      }
      return {
        enabled: true,
        loading: false,
        icon: "sparkles",
        label: "Label with AI",
        title: "Generate suggested labels for this reasoning trace using the default AI labelling config.",
      };
    }

    function aiClearButtonMeta(documentId) {
      const job = aiLabelJobForDocument(documentId);
      const reviewState = documentReviewState(documentId);
      if (!documentId || !reviewState.hasAnyAi) return null;
      if (job?.pending) {
        return {
          enabled: false,
          title: "Please wait for the current AI labelling action to finish.",
        };
      }
      return {
        enabled: true,
        title: "Clear AI labels for this reasoning trace.",
      };
    }

    function renderReasoningHeader(documentId, source, spanCount) {
      const readOnly = isReadOnlyMode();
      const aiButton = readOnly ? null : aiLabelButtonMeta(documentId);
      const clearButton = readOnly ? null : aiClearButtonMeta(documentId);
      const statusBadges = documentId ? renderDocumentStatusBadges(documentId) : "";
      return `
        <div class="reasoning-topline">
          <div class="reasoning-heading">
            <div class="reasoning-title-row">
              <div class="reasoning-title-main">
                <h2>Reasoning</h2>
              </div>
              <div class="reasoning-meta-row">
                ${renderModelChip(source)}
                ${renderMetricChip(spanCount)}
                ${statusBadges}
                ${aiButton ? `
                  <div class="reasoning-actions">
                    <button
                      class="icon-action-btn ai-action-btn${aiButton.loading ? " is-loading" : ""} tooltip-anchor${aiButton.title ? "" : " no-tip"}"
                      type="button"
                      data-ai-label-document="${escapeHtml(documentId || "")}"
                      data-tip="${escapeAttribute(aiButton.title)}"
                      aria-label="${escapeAttribute(aiButton.title)}"
                      aria-busy="${aiButton.loading ? "true" : "false"}"
                      title="${escapeAttribute(aiButton.title)}"
                      ${aiButton.enabled ? "" : "disabled"}
                    >
                      ${renderUiIcon(aiButton.icon || "sparkles")}
                    </button>
                    ${clearButton ? `
                      <button
                        class="icon-action-btn tooltip-anchor${clearButton.title ? "" : " no-tip"}"
                        type="button"
                        data-clear-ai-labels-document="${escapeHtml(documentId || "")}"
                        data-tip="${escapeAttribute(clearButton.title)}"
                        aria-label="${escapeAttribute(clearButton.title)}"
                        title="${escapeAttribute(clearButton.title)}"
                        ${clearButton.enabled ? "" : "disabled"}
                      >
                        ${renderUiIcon("undo")}
                      </button>
                    ` : ""}
                  </div>
                ` : ""}
              </div>
            </div>
            <p class="panel-subtitle compact">${readOnly ? "Read-only snapshot." : "Select text to label it."}</p>
          </div>
        </div>
      `;
    }

    function caseLastTouched(caseRow, source = currentSource()) {
      const timestamps = [
        ...annotationsForCase(caseRow, source).map((item) => item.updated_at_utc),
        caseDocumentNote(caseRow, source)?.updated_at_utc,
      ].filter(Boolean).map((value) => new Date(value).getTime()).filter((value) => Number.isFinite(value));
      if (!timestamps.length) return "";
      return new Date(Math.max(...timestamps)).toISOString();
    }

    function caseProgressMeta(caseRow, source = currentSource()) {
      const spanCount = caseAnnotationCount(caseRow, source);
      const note = caseDocumentNote(caseRow, source);
      const documentId = caseDocumentId(caseRow, source);
      const reviewState = documentReviewState(documentId);
      const hasOverallLabel = Boolean(note?.label_id);
      const hasOverallNote = Boolean((note?.summary || "").trim());
      const hasReviewedOverallLabel = overallLabelCountsAsReviewed(note);
      const hasAnyLabel = spanCount > 0 || hasOverallLabel;
      if (!hasAnyLabel) {
        return {
          key: "unreviewed",
          label: "Not labelled",
          tone: "slate",
          rank: 0,
          hasPendingAiReview: false,
          hasReviewWork: false,
          hasOverallLabel: false,
          hasOverallNote: false,
        };
      }
      if (hasReviewedOverallLabel) {
        return {
          key: "reviewed",
          label: "Labelled",
          tone: "green",
          rank: 2,
          hasPendingAiReview: false,
          hasReviewWork: true,
          hasOverallLabel,
          hasOverallNote,
        };
      }
      if (reviewState.hasPendingAiReview) {
        return {
          key: "ai_labelled",
          label: "AI labelled",
          tone: "blue",
          rank: 1,
          hasPendingAiReview: true,
          hasReviewWork: true,
          hasOverallLabel,
          hasOverallNote,
        };
      }
      if (spanCount > 0 && hasOverallLabel) {
        return {
          key: "reviewed",
          label: "Labelled",
          tone: "green",
          rank: 2,
          hasPendingAiReview: false,
          hasReviewWork: true,
          hasOverallLabel,
          hasOverallNote,
        };
      }
      return {
        key: "in_progress",
        label: "Started",
        tone: "blue",
        rank: 1,
        hasPendingAiReview: false,
        hasReviewWork: hasAnyLabel,
        hasOverallLabel,
        hasOverallNote,
      };
    }

    function caseBrowseLabelMeta(caseRow, source = currentSource()) {
      const progress = caseProgressMeta(caseRow, source);
      return { label: progress.label, tone: progress.tone };
    }

    function caseHasStartedReview(caseRow, source = currentSource()) {
      const note = caseDocumentNote(caseRow, source);
      return (
        caseAnnotationCount(caseRow, source) > 0
        || Boolean(note?.label_id)
      );
    }

    function draftDocumentNoteFor(documentId) {
      if (!STATE.draftDocumentNote || STATE.draftDocumentNote.documentId !== documentId) {
        const drafts = readDocumentNoteDrafts();
        const stored = drafts[documentId];
        if (!stored || typeof stored !== "object") return null;
        return {
          documentId,
          summary: String(stored.summary || ""),
          labelId: String(stored.labelId || ""),
        };
      }
      return STATE.draftDocumentNote;
    }

    function setDocumentNoteStatus(documentId, message) {
      STATE.documentNoteStatus = documentId
        ? { documentId, message: String(message || "") }
        : null;
      const statusNode = document.getElementById("documentNoteSaveState");
      if (statusNode && STATE.documentNoteStatus?.documentId === statusNode.dataset.documentId) {
        statusNode.textContent = STATE.documentNoteStatus.message;
      }
    }

    function documentNoteStatusText(documentId, documentNote, documentNoteDraft = null) {
      if (STATE.documentNoteStatus?.documentId === documentId && STATE.documentNoteStatus.message) {
        return STATE.documentNoteStatus.message;
      }
      if (
        documentNoteDraft
        && (
          (documentNoteDraft.summary || "") !== (documentNote?.summary || "")
          || (documentNoteDraft.labelId || "") !== (documentNote?.label_id || "")
        )
      ) {
        return "Saved locally";
      }
      if (documentNote?.updated_at_utc) return "Saved";
      return "Autosave on";
    }

    function annotationsForDocument(documentId) {
      return annotations()
        .filter((item) => item.document_id === documentId)
        .sort((left, right) => {
          const startDiff = Number(left.start || 0) - Number(right.start || 0);
          if (startDiff) return startDiff;
          return Number(left.end || 0) - Number(right.end || 0);
        });
    }

    function overlappingAnnotationsForSelection(selection = STATE.selection) {
      if (!selection) return [];
      const documentId = selection.document_id || selection.documentId;
      if (!documentId) return [];
      const start = Number(selection.start);
      const end = Number(selection.end);
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return [];
      return annotationsForDocument(documentId).filter((item) => {
        const itemStart = Number(item.start || 0);
        const itemEnd = Number(item.end || 0);
        return start < itemEnd && end > itemStart;
      });
    }

    function annotationForSelection(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (!selection || overlaps.length !== 1) return null;
      return overlaps.find((annotation) => (
        Number(annotation.start || 0) === Number(selection.start)
        && Number(annotation.end || 0) === Number(selection.end)
      )) || null;
    }

    function annotationSegmentsAfterClear(annotation, selection = STATE.selection) {
      if (!annotation || !selection) return [];
      const annotationStart = Number(annotation.start);
      const annotationEnd = Number(annotation.end);
      const selectionStart = Number(selection.start);
      const selectionEnd = Number(selection.end);
      if (
        !Number.isFinite(annotationStart)
        || !Number.isFinite(annotationEnd)
        || !Number.isFinite(selectionStart)
        || !Number.isFinite(selectionEnd)
      ) {
        return [];
      }
      if (selectionEnd <= annotationStart || selectionStart >= annotationEnd) {
        return [{ start: annotationStart, end: annotationEnd }];
      }
      return [
        selectionStart > annotationStart ? { start: annotationStart, end: Math.min(selectionStart, annotationEnd) } : null,
        selectionEnd < annotationEnd ? { start: Math.max(selectionEnd, annotationStart), end: annotationEnd } : null,
      ].filter((segment) => segment && Number(segment.end) > Number(segment.start));
    }

    function clearActionLabel(selection = STATE.selection) {
      const overlaps = overlappingAnnotationsForSelection(selection);
      if (!overlaps.length) return "Clear";
      const isPartial = overlaps.some((annotation) => annotationSegmentsAfterClear(annotation, selection).length > 0);
      if (isPartial) return "Clear selected part";
      return overlaps.length > 1 ? "Clear labels" : "Clear label";
    }

    function annotationsForCase(caseRow, source = currentSource()) {
      const documentId = reasonDocument(caseRow, source)?.document_id;
      if (!documentId) return [];
      return annotationsForDocument(documentId);
    }

    function caseAnnotationCount(caseRow, source = currentSource()) {
      return annotationsForCase(caseRow, source).length;
    }

    function selectedCategory() {
      const items = categories();
      if (!items.length) return null;
      const match = items.find((item) => item.id === STATE.selectedCategoryId);
      if (match) return match;
      STATE.selectedCategoryId = items[0].id;
      return items[0];
    }

    function reasonDocument(caseRow, source = currentSource()) {
      return primaryVariant(caseRow, source)?.reasoning_document || null;
    }

    function comparisonContext(caseRow) {
      if (!caseRow) return null;
      const dataset = currentDataset();
      const compareKey = alternateSourceKey(caseRow.question_id, dataset?.key || STATE.datasetKey);
      if (!compareKey) return null;
      const source = sourceForKey(compareKey);
      const compareCase = caseForKeys(compareKey, dataset?.key || STATE.datasetKey, caseRow.question_id);
      if (!source || !compareCase) return null;
      return {
        sourceKey: compareKey,
        source,
        caseRow: compareCase,
        document: reasonDocument(compareCase, source),
      };
    }

    function composerTargetContext(caseRow) {
      if (!caseRow) return { options: [], selected: null };
      const primarySource = currentSource();
      const primaryDocument = reasonDocument(caseRow, primarySource);
      const options = [];
      if (primarySource && primaryDocument) {
        options.push({
          key: primarySource.key,
          source: primarySource,
          caseRow,
          document: primaryDocument,
          side: "primary",
        });
      }
      if (STATE.compareOpen) {
        const compare = comparisonContext(caseRow);
        if (compare?.source && compare?.document) {
          options.push({
            key: compare.source.key,
            source: compare.source,
            caseRow: compare.caseRow,
            document: compare.document,
            side: "comparison",
          });
        }
      }
      if (!options.length) return { options: [], selected: null };
      const selected =
        options.find((option) => option.key === STATE.composerTargetSourceKey)
        || options[0];
      if (selected.key !== STATE.composerTargetSourceKey) {
        setComposerTargetSourceKey(selected.key);
      }
      return { options, selected };
    }

    function renderComposerTargetSwitch(targetContext, selectedTarget, ariaLabel, titlePrefix) {
      if (!selectedTarget) return "";
      if ((targetContext?.options || []).length <= 1) {
        return renderModelChip(selectedTarget.source);
      }
      return `
        <div class="composer-target-switch" role="radiogroup" aria-label="${escapeAttribute(ariaLabel)}">
          ${targetContext.options.map((option) => `
            <button
              class="composer-target-button ${escapeHtml(modelTone(option.source?.key))}${option.key === selectedTarget.key ? " active" : ""}"
              type="button"
              role="radio"
              data-composer-target-source="${escapeHtml(option.key)}"
              aria-checked="${option.key === selectedTarget.key ? "true" : "false"}"
              title="${escapeAttribute(`${titlePrefix} ${option.source?.label || option.key}`)}"
            >
              <span class="composer-target-indicator" aria-hidden="true"></span>
              <span class="composer-target-button-label">${escapeHtml(compactComposerTargetLabel(option.source))}</span>
            </button>
          `).join("")}
        </div>
      `;
    }

    function labDocument(documentId) {
      if (!documentId) return null;
      const labData = currentLabData();
      for (const source of Object.values(labData?.sources || {})) {
        for (const dataset of Object.values(source?.datasets || {})) {
          for (const caseRow of dataset?.cases || []) {
            for (const variant of Object.values(caseRow?.variants || {})) {
              const document = variant?.reasoning_document;
              const legacyIds = Array.isArray(document?.legacy_document_ids)
                ? document.legacy_document_ids
                : [];
              if (document?.document_id === documentId || legacyIds.includes(documentId)) {
                return document;
              }
            }
          }
        }
      }
      return null;
    }

    function splitTextIntoSentences(text, absoluteStart) {
      const source = String(text || "");
      if (!source.trim()) return [];
      const sentences = [];
      if (typeof Intl !== "undefined" && typeof Intl.Segmenter === "function") {
        const segmenter = new Intl.Segmenter("en", { granularity: "sentence" });
        let index = 0;
        for (const part of segmenter.segment(source)) {
          if (!part.segment.trim()) continue;
          index += 1;
          sentences.push({
            index,
            text: part.segment,
            start: absoluteStart + part.index,
            end: absoluteStart + part.index + part.segment.length,
          });
        }
      }
      if (sentences.length) return sentences;

      const regex = /.+?(?:[.!?](?=\s|$)|\n+|$)/gs;
      let match;
      let index = 0;
      while ((match = regex.exec(source))) {
        if (!match[0].trim()) continue;
        index += 1;
        sentences.push({
          index,
          text: match[0],
          start: absoluteStart + match.index,
          end: absoluteStart + match.index + match[0].length,
        });
      }
      return sentences;
    }

    function splitTextIntoParagraphs(text, absoluteStart) {
      const source = String(text || "");
      if (!source.trim()) return [];
      const paragraphs = [];
      const regex = /[\s\S]*?(?:\n\s*\n|$)/g;
      let match;
      while ((match = regex.exec(source))) {
        if (!match[0]) break;
        const rawBlock = match[0];
        const trimmedSeparatorBlock = rawBlock.replace(/\n\s*\n$/, "");
        if (!trimmedSeparatorBlock.trim()) {
          if (regex.lastIndex >= source.length) break;
          continue;
        }
        const leadingWhitespace = trimmedSeparatorBlock.match(/^\s*/)?.[0]?.length || 0;
        const trailingWhitespace = trimmedSeparatorBlock.match(/\s*$/)?.[0]?.length || 0;
        const bodyEnd = trimmedSeparatorBlock.length - trailingWhitespace;
        const paragraphText = trimmedSeparatorBlock.slice(leadingWhitespace, bodyEnd);
        if (paragraphText) {
          const paragraphStart = absoluteStart + match.index + leadingWhitespace;
          paragraphs.push({
            text: paragraphText,
            start: paragraphStart,
            end: paragraphStart + paragraphText.length,
          });
        }
        if (regex.lastIndex >= source.length) break;
      }
      return paragraphs;
    }

    function traceParagraphs(document) {
      const sections = (document?.sections || []).length
        ? document.sections.map((section) => ({
          text: section.body || "",
          start: Number(section.body_start || 0),
        }))
        : [{
          text: document?.text || "",
          start: 0,
        }];
      return sections.flatMap((section) => splitTextIntoParagraphs(section.text, section.start));
    }

    function rangeWithinBounds(item, start, end) {
      if (!item) return false;
      return Number(item.start) >= Number(start) && Number(item.end) <= Number(end);
    }

    function selectedRangeForDocument(documentId) {
      if (!documentId) return null;
      const selected =
        annotations().find((item) => item.id === STATE.activeAnnotationId)
        || STATE.selection;
      if (!selected) return null;
      const selectedDocumentId = selected.document_id || selected.documentId || "";
      return selectedDocumentId === documentId ? selected : null;
    }

    function renderTraceDocumentMarkup(document, spanAnnotations, selectedRange) {
      const documentId = document?.document_id || "";
      const categoryLookup = categoryMap();
      const paragraphs = traceParagraphs(document);
      return {
        paragraphs,
        isSelected: paragraphs.some((paragraph) => rangeWithinBounds(selectedRange, paragraph.start, paragraph.end)),
        markup: `
          <div class="trace-document" data-document-id="${escapeHtml(documentId)}">
            ${paragraphs.map((paragraph) => `<p class="annotation-text trace-paragraph" data-document-id="${escapeHtml(documentId)}" data-body-start="${escapeHtml(paragraph.start)}" data-body-end="${escapeHtml(paragraph.end)}">${splitTextIntoSentences(paragraph.text || "", paragraph.start).map((sentence) => `<span class="trace-sentence${rangeWithinBounds(selectedRange, sentence.start, sentence.end) ? " selected" : ""}" data-sentence-select="1" data-document-id="${escapeHtml(documentId)}" data-sentence-start="${escapeHtml(sentence.start)}" data-sentence-end="${escapeHtml(sentence.end)}">${renderHighlightedText(sentence.text || "", Number(sentence.start), spanAnnotations, categoryLookup)}</span>`).join("")}</p>`).join("")}
          </div>
        `,
      };
    }

    function renderHighlightedText(source, absoluteStart, spanAnnotations, categoryLookup) {
      const sectionStart = absoluteStart;
      const sectionEnd = absoluteStart + source.length;
      const relevant = spanAnnotations
        .filter((item) => Number(item.start) < sectionEnd && Number(item.end) > sectionStart)
        .sort((left, right) => Number(left.start) - Number(right.start));
      let cursor = sectionStart;
      let html = "";
      relevant.forEach((annotation) => {
        const start = Math.max(Number(annotation.start), sectionStart);
        const end = Math.min(Number(annotation.end), sectionEnd);
        if (end <= start) return;
        const safeStart = Math.max(cursor, start);
        if (end <= safeStart) return;
        html += escapeHtml(source.slice(cursor - sectionStart, safeStart - sectionStart));
        const category = categoryLookup.get(annotation.label_id) || {
          color: "#8aa19b",
          text_color: "#1f2825",
          name: annotation.label_id,
        };
        const activeClass = annotation.id === STATE.activeAnnotationId ? " active" : "";
        const freshClass = annotation.id === STATE.justSavedAnnotationId ? " fresh" : "";
        html += `<mark class="annotation-mark${activeClass}${freshClass}" data-annotation-id="${escapeHtml(annotation.id)}" title="${escapeHtml(category.name || annotation.label_id)}" style="--mark-bg:${escapeHtml(category.color || "#8aa19b")};--mark-ink:${escapeHtml(category.text_color || "#1f2825")};">${escapeHtml(source.slice(safeStart - sectionStart, end - sectionStart))}</mark>`;
        cursor = end;
      });
      html += escapeHtml(source.slice(cursor - sectionStart));
      return html;
    }

        el.reviewDomainFilterField.hidden = dataset.key !== "v2";
      }
      populateDomainMultiSelect(el.domainFilterSummary, el.domainFilterList);
      populateDomainMultiSelect(el.railDomainFilterSummary, el.railDomainFilterList);
      populateDomainMultiSelect(el.reviewDomainFilterSummary, el.reviewDomainFilterList);
    }

    function renderCaseRail(rows) {
      const dataset = currentDataset();
      if (!dataset) return;
      el.caseMeta.textContent = `${rows.length} of ${dataset.case_count} cases`;
      el.caseList.innerHTML = rows.length ? rows.map((caseRow) => {
        const workflow = caseWorkflowFilterMeta(caseRow, dataset.key || STATE.datasetKey);
        return `
          <button class="case-card${caseRow.question_id === STATE.selectedCaseId ? " selected" : ""}" type="button" data-question-id="${escapeHtml(caseRow.question_id)}">
            <div class="case-top">
              <div class="case-heading">
                <div class="case-heading-main">
                  <span class="case-id">${escapeHtml(caseRow.question_id)}</span>
                  ${dataset.key === "v2" && caseDomainLabel(caseRow) ? `<span class="tag">${escapeHtml(caseDomainLabel(caseRow))}</span>` : ""}
                </div>
                <span class="pill ${escapeHtml(workflow.tone)}">${escapeHtml(workflow.label)}</span>
              </div>
              ${renderCaseRailVerdictPills(caseRow, dataset.key)}
            </div>
            <p class="case-question">${escapeHtml(clampText(caseRow.question, 170))}</p>
            <p class="case-meta">${escapeHtml(clampText(caseRow.nonsensical_element, 150))}</p>
          </button>
        `;
      }).join("") : `<div class="empty-state"><strong>No cases match the current filters.</strong><br>Reset filters or switch to Explorer.</div>`;
    }

    function sortDirectionForColumn(columnKey) {
      const sortKey = normalizeCaseSortValue(STATE.caseSort);
      if (sortKey === `${columnKey}_asc`) return "ascending";
      if (sortKey === `${columnKey}_desc`) return "descending";
      return "none";
    }

    function nextSortValueForColumn(columnKey) {
      const defaultDirection = {
        question: "asc",
        domain: "asc",
        primary_grade: "asc",
        primary_labelled: "desc",
        primary_overall_label: "asc",
        compare_grade: "asc",
        compare_labelled: "desc",
        compare_overall_label: "asc",
      }[columnKey] || "asc";
      const currentDirection = sortDirectionForColumn(columnKey);
      if (currentDirection === "ascending") return `${columnKey}_desc`;
      if (currentDirection === "descending") return `${columnKey}_asc`;
      return `${columnKey}_${defaultDirection}`;
    }

    function renderExplorerStartedPill(hasStartedReview) {
      return `
        <span class="explorer-yesno ${hasStartedReview ? "is-yes" : "is-no"}">
          ${hasStartedReview ? "Yes" : "No"}
        </span>
      `;
    }

    function renderExplorerGradePill(verdict, options = {}) {
      const useCompactLabel = options.compact !== false;
      const compactLabel = {
        "Clear pushback": "Pushback",
        "Partial challenge": "Partial",
        "Accepted nonsense": "Accepted",
        Missing: "Missing",
      }[verdict?.label] || verdict?.label || "—";
      const tone = verdict?.tone || "slate";
      const fullLabel = verdict?.label || compactLabel;
      const displayLabel = useCompactLabel ? compactLabel : fullLabel;
      return `
        <span class="explorer-grade-pill ${escapeHtml(tone)}" title="${escapeAttribute(fullLabel)}">
          ${escapeHtml(displayLabel)}
        </span>
      `;
    }

    function aiLabelRuns() {
      return currentStore()?.ai_label_runs || [];
    }

    function aiLabelRunItems() {
      return currentStore()?.ai_label_run_items || [];
    }

    function activeAiRun() {
      return aiLabelRuns()
        .filter((run) => ["queued", "running"].includes(String(run?.status || "")))
        .sort((left, right) => {
          const leftTime = Date.parse(String(left?.created_at_utc || "")) || 0;
          const rightTime = Date.parse(String(right?.created_at_utc || "")) || 0;
          return rightTime - leftTime;
        })[0] || null;
    }

    function activeAiRunQuestionIdsForDataset(datasetKey = STATE.datasetKey) {
      return Array.isArray(STATE.activeAiRunQuestionIdsByDataset?.[datasetKey])
        ? STATE.activeAiRunQuestionIdsByDataset[datasetKey]
        : [];
    }

    function activeAiRunQuestionIdSetForDataset(datasetKey = STATE.datasetKey) {
      return new Set(activeAiRunQuestionIdsForDataset(datasetKey));
    }

    function activeAiRunQuestionOrderForDataset(datasetKey = STATE.datasetKey) {
      const order = STATE.activeAiRunQuestionOrderByDataset?.[datasetKey];
      return order && typeof order === "object" ? order : null;
    }

    function hasActiveAiRunForDataset(datasetKey = STATE.datasetKey) {
      const run = activeAiRun();
      const normalizedDatasetKey = String(datasetKey || "").trim();
      if (!run || !normalizedDatasetKey) return false;
      const runId = String(run?.id || "").trim();
      return aiLabelRunItems().some((item) => (
        String(item?.run_id || "").trim() === runId
        && String(item?.dataset_key || "").trim() === normalizedDatasetKey
      ));
    }

    function setActiveAiRunExplorerSnapshot(datasetKey, questionIds = [], rows = []) {
      const normalizedDatasetKey = String(datasetKey || "").trim();
      if (!normalizedDatasetKey) return;
      const normalizedQuestionIds = [...new Set(
        (questionIds || []).map((value) => String(value || "").trim()).filter(Boolean),
      )];
      const order = {};
      (rows || []).forEach((caseRow, index) => {
        const questionId = String(caseRow?.question_id || "").trim();
        if (!questionId) return;
        order[questionId] = index;
      });
      STATE.activeAiRunQuestionIdsByDataset = {
        ...(STATE.activeAiRunQuestionIdsByDataset || {}),
        [normalizedDatasetKey]: normalizedQuestionIds,
      };
      STATE.activeAiRunQuestionOrderByDataset = {
        ...(STATE.activeAiRunQuestionOrderByDataset || {}),
        [normalizedDatasetKey]: order,
      };
    }

    function clearActiveAiRunExplorerSnapshots() {
      STATE.activeAiRunQuestionIdsByDataset = {};
      STATE.activeAiRunQuestionOrderByDataset = {};
    }

    function syncActiveAiRunExplorerState() {
      if (activeAiRunIds().length) return;
      STATE.activeAiRunId = "";
      clearActiveAiRunExplorerSnapshots();
    }

    function caseActiveAiRunMeta(caseRow, datasetKey = STATE.datasetKey) {
      const run = activeAiRun();
      const questionId = String(caseRow?.question_id || "").trim();
      if (!run || !questionId) {
        return { active: false, key: "none", label: "", title: "" };
      }
      const runId = String(run?.id || "").trim();
      const runItems = aiLabelRunItems().filter((item) => (
        String(item?.run_id || "").trim() === runId
        && String(item?.dataset_key || "").trim() === String(datasetKey || "").trim()
        && String(item?.question_id || "").trim() === questionId
      ));
      if (!runItems.length) {
        return { active: false, key: "none", label: "", title: "" };
      }
      const counts = {
        queued: runItems.filter((item) => String(item?.status || "").trim() === "queued").length,
        running: runItems.filter((item) => String(item?.status || "").trim() === "running").length,
        applied: runItems.filter((item) => String(item?.status || "").trim() === "applied").length,
        failed: runItems.filter((item) => String(item?.status || "").trim() === "failed").length,
      };
      const total = runItems.length;
      const title = `${counts.applied} applied, ${counts.running} running, ${counts.queued} queued, ${counts.failed} failed across ${total} trace${total === 1 ? "" : "s"}.`;
      if (counts.running) {
        return {
          active: true,
          key: "running",
          tone: "loading",
          label: counts.applied ? `AI ${counts.applied}/${total} running` : "AI running",
          title,
        };
      }
      if (counts.queued) {
        return {
          active: true,
          key: "queued",
          tone: "queued",
          label: counts.applied ? `AI ${counts.applied}/${total} queued` : "AI queued",
          title,
        };
      }
      if (counts.failed && !counts.applied) {
        return {
          active: true,
          key: "failed",
          tone: "failed",
          label: total > 1 ? `AI ${counts.failed}/${total} failed` : "AI failed",
          title,
        };
      }
      return {
        active: true,
        key: "applied",
        tone: "saved",
        label: total > 1 ? `AI ${counts.applied}/${total} saved` : "AI saved",
        title,
      };
    }

    function currentOrLatestAiRun() {
      const pinnedRunId = String(STATE.activeAiRunId || "").trim();
      if (pinnedRunId) {
        const pinnedRun = aiLabelRuns().find((run) => String(run?.id || "").trim() === pinnedRunId);
        if (pinnedRun) return pinnedRun;
      }
      const runs = [...aiLabelRuns()].sort((left, right) => {
        const leftTime = Date.parse(String(left?.created_at_utc || "")) || 0;
        const rightTime = Date.parse(String(right?.created_at_utc || "")) || 0;
        return rightTime - leftTime;
      });
      return runs[0] || null;
    }

    function activeAiRunIds() {
      return aiLabelRuns()
        .filter((run) => ["queued", "running"].includes(String(run?.status || "")))
        .map((run) => String(run?.id || "").trim())
        .filter(Boolean);
    }

    function nextCaseNeedingAiReview(rows) {
      return sortReviewCases(rows || []).find((caseRow) => caseAiReviewMeta(caseRow, STATE.datasetKey).hasPendingAiReview) || null;
    }

    function runRowsForAiRun(run, rows = currentDataset()?.cases || []) {
      if (!run) return [];
      const runId = String(run?.id || "").trim();
      const runDocumentIds = new Set(
        [
          ...(Array.isArray(run?.document_ids) ? run.document_ids : []),
          ...aiLabelRunItems()
            .filter((item) => String(item?.run_id || "").trim() === runId)
            .map((item) => String(item?.document_id || "").trim()),
        ].filter(Boolean),
      );
      return (rows || []).filter((caseRow) =>
        runTargetDocumentsForCase(caseRow, STATE.datasetKey).some((target) => runDocumentIds.has(String(target?.documentId || ""))),
      );
    }

    function caseHasHumanReviewedWork(caseRow, datasetKey = STATE.datasetKey) {
      const questionId = String(caseRow?.question_id || "");
      if (!questionId) return false;
      return orderedSourcesForDataset(datasetKey)
        .slice(0, 2)
        .some((source) => {
          const sourceKey = String(source?.key || "");
          const sourceCase = sourceKey === STATE.sourceKey
            ? caseRow
            : caseForKeys(sourceKey, datasetKey, questionId);
          if (!source || !sourceCase) return false;
          const documentId = caseDocumentId(sourceCase, source);
          return documentId ? documentReviewState(documentId).humanReviewedItems.length > 0 : false;
        });
    }

    function renderExplorerHeaderLabel(column) {
      const metric = `<span class="explorer-header-metric">${escapeHtml(column.label)}</span>`;
      if (!column.source) return `<span class="explorer-header-label">${metric}</span>`;
      const tone = modelTone(column.source.key);
      const sourceClass = tone ? `explorer-header-model ${tone}` : "explorer-header-model";
      return `
        <span class="explorer-header-label" title="${escapeAttribute(compactSourceLabel(column.source))}">
          <span class="${escapeHtml(sourceClass)}">${escapeHtml(compactSourceLabel(column.source))}</span>
          ${metric}
        </span>
      `;
    }

    function renderExplorerHeader(rows = []) {
      if (!el.questionExplorerHead) return;
      const showSelectionColumn = !isReadOnlyMode();
      const dataset = currentDataset();
      const primarySource = currentSource();
      const compareSource = sourceForKey(alternateSourceKeyForDataset(dataset?.key || STATE.datasetKey));
      const columns = [
        { key: "question", label: "Question" },
        { key: "domain", label: "Domain" },
        { key: "primary_grade", label: "Grade", source: primarySource },
        { key: "primary_labelled", label: "Started", source: primarySource },
        { key: "primary_overall_label", label: "Overall", source: primarySource },
        { key: "compare_grade", label: "Grade", source: compareSource },
        { key: "compare_labelled", label: "Started", source: compareSource },
        { key: "compare_overall_label", label: "Overall", source: compareSource },
      ];
      el.questionExplorerHead.innerHTML = `
        <tr>
          ${showSelectionColumn ? `
            <th scope="col" class="explorer-selection-cell">
              <label class="explorer-head-selector" title="Select visible questions">
                <input
                  type="checkbox"
                  data-select-visible-checkbox
                  ${rows.length && rows.every((caseRow) => selectedExplorerQuestionSetForCurrentDataset().has(String(caseRow.question_id || ""))) ? "checked" : ""}
                >
              </label>
            </th>
          ` : ""}
          ${columns.map((column) => {
            const direction = sortDirectionForColumn(column.key);
            const indicator = direction === "ascending" ? "↑" : (direction === "descending" ? "↓" : "");
            return `
              <th scope="col" aria-sort="${escapeHtml(direction)}">
                <button
                  class="explorer-sort-button${direction !== "none" ? " active" : ""}"
                  type="button"
                  data-sort-column="${escapeHtml(column.key)}"
                >
                  ${renderExplorerHeaderLabel(column)}
                  <span class="sort-indicator" aria-hidden="true">${indicator}</span>
                </button>
              </th>
            `;
          }).join("")}
          <th scope="col"></th>
        </tr>
      `;
    }

    function renderExplorerView(rows) {
      const dataset = currentDataset();
      if (!dataset) return;
      const showSelectionColumn = !isReadOnlyMode();
      renderExplorerHeader(rows);
      const primarySource = currentSource();
      const compareSourceKey = alternateSourceKeyForDataset(dataset.key || STATE.datasetKey);
      const compareSource = sourceForKey(compareSourceKey);
      const compareCaseMap = new Map(
        ((compareSource && datasetForKeys(compareSourceKey, dataset.key || STATE.datasetKey)?.cases) || [])
          .map((caseRow) => [caseRow.question_id, caseRow]),
      );
      el.questionExplorerList.innerHTML = rows.length ? rows.map((caseRow) => {
        const primary = primaryVariant(caseRow, primarySource) || {};
        const primaryVerdict = scoreMeta(primary.consensus_score);
        const primaryHasStartedReview = caseHasStartedReview(caseRow, primarySource);
        const primaryOverallLabelMeta = documentNoteLabelMeta(caseDocumentNote(caseRow, primarySource));
        const activeRunMeta = caseActiveAiRunMeta(caseRow, dataset.key || STATE.datasetKey);
        const compareCase = compareCaseMap.get(caseRow.question_id) || null;
        const hasCompareCase = Boolean(compareCase && compareSource);
        const compareVariant = compareCase ? (primaryVariant(compareCase, compareSource) || {}) : {};
        const compareVerdict = scoreMeta(compareVariant.consensus_score);
        const compareHasStartedReview = compareCase && compareSource
          ? caseHasStartedReview(compareCase, compareSource)
          : false;
        const compareOverallLabelMeta = compareCase && compareSource
          ? documentNoteLabelMeta(caseDocumentNote(compareCase, compareSource))
          : null;
        const isCurrent = caseRow.question_id === STATE.selectedCaseId;
        const questionExcerpt = clampText(caseRow.question, 150);
        const isSelectedForRun = selectedExplorerQuestionSetForCurrentDataset().has(String(caseRow.question_id || ""));
        return `
          <tr class="${[
            isCurrent ? "is-current" : "",
            activeRunMeta.active ? "is-ai-run" : "",
          ].filter(Boolean).join(" ")}">
            ${showSelectionColumn ? `
              <td class="explorer-selection-cell">
                <label class="explorer-row-selector" title="Select this question for AI labelling">
                  <input type="checkbox" data-select-question="${escapeHtml(caseRow.question_id)}" ${isSelectedForRun ? "checked" : ""}>
                </label>
              </td>
            ` : ""}
            <td class="explorer-question-cell">
              <div class="explorer-question-button">
                <p class="explorer-question-line">${escapeHtml(questionExcerpt || caseRow.question || "")}</p>
                ${activeRunMeta.active ? `<div class="explorer-question-status">${renderExplorerRunStatusPill(activeRunMeta)}</div>` : ""}
              </div>
            </td>
            <td class="explorer-domain-cell">${escapeHtml(caseDomainLabel(caseRow) || "—")}</td>
            <td>${renderExplorerGradePill(primaryVerdict)}</td>
            <td class="explorer-status-cell">${renderExplorerStartedPill(primaryHasStartedReview)}</td>
            <td class="explorer-overall-cell">${primaryOverallLabelMeta
              ? `<span class="explorer-overall-tag" style="--label-color:${escapeAttribute(primaryOverallLabelMeta.color)}" title="${escapeAttribute(primaryOverallLabelMeta.name)}"><span class="swatch" style="background:${escapeAttribute(primaryOverallLabelMeta.color)}"></span><span class="label-text">${escapeHtml(primaryOverallLabelMeta.name)}</span></span>`
              : `<span class="explorer-overall-empty">—</span>`}
            </td>
            <td>${hasCompareCase
              ? renderExplorerGradePill(compareVerdict)
              : `<span class="explorer-overall-empty">—</span>`}
            </td>
            <td class="explorer-status-cell">${hasCompareCase
              ? renderExplorerStartedPill(compareHasStartedReview)
              : `<span class="explorer-overall-empty">—</span>`}
            </td>
            <td class="explorer-overall-cell">${compareOverallLabelMeta
              ? `<span class="explorer-overall-tag" style="--label-color:${escapeAttribute(compareOverallLabelMeta.color)}" title="${escapeAttribute(compareOverallLabelMeta.name)}"><span class="swatch" style="background:${escapeAttribute(compareOverallLabelMeta.color)}"></span><span class="label-text">${escapeHtml(compareOverallLabelMeta.name)}</span></span>`
              : `<span class="explorer-overall-empty">—</span>`}
            </td>
            <td class="explorer-action-cell">
              <button class="btn small" type="button" data-open-labeling="${escapeHtml(caseRow.question_id)}">Open</button>
            </td>
          </tr>
        `;
      }).join("") : `<tr><td colspan="${showSelectionColumn ? "10" : "9"}"><div class="empty-state"><strong>No questions match the current filters.</strong><br>Reset filters to widen the explorer.</div></td></tr>`;
    }

    function renderReviewCaseList(rows) {
      const dataset = currentDataset();
      if (!dataset || !el.reviewCaseList || !el.reviewCaseMeta) return;
      const workflowCounts = rows.reduce((counts, caseRow) => {
        const workflowKey = caseWorkflowFilterMeta(caseRow, dataset.key || STATE.datasetKey).key;
        counts[workflowKey] = (counts[workflowKey] || 0) + 1;
        return counts;
      }, {});
      if (STATE.annotationFilter !== "all") {
        const caseLabel = rows.length === 1 ? "case" : "cases";
        el.reviewCaseMeta.textContent = {
          needs_review: `${rows.length} ${caseLabel} need review`,
          in_progress: `${rows.length} ${caseLabel} in progress`,
          validated: `${rows.length} validated ${caseLabel}`,
          unreviewed: `${rows.length} not labelled ${caseLabel}`,
        }[STATE.annotationFilter] || `${rows.length} ${caseLabel}`;
      } else {
        const summaryParts = [`${rows.length} cases`];
        if (workflowCounts.needs_review) summaryParts.push(`${workflowCounts.needs_review} need review`);
        if (workflowCounts.in_progress) summaryParts.push(`${workflowCounts.in_progress} in progress`);
        if (workflowCounts.validated) summaryParts.push(`${workflowCounts.validated} validated`);
        el.reviewCaseMeta.textContent = summaryParts.join(" • ");
      }
      el.reviewCaseList.innerHTML = rows.length ? rows.map((caseRow) => {
        const workflow = caseWorkflowFilterMeta(caseRow, dataset.key || STATE.datasetKey);
        const aiReview = caseAiReviewMeta(caseRow, dataset.key || STATE.datasetKey);
        const reviewLabel = workflow.label;
        const reviewTone = workflow.tone;
        return `
          <button class="case-card${caseRow.question_id === STATE.selectedCaseId ? " selected" : ""}" type="button" data-review-question-id="${escapeHtml(caseRow.question_id)}">
            <div class="case-top">
              <div class="case-heading">
                <div class="case-heading-main">
                  <span class="case-id">${escapeHtml(caseRow.question_id)}</span>
                  ${dataset.key === "v2" && caseDomainLabel(caseRow) ? `<span class="tag">${escapeHtml(caseDomainLabel(caseRow))}</span>` : ""}
                </div>
                <span class="pill ${escapeHtml(reviewTone)}">${escapeHtml(reviewLabel)}</span>
              </div>
              ${renderCaseRailVerdictPills(caseRow, dataset.key)}
            </div>
            <p class="case-question">${escapeHtml(clampText(caseRow.question, 170))}</p>
            <p class="case-meta">${escapeHtml(clampText(caseRow.nonsensical_element, 150))}</p>
            ${aiReview.hasAnyAi ? `
              <div class="review-case-stats">
                ${aiReview.aiCount ? renderStatusPill(`AI ${aiReview.aiCount}`, "ai") : ""}
                ${aiReview.pendingCount ? renderStatusPill(`Pending ${aiReview.pendingCount}`, "pending") : ""}
                ${aiReview.reviewedCount ? renderStatusPill(`Reviewed ${aiReview.reviewedCount}`, "reviewed") : ""}
                ${aiReview.humanAddedCount ? renderStatusPill(`Added ${aiReview.humanAddedCount}`, "human") : ""}
              </div>
            ` : ""}
          </button>
        `;
      }).join("") : `<div class="empty-state"><strong>No labelled pairs match the current domain filter.</strong></div>`;

        <div class="section-head question-head">
          <div class="question-heading">
            <h2>Prompt</h2>

          </div>
        </div>
        <div class="question-body">
          <p class="question-text">${escapeHtml(caseRow.question || "No prompt saved.")}</p>
          <details class="context-card">
            <summary class="context-label">Why it is nonsense</summary>
            <p class="context-text">${escapeHtml(caseRow.nonsensical_element || "No explanation saved.")}</p>
          </details>
        </div>
      `;

            <div class="section-head">

                <button

                  type="button"
                  data-toggle-answer="1"
                  aria-label="${escapeAttribute(STATE.answerCollapsed ? "Show answer" : "Hide answer")}"
                  title="${escapeAttribute(STATE.answerCollapsed ? "Show answer" : "Hide answer")}"
                >${renderUiIcon(STATE.answerCollapsed ? "plus" : "minus")}</button>
              </div>

          <div class="review-overview-card">

              <div class="panel-control-row">
                ${item.annotations?.length ? renderMetricChip(item.annotations.length) : ""}

              </div>
            </div>
            ${item.annotations?.length ? `

                        </div>
                      </div>
                      <p class="annotation-quote">${escapeHtml(annotation.quote || "")}</p>
                      ${annotation.comment ? `<p class="annotation-comment">${escapeHtml(annotation.comment)}</p>` : ""}
                    </div>
                  `;
                }).join("")}
              </div>
            ` : `<div class="empty-state"><strong>No labelled traces saved.</strong></div>`}
          </div>
        </div>
      `;
    }

    function renderReviewStage(caseRow) {
      if (!el.reviewStage || !el.reviewPrimaryPanel || !el.reviewComparePanel) return;
      if (STATE.viewMode !== "review") {
        el.reviewStage.hidden = true;
        el.reviewPrimaryPanel.innerHTML = "";
        el.reviewComparePanel.innerHTML = "";
        if (el.reviewPromptPanel) el.reviewPromptPanel.innerHTML = "";
        return;
      }
      el.reviewStage.hidden = false;
      renderReviewPromptPanel(caseRow);
      const items = caseRow ? reviewEntriesForCase(caseRow) : [];
      el.reviewPrimaryPanel.innerHTML = renderReviewModelPanel(items[0] || null);
      el.reviewComparePanel.innerHTML = renderReviewModelPanel(items[1] || null);
    }

    function reportBarColorForTone(tone) {
      return {
        green: "var(--workflow-validated-fill-start)",
        amber: "var(--workflow-active-fill-start)",
        red: "#bb5664",
        slate: "var(--workflow-unreviewed-fill-start)",
      }[tone] || "var(--border-selected)";
    }

    function reportVerdictLabel(verdict) {
      if (!verdict) return "";
      if (verdict.label === "Partial challenge") return "Partial challenge";
      if (verdict.label === "Clear pushback") return "Clear pushback";
      if (verdict.label === "Accepted nonsense") return "Accepted nonsense";
      return verdict.label || "";
    }

    function renderReportGradeCard(sourceStats) {
      if (!sourceStats?.source) return "";
      return `
        <div class="review-overview-card">
          <div class="section-head">
            <div>${renderModelChip(sourceStats.source)}</div>
            <span class="panel-subtitle">${escapeHtml(`${formatNumber(sourceStats.total)} traces`)}</span>
          </div>
          <div class="report-grade-list">
            ${sourceStats.rows.filter((row) => row.key !== "missing").map((row) => `
              <div class="report-grade-row">
                <span class="pill ${escapeHtml(row.meta.tone)}">${escapeHtml(reportVerdictLabel(row.meta))}</span>
                <div class="report-bar-track" aria-hidden="true">
                  <span class="report-bar-fill" style="width:${escapeAttribute(String(row.percent))}%;--report-bar-color:${escapeAttribute(reportBarColorForTone(row.meta.tone))}"></span>
                </div>
                <strong class="report-grade-stat">${escapeHtml(`${row.percent}% · ${row.count}`)}</strong>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderReportNoteCard(entry) {
      const verdictLabel = entry.verdict?.label === "Missing" ? "" : reportVerdictLabel(entry.verdict);
      return `
        <article class="card report-note-card">
          <div class="report-note-card-top">
            <div class="report-note-card-head">
              <span class="question-id-chip">${escapeHtml(entry.caseRow?.question_id || "")}</span>
              ${entry.domain ? `<span class="tag">${escapeHtml(entry.domain)}</span>` : ""}
            </div>
            <div class="report-note-card-tags">
              ${verdictLabel ? `<span class="pill ${escapeHtml(entry.verdict?.tone || "slate")}">${escapeHtml(verdictLabel)}</span>` : ""}
              ${renderOverallLabelTag(entry.labelMeta)}
            </div>
          </div>
          <p class="report-note-body">${escapeHtml(entry.summary || "No overall note saved.")}</p>
          <div class="report-note-card-footer">
            <button class="btn ghost small" type="button" data-open-report-case="${escapeHtml(entry.caseRow?.question_id || "")}">Open full</button>
          </div>
        </article>
      `;
    }

    function renderReportNotesColumn(source, entries, sourceStats = null) {
      const summaryRows = (sourceStats?.rows || [])
        .filter((row) => row.key !== "missing" && row.count > 0)
        .map((row) => ({
          ...row,
          label: `${compactVerdictLabel(row.meta)} ${row.percent}%`,
        }));
      const summaryMarkup = summaryRows.map((row, index) => `
        ${index ? `<span class="report-note-column-summary-sep" aria-hidden="true">·</span>` : ""}
        <span class="report-note-column-summary-item ${escapeHtml(row.meta.tone)}">${escapeHtml(row.label)}</span>
      `).join("");
      let segmentOffset = 0;
      const meterSegments = summaryRows.map((row) => {
        const left = segmentOffset;
        segmentOffset += row.percent;
        return `<span class="report-note-column-meter-fill" style="left:${escapeAttribute(left.toFixed(1))}%;width:${escapeAttribute(row.percent.toFixed(1))}%;background:${escapeAttribute(reportBarColorForTone(row.meta.tone))}"></span>`;
      }).join("");
      return `
        <div class="review-overview-card report-note-column">
          <div class="section-head">
            <div class="report-note-column-copy">
              <div>${renderModelChip(source)}</div>
              ${summaryRows.length ? `<span class="report-note-column-meter" aria-hidden="true">${meterSegments}</span>` : ""}
              ${summaryRows.length ? `<span class="report-note-column-summary">${summaryMarkup}</span>` : ""}
            </div>
          </div>
          ${entries.length
            ? `<div class="report-note-list">${entries.map((entry) => renderReportNoteCard(entry)).join("")}</div>`
            : `<div class="empty-state"><strong>No overall notes saved yet.</strong><br>This column will fill as notes are added.</div>`}
        </div>
      `;
    }

    function renderReportView(filteredRows = null) {
      if (!el.reportView) return;
      const dataset = currentDataset();
      const store = currentStore();
      if (!dataset || !store) {
        el.reportView.innerHTML = "";
        return;
      }
      const sourceEntries = reportSourceEntries(dataset, filteredRows);
      const noteEntries = reportOverallNoteEntries(dataset, filteredRows);
      const topSources = orderedSourcesForDataset(dataset.key || STATE.datasetKey).slice(0, 2);

      el.reportView.innerHTML = `
        <section class="panel report-panel">
          <div class="section-head">
            <div>
              <h2>Model grade split</h2>
              <p class="panel-subtitle">How each model tends to handle the benchmark prompts.</p>
            </div>
          </div>
          <div class="report-source-grid">
            ${topSources.map((source) => renderReportGradeCard(reportGradeStatsForSource(source.key, sourceEntries))).join("")}
          </div>
        </section>

        <section class="panel report-panel">
          <div class="section-head">
            <div>
              <h2>Overall notes</h2>
              <p class="panel-subtitle">GPT on the left, Sonnet on the right, with note text plus verdict and domain.</p>
            </div>
          </div>
          <div class="report-note-columns">
            ${topSources.map((source) => {
              const sourceNoteEntries = reportNotesForSource(source.key, noteEntries);
              const sourceStats = reportGradeStatsForSource(source.key, sourceEntries);
              return renderReportNotesColumn(source, sourceNoteEntries, sourceStats);
            }).join("")}
          </div>
        </section>

    function renderQuestionPanel(caseRow) {
      if (!caseRow) {
        el.questionPanel.innerHTML = `<div class="empty-state"><strong>Choose a case to begin.</strong><br>The prompt, final answer, and reasoning trace will appear here.</div>`;
        return;
      }
      const dataset = currentDataset();
      const compareKey = alternateSourceKey(caseRow.question_id, dataset?.key || STATE.datasetKey);
      el.questionPanel.innerHTML = `
        <div class="section-head question-head">
          <div class="question-heading">
            <h2>Question</h2>
            <span class="question-id-chip">${escapeHtml(caseRow.question_id)}</span>
          </div>
          ${compareKey ? `<div class="question-actions">${renderCompareToggle(sourceForKey(compareKey))}</div>` : ""}

        <div class="question-body">
          <p class="question-text">${escapeHtml(caseRow.question)}</p>
          <details class="context-card">

    function renderStageModelStrip(caseRow) {
      if (!el.stageModelStrip) return;
      if (!caseRow) {
        el.stageModelStrip.dataset.hasItems = "false";
        el.stageModelStrip.hidden = true;
        el.stageModelStrip.classList.remove("compare-active");
        el.stageModelStrip.innerHTML = "";
        requestStageStickyStateSync();
        return;
      }
      const dataset = currentDataset();
      const items = [];
      const primarySource = currentSource();
      if (primarySource) {
        items.push({ source: primarySource, caseRow });
      }
      if (STATE.compareOpen) {
        const compareKey = alternateSourceKey(caseRow.question_id, dataset?.key || STATE.datasetKey);
        const compareSource = compareKey ? sourceForKey(compareKey) : null;
        const compareCase = compareKey ? caseForKeys(compareKey, dataset?.key || STATE.datasetKey, caseRow.question_id) : null;
        if (compareSource && compareCase) {
          items.push({ source: compareSource, caseRow: compareCase });
        }
      }
      if (!items.length) {
        el.stageModelStrip.dataset.hasItems = "false";
        el.stageModelStrip.hidden = true;
        el.stageModelStrip.classList.remove("compare-active");
        el.stageModelStrip.innerHTML = "";
        requestStageStickyStateSync();
        return;
      }
      el.stageModelStrip.dataset.hasItems = "true";
      el.stageModelStrip.hidden = !el.stageStickyStack?.classList.contains("is-stuck");
      el.stageModelStrip.classList.toggle("compare-active", items.length > 1);
      el.stageModelStrip.innerHTML = items.map((item) => {
        const verdict = scoreMeta(primaryVariant(item.caseRow, item.source)?.consensus_score);
        return `
        <div class="stage-model-card">
          ${renderModelChip(item.source)}
          ${renderExplorerGradePill(verdict, { compact: false })}
        </div>
      `;
      }).join("");
      requestStageStickyStateSync();
    }

    function syncStageStickyState() {
      if (!el.stageStickyStack) return;
      const stageRoot = el.stageStickyStack.parentElement;
      const shouldStick = Boolean(stageRoot) && window.scrollY > 12 && stageRoot.getBoundingClientRect().top <= 8;
      el.stageStickyStack.classList.toggle("is-stuck", shouldStick);
      if (el.stageModelStrip) {
        const hasItems = el.stageModelStrip.dataset.hasItems === "true";
        el.stageModelStrip.hidden = !hasItems || !shouldStick;
      }
    }

    function requestStageStickyStateSync() {
      if (stageStickySyncFrame) return;
      stageStickySyncFrame = window.requestAnimationFrame(() => {
        stageStickySyncFrame = 0;
        syncStageStickyState();
      });
    }

    function renderResponsePanel(caseRow) {
      if (!caseRow) {
        el.responsePanel.className = "panel response-panel";
        el.responsePanel.innerHTML = "";
        return;
      }
      const source = currentSource();
      const primary = primaryVariant(caseRow);
      if (!primary) {
        el.responsePanel.className = "panel response-panel";

      el.responsePanel.className = `panel response-panel ${modelPanelClass(source)}`.trim();

        <div class="section-head">

              title="${escapeAttribute(STATE.answerCollapsed ? "Show answer" : "Hide answer")}"

          </div>
        </div>
        ${STATE.answerCollapsed
          ? `<p class="answer-preview">${escapeHtml(preview || "No response saved.")}</p>`
          : `<div class="markdown-body answer-body">${renderMarkdown(primary.response_text || "No response saved.")}</div>`}
      `;

    function renderReasoningPanel(caseRow) {

        return;
      }

          <div class="trace-editor-body${traceMarkup.isSelected ? " selected" : ""}">
            ${traceMarkup.markup}
          </div>
        </div>
      `;

    function renderComposerPanel(caseRow) {
      const targetContext = composerTargetContext(caseRow);

      if (!traceDocument || !targetContext.selected) {

        ? documentNoteDraft.summary
        : (documentNote?.summary || "");

        ? documentNoteDraft.labelId
        : (documentNote?.label_id || "");

      el.composerPanel.innerHTML = `
        <div class="section-head composer-head">
          <h2>Overall label</h2>
          <span class="mini-stat save-state-pill" id="documentNoteSaveState" data-document-id="${escapeHtml(traceDocument.document_id)}">${escapeHtml(readOnly ? "Read-only" : documentNoteStatusText(traceDocument.document_id, documentNote, documentNoteDraft))}</span>

                  data-document-note-label="${escapeHtml(category.id)}"
                  title="${escapeAttribute(categoryTooltip(category))}"

            </div>
            ${documentNote

                  <div class="pill-row">

        el.annotationPanel.innerHTML = "";
        el.annotationPanel.hidden = true;

        (sum, option) => sum + annotationsForDocument(option.document?.document_id || "").length,

        el.annotationPanel.innerHTML = "";
        el.annotationPanel.hidden = true;
        return;

      const activeAnnotationLabelId = activeAnnotation?.label_id || STATE.selectedCategoryId;

    function renderComparisonPanel(caseRow) {
      if (!el.comparisonPanel || !el.stageBody) return;
      if (!STATE.compareOpen || !caseRow) {
        el.comparisonPanel.hidden = true;
        el.comparisonPanel.innerHTML = "";
        el.stageBody.classList.remove("compare-active");
        return;
      }
      const dataset = currentDataset();
      const compareKey = alternateSourceKey(caseRow.question_id, dataset?.key || STATE.datasetKey);
      const compareSource = compareKey ? sourceForKey(compareKey) : null;
      const compareCase = compareKey ? caseForKeys(compareKey, dataset?.key || STATE.datasetKey, caseRow.question_id) : null;
      if (!compareSource || !compareCase) {
        setCompareOpen(false);
        el.comparisonPanel.hidden = true;
        el.comparisonPanel.innerHTML = "";
        el.stageBody.classList.remove("compare-active");
        return;
      }
      const variant = primaryVariant(compareCase, compareSource);
      const verdict = scoreMeta(variant?.consensus_score);
      const traceDocument = variant?.reasoning_document || null;
      const answerHtml = variant?.response_text
        ? renderMarkdown(variant.response_text)
        : `<div class="compare-empty">No answer saved.</div>`;
      const comparePreview = clampText(String(variant?.response_text || "").replace(/\s+/g, " "), 220);
      const spanAnnotations = traceDocument ? annotationsForDocument(traceDocument.document_id) : [];
      const selectedRange = traceDocument ? selectedRangeForDocument(traceDocument.document_id) : null;
      const traceMarkup = traceDocument ? renderTraceDocumentMarkup(traceDocument, spanAnnotations, selectedRange) : null;
      el.comparisonPanel.hidden = false;
      el.stageBody.classList.add("compare-active");
      el.comparisonPanel.innerHTML = `
        <section class="panel response-panel ${escapeHtml(modelPanelClass(compareSource))}" data-compare-panel="answer">
          <div class="section-head">
            <div>
              <h2>Answer</h2>
            </div>
            <div class="panel-control-row answer-controls">
              ${renderModelChip(compareSource)}
              <span class="pill ${escapeHtml(verdict.tone)}">Grade: ${escapeHtml(verdict.label)}</span>
              <button
                class="icon-action-btn answer-toggle"
                type="button"
                data-toggle-answer="1"
                aria-label="${escapeAttribute(STATE.answerCollapsed ? "Show answer" : "Hide answer")}"
                title="${escapeAttribute(STATE.answerCollapsed ? "Show answer" : "Hide answer")}"
              >${renderUiIcon(STATE.answerCollapsed ? "plus" : "minus")}</button>
            </div>
          </div>
          ${STATE.answerCollapsed
            ? `<p class="answer-preview">${escapeHtml(comparePreview || "No answer saved.")}</p>`
            : `<div class="markdown-body answer-body">${answerHtml}</div>`}
        </section>
        <section class="panel reasoning-panel ${escapeHtml(modelPanelClass(compareSource))}" data-compare-panel="reasoning">
          ${renderReasoningHeader(traceDocument?.document_id || "", compareSource, spanAnnotations.length)}
          <div class="reasoning-sections">
            <div class="trace-editor-body${traceMarkup?.isSelected ? " selected" : ""}">
              ${traceMarkup?.markup || `<div class="compare-empty">No reasoning trace saved.</div>`}
            </div>
          </div>
        </section>
      `;
    }

    function render() {
      const dataset = currentDataset();
      if (!dataset) return;
      syncActiveAiRunExplorerState();
      renderLayoutChrome();
      renderSourceSwitch();
      renderDatasetSwitch();
      renderViewSwitch();
      renderThemeSwitch();
      const rows = sortCases(filteredCases());
      if (STATE.viewMode === "label" || STATE.viewMode === "review" || STATE.selectedCaseId) {
        ensureSelection(rows);
      }
      const railRows = caseRailRows(rows);
      syncCaseRailPinnedIndex(railRows);
      const caseRow = selectedCase(railRows);
      renderHeroSummary(rows);

    function nearestSentenceNode(node) {
      if (!node) return null;
      const element =
        node.nodeType === Node.ELEMENT_NODE
          ? node
          : node.parentElement;
      return element?.closest?.("[data-sentence-select]") || null;
    }

    function nearestParagraphNode(node) {
      if (!node) return null;
      const element =
        node.nodeType === Node.ELEMENT_NODE
          ? node
          : node.parentElement;
      return element?.closest?.(".trace-paragraph") || null;
    }

    function adjacentParagraphNode(paragraph, direction) {
      if (!paragraph) return null;
      let cursor = paragraph;
      while (cursor) {
        cursor = direction === "next" ? cursor.nextElementSibling : cursor.previousElementSibling;
        if (!cursor) return null;
        if (cursor.matches?.(".trace-paragraph")) return cursor;
      }
      return null;
    }

    function paragraphBoundaryNode(root, container, offset, direction) {
      if (!container) return null;
      if (container.nodeType === Node.ELEMENT_NODE && container.matches?.(".trace-paragraph") && root.contains(container)) {
        const childCount = container.childNodes?.length || 0;
        if (direction === "end" && offset <= 0) {
          return adjacentParagraphNode(container, "previous") || container;
        }
        if (direction === "start" && offset >= childCount) {
          return adjacentParagraphNode(container, "next") || container;
        }
        return container;
      }
      const nearest = nearestParagraphNode(container);
      if (nearest && root.contains(nearest)) return nearest;
      return resolveBoundaryNode(root, container, offset, ".trace-paragraph", direction);
    }

    function boundaryMatchWithin(node, selector, direction) {
      if (!node || node.nodeType !== Node.ELEMENT_NODE) return null;
      if (node.matches?.(selector)) return node;
      const matches = node.querySelectorAll?.(selector) || [];
      if (!matches.length) return null;
      return direction === "start" ? matches[0] : matches[matches.length - 1];
    }

    function resolveBoundaryNode(root, container, offset, selector, direction) {
      if (!container) return null;
      const owner =
        container.nodeType === Node.ELEMENT_NODE
          ? container
          : container.parentElement;
      const ancestorMatch = owner?.closest?.(selector);
      if (ancestorMatch && root.contains(ancestorMatch)) return ancestorMatch;
      if (container.nodeType === Node.ELEMENT_NODE) {
        const children = Array.from(container.childNodes || []);
        if (direction === "start") {
          for (let index = Math.max(0, offset); index < children.length; index += 1) {
            const match = boundaryMatchWithin(children[index], selector, "start");
            if (match && root.contains(match)) return match;
          }
        } else {
          for (let index = Math.min(children.length - 1, offset - 1); index >= 0; index -= 1) {
            const match = boundaryMatchWithin(children[index], selector, "end");
            if (match && root.contains(match)) return match;
          }
        }
      }
      return null;
    }

    function offsetWithinSentence(sentence, container, offset) {
      try {
        const probe = document.createRange();
        probe.selectNodeContents(sentence);
        probe.setEnd(container, offset);
        return probe.toString().length;
      } catch (_error) {
        return 0;
      }
    }

    function readSelectionFromTrace(root) {
      const selection = window.getSelection();
      if (!selection || selection.rangeCount === 0) return null;
      const range = selection.getRangeAt(0);
      if (range.collapsed) return null;
      if (!root.contains(range.startContainer) || !root.contains(range.endContainer)) return null;
      const startSentence =
        nearestSentenceNode(range.startContainer)
        || resolveBoundaryNode(root, range.startContainer, range.startOffset, "[data-sentence-select]", "start");
      const endSentence =
        nearestSentenceNode(range.endContainer)
        || resolveBoundaryNode(root, range.endContainer, range.endOffset, "[data-sentence-select]", "end");
      const startParagraph =
        paragraphBoundaryNode(root, range.startContainer, range.startOffset, "start");
      const endParagraph =
        paragraphBoundaryNode(root, range.endContainer, range.endOffset, "end");
      const documentId = root.dataset.documentId || startSentence?.dataset?.documentId || "";
      const document = labDocument(documentId);
      if (!document?.text) return null;
      let start = Number.NaN;
      let end = Number.NaN;
      if (startSentence) {
        const startBase = Number(startSentence.dataset.sentenceStart || 0);
        start = startBase + offsetWithinSentence(startSentence, range.startContainer, range.startOffset);
      } else if (startParagraph) {
        start = Number(startParagraph.dataset.bodyStart || Number.NaN);
      }
      if (endSentence) {
        const endBase = Number(endSentence.dataset.sentenceStart || 0);
        end = endBase + offsetWithinSentence(endSentence, range.endContainer, range.endOffset);
      } else if (endParagraph) {
        end = Number(endParagraph.dataset.bodyEnd || Number.NaN);
      }
      const quote = String(document.text || "").slice(start, end);
      if (!quote.trim()) return null;
      if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return null;
      return {
        documentId,
        start,
        end,
        quote,
        selectionMode: "freeform",
      };
    }
